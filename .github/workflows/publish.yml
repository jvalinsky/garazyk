name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.2.x

      - name: Verify
        run: |
          deno task check
          deno task test

      - name: Publish Packages
        run: |
          echo "--- Publishing @garazyk/laweta ---"
          cd packages/laweta
          deno publish --allow-slow-types
          cd ../..

          echo "--- Publishing @garazyk/gruszka ---"
          cd packages/gruszka
          deno publish --allow-slow-types
          cd ../..

          echo "--- Publishing @garazyk/schemat ---"
          cd packages/schemat
          deno publish --allow-slow-types
          cd ../..

          echo "--- Publishing @garazyk/hamownia ---"
          cd packages/hamownia
          deno publish --allow-slow-types
          cd ../..

          echo "--- Publishing @garazyk/narzedzia ---"
          cd packages/narzedzia
          deno publish --allow-slow-types
