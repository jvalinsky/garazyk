name: Security Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      fuzzing_duration:
        description: 'Fuzzing duration in minutes (per fuzzer)'
        required: false
        default: '10'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'

jobs:
  clang-tidy:
    name: Static Analysis (clang-tidy)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: security-brew-${{ runner.os }}-${{ hashFiles('.github/workflows/security.yml') }}
          restore-keys: |
            security-brew-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/CMakeCache.txt
            build/CMakeFiles
          key: security-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
          restore-keys: |
            security-cmake-${{ runner.os }}-

      - name: Install LLVM
        run: |
          brew update
          brew install llvm@18 ninja cmake || true

      - name: Configure (compile_commands.json)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZERS=OFF

      - name: Build (for analysis)
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli

      - name: Run clang-tidy (core modules)
        run: |
          LLVM_BIN="$(brew --prefix llvm@18)/bin"
          CLANG_TIDY="$LLVM_BIN/clang-tidy"

          FILES=(
            ATProtoPDS/Sources/Repository/CBOR.m
            ATProtoPDS/Sources/Network/HttpRequest.m
            ATProtoPDS/Sources/Network/XrpcHandler.m
            ATProtoPDS/Sources/Database/ActorStore/ActorStore.m
            ATProtoPDS/Sources/Auth/JWT.m
          )

          for f in "${FILES[@]}"; do
            echo "==> clang-tidy $f"
            "$CLANG_TIDY" -p build "$f"
          done

      - name: Run clang-tidy (PLC modules)
        run: |
          LLVM_BIN="$(brew --prefix llvm@18)/bin"
          CLANG_TIDY="$LLVM_BIN/clang-tidy"

          FILES=(
            ATProtoPDS/Sources/PLC/PLCOperation.m
            ATProtoPDS/Sources/PLC/PLCRotationKeyManager.m
            ATProtoPDS/Sources/PLC/DIDPLCResolver.m
            ATProtoPDS/Sources/PLC/PLCServer.m
            ATProtoPDS/Sources/PLC/PLCAuditor.m
            ATProtoPDS/Sources/Core/DID.m
            ATProtoPDS/Sources/Network/XrpcMethodRegistry.m
          )

          for f in "${FILES[@]}"; do
            echo "==> clang-tidy $f"
            "$CLANG_TIDY" -p build "$f" || true
          done

  fuzzing:
    name: Fuzzing (libFuzzer)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: fuzz-brew-${{ runner.os }}-${{ hashFiles('.github/workflows/security.yml') }}

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/CMakeCache.txt
            build/CMakeFiles
          key: fuzz-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Build Dependencies
        run: |
          brew update
          brew install ninja cmake || true

      - name: Configure (Fuzzers)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZERS=ON

      - name: Build Fuzzers
        run: |
          cmake --build build --parallel 4 --target fuzz-all

      - name: Run Fuzzers
        run: |
          DURATION_MIN='${{ github.event.inputs.fuzzing_duration || 10 }}'
          DURATION_SEC=$((DURATION_MIN * 60))

          echo "Running XRPC fuzzer for ${DURATION_SEC}s"
          ./build/fuzzing/fuzz_xrpc fuzzing/corpus_xrpc/ -max_total_time=${DURATION_SEC} -jobs=2 -timeout=10

          echo "Running CBOR fuzzer for ${DURATION_SEC}s"
          ./build/fuzzing/fuzz_cbor fuzzing/corpus_cbor/ -max_total_time=${DURATION_SEC} -jobs=2 -timeout=10

          echo "Running HTTP fuzzer for ${DURATION_SEC}s"
          ./build/fuzzing/fuzz_http fuzzing/corpus_http/ -max_total_time=${DURATION_SEC} -jobs=2 -timeout=10

  dependency-scan:
    name: Dependency Scan (OSV)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v2.3.1
        with:
          scan-args: |-
            --recursive
            ./

  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --no-update
