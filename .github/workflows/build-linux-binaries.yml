name: Build Linux Binaries

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [kaszlak, campagnola, zuk, syrena]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libsqlite3-dev \
            libxml2-dev \
            libxslt1-dev \
            libqrencode-dev \
            libffi-dev \
            gnustep-devel \
            clang

      - name: Configure and build ${{ matrix.target }}
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make ${{ matrix.target }} -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries-arm64
          path: build/bin/${{ matrix.target }}
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries-arm64
          path: binaries

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: linux-binaries-${{ github.run_number }}
          release_name: Linux ARM64 Binaries (Build #${{ github.run_number }})
          body: |
            Linux ARM64 binaries for:
            - kaszlak (PDS with AdminUI)
            - campagnola (PLC Directory)
            - zuk (Relay/BGS)
            - syrena (AppView)

            To use these binaries locally:
            ```bash
            # Download binaries
            mkdir -p docker/local-network/staging/bin
            # Download each binary and save to staging/bin/

            # Rebuild Docker images
            docker compose -f docker/local-network/docker-compose.yml build

            # Start testnet
            docker compose -f docker/local-network/docker-compose.yml up -d
            ```

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/*
          tag_name: linux-binaries-${{ github.run_number }}
