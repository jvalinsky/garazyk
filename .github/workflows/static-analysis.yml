name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: analysis-brew-${{ runner.os }}-${{ hashFiles('.github/workflows/static-analysis.yml') }}

      - name: Install Dependencies
        run: |
          brew update
          brew install ninja cmake llvm@18 || true
          brew link --overwrite llvm@18 || true

      - name: Verify clang-tidy
        run: |
          CLANG_TIDY="$(brew --prefix llvm@18)/bin/clang-tidy"
          echo "clang-tidy path: $CLANG_TIDY"
          "$CLANG_TIDY" --version

      - name: Configure (compile_commands.json)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZERS=OFF

      - name: Build (for analysis)
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli

      - name: Run clang-tidy (critical files)
        run: |
          LLVM_BIN="$(brew --prefix llvm@18)/bin"
          CLANG_TIDY="$LLVM_BIN/clang-tidy"
          
          CRITICAL_FILES=(
            ATProtoPDS/Sources/Auth/JWT.m
            ATProtoPDS/Sources/Auth/OAuth2.m
            ATProtoPDS/Sources/Network/XrpcMethodRegistry.m
            ATProtoPDS/Sources/Database/ActorStore/ActorStore.m
            ATProtoPDS/Sources/PLC/PLCOperation.m
            ATProtoPDS/Sources/PLC/PLCRotationKeyManager.m
            ATProtoPDS/Sources/Core/DID.m
          )
          
          FAILED=0
          for f in "${CRITICAL_FILES[@]}"; do
            echo "==> Analyzing $f"
            if ! "$CLANG_TIDY" -p build "$f"; then
              FAILED=1
            fi
          done
          
          exit $FAILED

      - name: Check for TODO/FIXME in production code
        run: |
          echo "Checking for unaddressed TODOs and FIXMEs..."
          FOUND=0
          while IFS= read -r file; do
            COUNT=$(grep -c -E "(TODO|FIXME|HACK|XXX):" "$file" 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning file=$file::$COUNT TODO/FIXME markers found"
              FOUND=1
            fi
          done < <(find ATProtoPDS/Sources -name "*.m" -type f)
          
          if [ $FOUND -eq 1 ]; then
            echo "Note: TODO/FIXME markers found - consider addressing before release"
          fi

      - name: Check for hardcoded secrets patterns
        run: |
          echo "Scanning for potential hardcoded secrets..."
          ! grep -rn -E "(password|secret|api_key|token)\s*=\s*\"[^\"]+\"" \
            ATProtoPDS/Sources --include="*.m" --include="*.h" 2>/dev/null || {
            echo "::error::Potential hardcoded secrets found"
            exit 1
          }

  shellcheck:
    name: Shell Script Linting
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          FAILED=0
          REPORT_FILE="/tmp/shellcheck-report.txt"
          # Scope: core scripts only — excludes auxiliary/generated dirs
          while IFS= read -r file; do
            echo "==> Checking $file"
            if ! shellcheck --format=gcc -s bash "$file" 2>&1 | tee -a "$REPORT_FILE"; then
              FAILED=1
            fi
          done < <(find . -name "*.sh" -type f \
            -not -path "./build/*" \
            -not -path "./.git/*" \
            -not -path "./skills/*" \
            -not -path "./.opencode/*" \
            -not -path "./examples/*" \
            -not -path "./scripts/archive/*")
          exit $FAILED

      - name: Upload ShellCheck Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-report
          path: /tmp/shellcheck-report.txt
          retention-days: 7
