name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.2.x

      - name: Format
        run: deno fmt --check packages/ scripts/

      - name: Lint
        run: deno lint packages/ scripts/

      - name: Type Check
        run: |
          deno check packages/laweta/mod.ts
          deno check packages/gruszka/mod.ts
          deno check packages/schemat/mod.ts
          deno check packages/hamownia/mod.ts
          deno check scripts/run_scenarios.ts

      - name: Run Tests
        run: deno test -A packages/

      - name: Publish Dry Run
        run: |
          for pkg in laweta gruszka schemat hamownia; do
            echo "--- $pkg ---"
            cd packages/$pkg
            if [ "$pkg" = "schemat" ]; then
              deno publish --dry-run --allow-slow-types
            else
              deno publish --dry-run
            fi
            cd ../..
          done
