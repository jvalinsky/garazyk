name: Build Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'ATProtoPDS/Sources/**'
      - '.github/workflows/build-docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'ATProtoPDS/Sources/**'
  workflow_dispatch:

jobs:
  build-docs:
    name: Build VitePress Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'docs/package-lock.json'

      - name: Install Dependencies
        run: |
          cd docs
          npm ci

      - name: Run Validation
        run: |
          cd docs
          npm run validate || echo "Validation warnings detected"

      - name: Build Documentation
        run: |
          cd docs
          npm run docs:build

      - name: Validate Build Output
        run: |
          if [ -d "docs/.vitepress/dist" ]; then
            echo "Documentation built successfully"
            ls -la docs/.vitepress/dist/
          else
            echo "Documentation build failed"
            exit 1
          fi

      - name: Validate Internal Links
        run: |
          chmod +x scripts/validate-doc-links.sh
          ./scripts/validate-doc-links.sh

      - name: Validate Diagrams
        run: |
          chmod +x scripts/validate-doc-diagrams.sh
          ./scripts/validate-doc-diagrams.sh

      - name: Test Redirects (Preview)
        run: |
          cd docs
          npm run docs:preview &
          PREVIEW_PID=$!
          sleep 5
          chmod +x scripts/test-redirects.sh
          ./scripts/test-redirects.sh http://localhost:4173 || true
          kill $PREVIEW_PID

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitepress-site
          path: docs/.vitepress/dist/
          retention-days: 7

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Documentation Artifact
        uses: actions/download-artifact@v4
        with:
          name: vitepress-site
          path: docs/.vitepress/dist/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          publish_branch: gh-pages
          force_orphan: true

  preview-deployment:
    name: Preview Deployment
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Documentation Artifact
        uses: actions/download-artifact@v4
        with:
          name: vitepress-site
          path: docs/.vitepress/dist/

      - name: Comment PR with Preview Info
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📚 Documentation preview built successfully!\n\nDownload the artifact to preview locally:\n```bash\nunzip vitepress-site.zip\ncd dist\npython3 -m http.server 8080\n```\nThen visit http://localhost:8080/docs/'
            })
