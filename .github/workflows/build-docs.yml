name: Build Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'ATProtoPDS/Sources/**'
      - '.github/workflows/build-docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'ATProtoPDS/Sources/**'
  workflow_dispatch:

jobs:
  build-docs:
    name: Build Jekyll Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: 'docs'

      - name: Build Documentation
        run: |
          cd docs
          bundle exec jekyll build

      - name: Validate HTML
        run: |
          if [ -d "docs/_site" ]; then
            echo "Documentation built successfully"
            ls -la docs/_site/
          else
            echo "Documentation build failed"
            exit 1
          fi

      - name: Validate Code Examples
        run: |
          chmod +x scripts/validate-doc-code-examples.sh
          ./scripts/validate-doc-code-examples.sh

      - name: Validate Internal Links
        run: |
          chmod +x scripts/validate-doc-links.sh
          ./scripts/validate-doc-links.sh

      - name: Validate Diagrams
        run: |
          chmod +x scripts/validate-doc-diagrams.sh
          ./scripts/validate-doc-diagrams.sh

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jekyll-site
          path: docs/_site/
          retention-days: 7

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Documentation Artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-site
          path: docs/_site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
          publish_branch: gh-pages
          force_orphan: true
