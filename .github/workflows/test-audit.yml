name: Test Audit

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'Garazyk/Tests/**'
      - 'tooling/test-audit-validator/**'
      - '.github/workflows/test-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Unit Tests (nix)
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tooling/test-audit-validator
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build tool
        run: nix develop . --command make build

      - name: Run focused test packages
        run: nix develop . --command go test ./internal/config ./internal/validation ./internal/report ./cmd/test-audit-validator -count=1

  audit-gates:
    name: Audit Gate (${{ matrix.id }})
    needs: build-and-test
    runs-on: macos-14
    timeout-minutes: 25
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: auto-gate
            make_target: audit-gate
            report_name: audit-auto.json
            allow_failure: false
          - id: clang-strict
            make_target: audit-clang-gate
            report_name: audit-clang.json
            allow_failure: true
    defaults:
      run:
        working-directory: tooling/test-audit-validator
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Execute gate
        id: gate
        run: |
          set -euo pipefail
          mkdir -p /tmp/test-audit

          set +e
          nix develop . --command make "${{ matrix.make_target }}" \
            >"/tmp/test-audit/run-${{ matrix.id }}.log" 2>&1
          status=$?
          set -e

          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-audit-${{ matrix.id }}
          path: |
            tooling/test-audit-validator/.artifacts/test-audit/${{ matrix.report_name }}
            /tmp/test-audit/run-${{ matrix.id }}.log
          if-no-files-found: warn
          retention-days: 14

      - name: Post summary
        if: always()
        env:
          MODE: ${{ matrix.id }}
          TARGET: ${{ matrix.make_target }}
          EXIT_CODE: ${{ steps.gate.outputs.exit_code }}
          REPORT_PATH: tooling/test-audit-validator/.artifacts/test-audit/${{ matrix.report_name }}
          LOG_PATH: /tmp/test-audit/run-${{ matrix.id }}.log
        run: |
          node <<'JS' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");

          const mode = process.env.MODE;
          const target = process.env.TARGET;
          const exitCode = process.env.EXIT_CODE || "unknown";
          const reportPath = process.env.REPORT_PATH;
          const logPath = process.env.LOG_PATH;

          console.log(`### Test Audit: ${mode}`);
          console.log("");
          console.log(`- target: \`${target}\``);
          console.log(`- exit_code: \`${exitCode}\``);

          if (reportPath && fs.existsSync(reportPath)) {
            const data = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const stats = data.statistics || {};
            const sev = stats.issues_by_severity || {};
            const meta = data.metadata || {};
            const errors = data.errors || [];
            console.log(`- findings: \`${stats.issues_found || 0}\``);
            console.log(`- critical: \`${sev.critical || 0}\``);
            console.log(`- high: \`${sev.high || 0}\``);
            console.log(`- parser_mode: \`${meta.parser_mode || "n/a"}\``);
            console.log(`- clang_attempted_count: \`${meta.clang_attempted_count || 0}\``);
            console.log(`- clang_success_count: \`${meta.clang_success_count || 0}\``);
            console.log(`- clang_fallback_count: \`${meta.clang_fallback_count || 0}\``);
            console.log(`- parser_errors: \`${errors.length}\``);
          } else {
            console.log("- report: missing");
          }

          if (logPath && fs.existsSync(logPath)) {
            console.log("");
            console.log("<details><summary>gate log tail</summary>");
            console.log("");
            console.log("```text");
            for (const line of fs.readFileSync(logPath, "utf8").split(/\r?\n/).slice(-40)) {
              console.log(line);
            }
            console.log("```");
            console.log("</details>");
          }
          JS
