name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'

jobs:
  # ============================================================================
  # JOB 1: Build and Test
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: macos-14  # More stable than macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /usr/local/Cellar/llvm
          key: homebrew-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-${{ runner.os }}-

      - name: Install Homebrew dependencies
        run: |
          brew install xcodegen llvm@18

      - name: Cache XcodeGen
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcodegen
          key: xcodegen-${{ runner.os }}-${{ env.XCODE_VERSION }}

      - name: Build secp256k1 library
        run: |
          cd secp256k1
          ./autogen.sh
          ./configure --enable-module-recovery
          make -j$(sysctl -n hw.ncpu)
          cd ..

      - name: Generate project
        run: xcodegen generate

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default_scheme
          echo "Using default scheme: $default"

      - name: Build
        env:
          SCHEME: $(cat default_scheme)
        run: |
          SCHEME=$(cat default_scheme)

          # Detect workspace vs project
          if [ "$(ls -A | grep -i '\.xcworkspace$')" ]; then
            filetype="workspace"
            build_target=$(ls -A | grep -i '\.xcworkspace$')
          else
            filetype="project"
            build_target=$(ls -A | grep -i '\.xcodeproj$')
          fi

          build_target=$(echo $build_target | awk '{$1=$1;print}')

          xcodebuild clean build \
            -scheme "$SCHEME" \
            -"$filetype" "$build_target" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: Generate Coverage Report
        env:
          SCHEME: $(cat default_scheme)
        run: |
          # Use "AllTests" scheme if available, otherwise default
          SCHEME="AllTests"
          
          xcodebuild test \
            -scheme "$SCHEME" \
            -project ATProtoPDS.xcodeproj \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            GCC_GENERATE_TEST_COVERAGE_FILES=YES \
            GCC_INSTRUMENT_PROGRAM_AREA_FILES=YES

          # Print coverage path for info
          echo "Coverage data generated in DerivedData"


  # ============================================================================
  # JOB 2: Fuzzing
  # ============================================================================
  fuzzing:
    name: Fuzzing
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install Homebrew dependencies
        run: |
          brew install xcodegen llvm@18

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /usr/local/Cellar/llvm
          key: homebrew-fuzz-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-fuzz-${{ runner.os }}-

      - name: Build Fuzzers
        run: |
          xcodegen generate
          make fuzz-all 2>&1 | tail -15

      - name: Run Fuzzers
        run: |
          echo "=== Running XRPC fuzzer (60s) ==="
          ./fuzzing/fuzz_xrpc fuzzing/corpus_xrpc/ -max_total_time=60 -jobs=4

          echo "=== Running CBOR fuzzer (60s) ==="
          ./fuzzing/fuzz_cbor fuzzing/corpus_cbor/ -max_total_time=60 -jobs=4

          echo "=== Running HTTP fuzzer (60s) ==="
          ./fuzzing/fuzz_http fuzzing/corpus_http/ -max_total_time=60 -jobs=4

  # ============================================================================
  # JOB 3: Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install Homebrew dependencies
        run: |
          brew install xcodegen llvm@18

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /usr/local/Cellar/llvm
          key: homebrew-sec-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-sec-${{ runner.os }}-

      - name: Clang-Tidy
        run: |
          export PATH="/usr/local/opt/llvm/bin:$PATH"
          make clang-tidy 2>&1 | tail -30 || true

      - name: Static Analyzer
        run: |
          xcodegen generate
          xcodebuild -scheme ATProtoPDS \
            -project ATProtoPDS.xcodeproj \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            build CODE_SIGNING_ALLOWED=NO \
            RUN_CLANG_STATIC_ANALYZER=YES \
            2>&1 | tail -30 || true
