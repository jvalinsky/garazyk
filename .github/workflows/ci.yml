name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'
  CMAKE_VERSION: '3.28'

jobs:
  macos-build-and-test:
    name: macOS Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/ninja
            /usr/local/Cellar/cmake
          key: macos-brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            macos-brew-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/CMakeCache.txt
            build/CMakeFiles
          key: macos-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: |
            macos-cmake-${{ runner.os }}-

      - name: Install Build Dependencies
        run: |
          brew update
          brew install ninja cmake || true

      - name: Check XRPC Registry Coverage
        run: |
          node scripts/docs/generate_xrpc_coverage_report.cjs --source-only --fail-on-duplicates --fail-on-missing

      - name: Check Module Boundaries
        run: |
          ./scripts/dev/check_module_boundaries.sh .

      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli AllTests

      - name: Run Tests
        run: |
          ctest --test-dir build --output-on-failure

  vscode-extension-build:
    name: VS Code Extension Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tooling/vscode-objective-j/package-lock.json

      - name: Install Dependencies
        working-directory: tooling/vscode-objective-j
        run: npm ci

      - name: Compile TypeScript
        working-directory: tooling/vscode-objective-j
        run: npm run compile

      - name: Package VSIX
        working-directory: tooling/vscode-objective-j
        run: npx @vscode/vsce package --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: objective-j-vsix
          path: tooling/vscode-objective-j/*.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'vscode')
        working-directory: tooling/vscode-objective-j
        run: npx @vscode/vsce publish --allow-missing-repository
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  cappuccino-ui-build:
    name: Cappuccino UI Build (Objective-J)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Garazyk/Sources/App/CappuccinoUI/package-lock.json

      - name: Install Dependencies
        working-directory: Garazyk/Sources/App/CappuccinoUI
        run: npm ci

      - name: Generate Frameworks
        working-directory: Garazyk/Sources/App/CappuccinoUI
        run: npm run frameworks

      - name: Build Release
        working-directory: Garazyk/Sources/App/CappuccinoUI
        run: npm run build

      - name: Verify Build Output
        working-directory: Garazyk/Sources/App/CappuccinoUI
        run: |
          if [ ! -d "Build/Release/CappuccinoUI" ]; then
            echo "ERROR: Build output directory not found"
            exit 1
          fi
          echo "Build output contents:"
          ls -la Build/Release/CappuccinoUI/

  linux-gnustep-build-and-test:
    name: Linux GNUstep Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: macos-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            /var/lib/apt
          key: linux-apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            linux-apt-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build-linux/_deps
            build-linux/CMakeCache.txt
            build-linux/CMakeFiles
          key: linux-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: |
            linux-cmake-${{ runner.os }}-

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            gnustep-make \
            libgnustep-base-dev \
            libblocksruntime-dev \
            libssl-dev \
            libsqlite3-dev \
            libqrencode-dev

      - name: Check Module Boundaries
        run: |
          ./scripts/dev/check_module_boundaries.sh .

      - name: Configure (GNUstep CMake)
        run: |
          cmake -S . -B build-linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build (GNUstep)
        run: |
          cmake --build build-linux --parallel 4 --target september AllTests

      - name: Run Tests (GNUstep)
        run: |
          ctest --test-dir build-linux --output-on-failure

  linux-docker-build:
    name: Linux Docker Build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: macos-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.gnustep
          push: false
          tags: atprotopds:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  plc-integration-tests:
    name: PLC Integration Tests
    runs-on: macos-14
    timeout-minutes: 15
    needs: macos-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Build Dependencies
        run: |
          brew update
          brew install ninja cmake || true

      - name: Check Module Boundaries
        run: |
          ./scripts/dev/check_module_boundaries.sh .

      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli AllTests

      - name: Run PLC-specific tests
        run: |
          ctest --test-dir build --output-on-failure -R "PLC|DID|Identity"

      - name: Verify PLC binary
        run: |
          ./build/bin/atprotopds-cli --help

  pty-sidecar-tests:
    name: PTY Sidecar Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/mcp-pty/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: pty-sidecar-cargo-${{ runner.os }}-${{ hashFiles('scripts/mcp-pty-rs/Cargo.lock') }}
          restore-keys: |
            pty-sidecar-cargo-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: scripts/mcp-pty/node_modules
          key: pty-sidecar-npm-${{ runner.os }}-${{ hashFiles('scripts/mcp-pty/package-lock.json') }}
          restore-keys: |
            pty-sidecar-npm-${{ runner.os }}-

      - name: Build sidecar binary
        run: cargo build --manifest-path scripts/mcp-pty-rs/Cargo.toml

      - name: Run Rust sidecar tests
        run: cargo test --manifest-path scripts/mcp-pty-rs/Cargo.toml

      - name: Install npm dependencies
        working-directory: scripts/mcp-pty
        run: npm ci

      - name: Run sidecar tests
        working-directory: scripts/mcp-pty
        run: |
          node --test --test-timeout=30000 \
            test/sidecar_test.mjs \
            test/sidecar_corpus_test.mjs \
            test/snapshot_compare_test.mjs

      - name: Run sidecar smoke test (/bin/cat)
        working-directory: scripts/mcp-pty
        run: |
          node corpus/runner.mjs tests/cat.yaml --sidecar --continue-on-failure
