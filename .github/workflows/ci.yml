name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'

jobs:
  macos-build-and-test:
    name: macOS Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Build Dependencies
        run: |
          brew update
          brew install ninja cmake

      - name: Check XRPC Registry Duplicates
        run: |
          node scripts/generate_xrpc_coverage_report.js --source-only --fail-on-duplicates

      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli AllTests

      - name: Run Tests
        run: |
          ctest --test-dir build --output-on-failure

  linux-docker-build:
    name: Linux Docker Build
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.gnustep
          push: false
          tags: atprotopds:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
