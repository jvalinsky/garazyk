name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'
  CMAKE_VERSION: '3.28'

jobs:
  macos-build-and-test:
    name: macOS Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/ninja
            /usr/local/Cellar/cmake
          key: macos-brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            macos-brew-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/CMakeCache.txt
            build/CMakeFiles
          key: macos-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: |
            macos-cmake-${{ runner.os }}-

      - name: Install Build Dependencies
        run: |
          brew update
          brew install ninja cmake || true

      - name: Check XRPC Registry Duplicates
        run: |
          node scripts/generate_xrpc_coverage_report.js --source-only --fail-on-duplicates

      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli AllTests

      - name: Run Tests
        run: |
          ctest --test-dir build --output-on-failure

  linux-gnustep-build-and-test:
    name: Linux GNUstep Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: macos-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            /var/lib/apt
          key: linux-apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            linux-apt-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build-linux/_deps
            build-linux/CMakeCache.txt
            build-linux/CMakeFiles
          key: linux-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.github/workflows/ci.yml') }}
          restore-keys: |
            linux-cmake-${{ runner.os }}-

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            gnustep-make \
            libgnustep-base-dev \
            libblocksruntime-dev \
            libssl-dev \
            libsqlite3-dev \
            libqrencode-dev

      - name: Configure (GNUstep CMake)
        run: |
          cmake -S . -B build-linux \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build (GNUstep)
        run: |
          cmake --build build-linux --parallel 4 --target september AllTests

      - name: Run Tests (GNUstep)
        run: |
          ctest --test-dir build-linux --output-on-failure

  linux-docker-build:
    name: Linux Docker Build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: macos-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.gnustep
          push: false
          tags: atprotopds:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  plc-integration-tests:
    name: PLC Integration Tests
    runs-on: macos-14
    timeout-minutes: 15
    needs: macos-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Build Dependencies
        run: |
          brew update
          brew install ninja cmake || true

      - name: Configure (CMake)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OBJC_COMPILER=clang \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

      - name: Build
        run: |
          cmake --build build --parallel 4 --target atprotopds-cli AllTests

      - name: Run PLC-specific tests
        run: |
          ctest --test-dir build --output-on-failure -R "PLC|DID|Identity"

      - name: Verify PLC binary
        run: |
          ./build/bin/atprotopds-cli --help
