name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '16.1'

jobs:
  # ============================================================================
  # JOB 1: Build and Test
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: macos-14  # More stable than macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /usr/local/Cellar/llvm
          key: homebrew-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-${{ runner.os }}-

      - name: Install Homebrew dependencies
        run: |
          brew install xcodegen llvm@18

      - name: Cache XcodeGen
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcodegen
          key: xcodegen-${{ runner.os }}-${{ env.XCODE_VERSION }}

      - name: Configure and build with CMake
        run: |
          mkdir -p build
          cd build

          # Configure with CMake
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZERS=OFF

          # Build main project and tests
          make -j$(sysctl -n hw.ncpu) atprotopds-cli AllTests

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure


  # ============================================================================
  # JOB 2: Fuzzing
  # ============================================================================
  fuzzing:
    name: Fuzzing
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install Homebrew dependencies
        run: |
          brew install xcodegen llvm@18

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /usr/local/Cellar/llvm
          key: homebrew-fuzz-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-fuzz-${{ runner.os }}-

      - name: Build Fuzzers
        run: |
          mkdir -p build
          cd build

          # Configure with CMake (fuzzers enabled)
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZERS=ON

          # Build fuzzers
          make fuzz_xrpc fuzz_cbor fuzz_http fuzz_auth -j$(sysctl -n hw.ncpu)

          # Copy to expected location
          cp fuzzing/fuzz_* ../fuzzing/ 2>/dev/null || true

      - name: Run Fuzzers
        run: |
          echo "=== Running XRPC fuzzer (60s) ==="
          ./fuzzing/fuzz_xrpc fuzzing/corpus_xrpc/ -max_total_time=60 -jobs=4

          echo "=== Running CBOR fuzzer (60s) ==="
          ./fuzzing/fuzz_cbor fuzzing/corpus_cbor/ -max_total_time=60 -jobs=4

          echo "=== Running HTTP fuzzer (60s) ==="
          ./fuzzing/fuzz_http fuzzing/corpus_http/ -max_total_time=60 -jobs=4

  # ============================================================================
  # JOB 3: Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install Homebrew dependencies
        run: |
          brew install xcodegen llvm@18

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /usr/local/Cellar/llvm
          key: homebrew-sec-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: |
            homebrew-sec-${{ runner.os }}-

      - name: Configure for Analysis
        run: |
          mkdir -p build
          cd build

          # Configure with CMake for analysis
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DBUILD_SECP256K1=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZERS=OFF

      - name: Clang-Tidy
        run: |
          export PATH="/usr/local/opt/llvm/bin:$PATH"
          cd build
          make help 2>/dev/null | grep -q clang-tidy || echo "No clang-tidy target available"
          # Note: clang-tidy integration would need custom targets in CMakeLists.txt

      - name: Static Analyzer
        run: |
          cd build
          # Use CMake to generate compilation database for clang-tidy
          scan-build make atprotopds-cli 2>&1 | tail -30 || true
