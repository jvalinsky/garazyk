name: Docs External Links Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  external-link-report:
    name: External Link Report (Non-Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Sync Repo Docs Metadata
        run: |
          deno run -A scripts/docs/repo_docs.ts sync

      - name: Generate External Link Report
        run: |
          deno run -A scripts/docs/repo_docs.ts validate --external-report

      - name: Upload External Link Report
        uses: actions/upload-artifact@v4
        with:
          name: docs-external-link-report
          path: docs/metadata/external-links-report.json
          retention-days: 14
