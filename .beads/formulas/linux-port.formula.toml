description = "Linux porting and robustness improvements for ATProtoPDS"
formula = "linux-port"
version = 1

[vars.version]
description = "Target version for the Linux port (e.g., 1.2.0)"
required = true

[[steps]]
id = "assess-current"
title = "Assess current Darwin/macOS implementation"
description = "Review current PDSNetworkTransport and identify platform-specific code that needs porting"

[[steps]]
id = "setup-linux-env"
title = "Set up Linux development environment"
description = "Configure CMake for Linux builds using GNUstep and libdispatch"

[[steps]]
id = "implement-transport"
title = "Implement PDSNetworkTransport for Linux"
description = "Port network transport layer to use Linux-compatible networking APIs"

[[steps]]
id = "update-build-system"
title = "Update CMake build system for cross-platform"
description = "Ensure CMakeLists.txt supports both Darwin and Linux targets"

[[steps]]
id = "add-cli-commands"
title = "Add CLI commands for account management"
description = "Implement getAllAccounts command and other administrative tasks"

[[steps]]
id = "run-tests-linux"
title = "Run test suite on Linux"
description = "Execute unit tests and fuzzers on Linux environment"

[[steps]]
id = "validate-robustness"
title = "Validate robustness improvements"
description = "Test error handling, memory management, and edge cases on Linux"