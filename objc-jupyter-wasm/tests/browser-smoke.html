<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Objective-C WASM Smoke</title>
    <style>
      body {
        color: #1d232a;
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 900px;
      }

      dl {
        display: grid;
        gap: 8px 16px;
        grid-template-columns: max-content minmax(0, 1fr);
      }

      dt {
        color: #56616f;
      }

      dd {
        margin: 0;
      }

      pre {
        background: #f4f6f8;
        border: 1px solid #d8dee6;
        border-radius: 6px;
        min-height: 44px;
        overflow: auto;
        padding: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body data-smoke-status="pending">
    <main>
      <h1>Objective-C</h1>
      <dl>
        <dt>Kernel</dt>
        <dd data-testid="kernel-spec">pending</dd>
        <dt>Info</dt>
        <dd data-testid="kernel-info-status">pending</dd>
        <dt>Execute</dt>
        <dd data-testid="execute-status">pending</dd>
      </dl>
      <pre data-testid="stream-output"></pre>
      <pre data-testid="result-output"></pre>
    </main>
    <script type="module" src="./browser-smoke-page.mjs"></script>
  </body>
</html>
