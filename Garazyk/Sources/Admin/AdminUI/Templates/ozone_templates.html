<div class="content-header">
  <h2>Communication Templates</h2>
  <p class="text-secondary">Create and manage moderation communication templates.</p>
</div>

<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Create New Template</h3>
  </div>
  <div class="card-body">
    <form class="form" hx-post="/admin/ozone/templates/create" hx-swap="outerHTML">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Template Name</label>
          <input type="text" name="id" class="form-input" required placeholder="account-takedown">
        </div>
        <div class="form-group">
          <label class="form-label">Subject</label>
          <input type="text" name="subject" class="form-input" required placeholder="Your account has been taken down">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Content (Markdown)</label>
          <textarea name="content" class="form-input" style="min-height: 120px;" required placeholder="# Account Takedown&#10;&#10;Your account was suspended due to..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Disabled</label>
          <select name="disabled" class="form-input">
            <option value="false">No (Active)</option>
            <option value="true">Yes (Disabled)</option>
          </select>
        </div>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Create Template</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Existing Templates</h3>
  </div>
  <div class="card-body">
    <div id="ozone-templates-list-container" hx-get="/admin/partials/ozone/templates/list" hx-trigger="load">
      <p class="text-secondary text-center">Loading templates...</p>
    </div>
  </div>
</div>
