<div class="content-header">
  <h1>DID Lookup</h1>
  <p class="text-secondary mt-sm">Resolve and inspect PLC Directory DIDs.</p>
</div>

<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Resolve DID</h3>
  </div>
  <div class="card-body">
    <form class="form" hx-get="/xrpc/com.atproto.identity.resolveDid" hx-target="#did-document">
      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label" for="did-input">DID</label>
          <input type="text" class="form-input" id="did-input" name="did" 
                 placeholder="did:plc:z72i7hdynmk6r22z27h6tvur">
        </div>
        <div class="form-group">
          <label class="form-label">&nbsp;</label>
          <button type="submit" class="btn btn-primary">Resolve</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">DID Document</h3>
  </div>
  <div class="card-body">
    <pre id="did-document" class="code-block">{{did_doc}}</pre>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Operation History</h3>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Seq</th>
            <th>Operation Type</th>
            <th>Timestamp</th>
            <th>CID</th>
          </tr>
        </thead>
        <tbody>
          {{#each operations}}
          <tr>
            <td>{{seq}}</td>
            <td>
              <span class="badge badge-primary">{{type}}</span>
            </td>
            <td class="text-secondary text-xs">{{timestamp}}</td>
            <td><code class="text-xs">{{cid}}</code></td>
          </tr>
          {{/each}}
        </tbody>
      </table>
    </div>
  </div>
</div>
