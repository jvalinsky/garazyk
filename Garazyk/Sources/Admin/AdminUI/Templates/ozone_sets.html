<div class="content-header">
  <h2>Moderation Sets</h2>
  <p class="text-secondary">Create and maintain reusable moderation sets.</p>
</div>

<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Create New Set</h3>
  </div>
  <div class="card-body">
    <form class="form" hx-post="/admin/ozone/sets/create" hx-swap="outerHTML">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Set Name</label>
          <input type="text" name="name" class="form-input" required placeholder="my-set">
        </div>
        <div class="form-group">
          <label class="form-label">Purpose</label>
          <select name="purpose" class="form-input">
            <option value="moderation">Moderation</option>
            <option value="curation">Curation</option>
            <option value="labels">Labels</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Description</label>
          <input type="text" name="description" class="form-input" placeholder="Description of this set">
        </div>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Create Set</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Existing Sets</h3>
  </div>
  <div class="card-body">
    <div id="ozone-sets-list-container" hx-get="/admin/partials/ozone/sets/list" hx-trigger="load">
      <p class="text-secondary text-center">Loading sets...</p>
    </div>
  </div>
</div>
