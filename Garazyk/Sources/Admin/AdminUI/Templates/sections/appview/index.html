<div class="content-header">
  <h2>Index Status</h2>
  <p class="text-secondary">View indexing statistics and search indexed content.</p>
</div>

<!-- Collection Statistics -->
<div class="grid-4 mb-lg" hx-get="/admin/appview/index/stats" hx-trigger="load, every 60s" hx-swap="outerHTML">
  <div class="stat-card">
    <div class="stat-label">Indexed Repos</div>
    <div class="stat-value">Loading...</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Posts</div>
    <div class="stat-value">Loading...</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Profiles</div>
    <div class="stat-value">Loading...</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Follows</div>
    <div class="stat-value">Loading...</div>
  </div>
</div>

<!-- Index Search -->
<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Search Index</h3>
  </div>
  <div class="card-body">
    <form class="form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Query</label>
          <input
            type="text"
            name="q"
            class="form-input"
            placeholder="Search posts..."
            hx-get="/xrpc/app.bsky.feed.searchPosts"
            hx-trigger="input changed debounce:500ms"
            hx-target="#search-results">
        </div>
      </div>
    </form>
    <div id="search-results" class="mt-md"></div>
  </div>
</div>

<!-- Indexed Repositories -->
<div class="table-wrapper">
  <table class="table">
    <thead>
      <tr>
        <th>Repository</th>
        <th>DID</th>
        <th>Handle</th>
        <th>Records</th>
        <th>Last Updated</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody hx-get="/admin/appview/index/repos" hx-trigger="load" hx-swap="innerHTML">
      <tr>
        <td colspan="6" class="text-secondary text-center p-lg">
          <div class="loading-indicator" style="margin: 0 auto;"></div>
          <p class="mt-sm">Loading repositories...</p>
        </td>
      </tr>
    </tbody>
  </table>
</div>
