<div class="content-header">
  <h2>Users</h2>
  <p class="text-secondary">Manage user accounts, deactivate, and delete users.</p>
</div>

<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Search Users</h3>
  </div>
  <div class="card-body">
    <form class="form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">DID or Handle</label>
          <input
            type="text"
            name="q"
            class="form-input"
            placeholder="did:plc:... or user@domain"
            hx-get="/admin/partials/users/search"
            hx-trigger="input changed debounce:500ms"
            hx-target="#users-list"
            autocomplete="off">
        </div>
      </div>
      <div class="form-help">Enter a DID or handle to search for users.</div>
    </form>
  </div>
</div>

<!-- Bulk Actions Bar -->
<div id="bulk-actions-bar" class="card mb-lg" style="display: none;">
  <div class="card-body" style="display: flex; align-items: center; gap: 16px;">
    <span id="selected-count">0 selected</span>
    <div class="btn-group">
      <button
        type="button"
        class="btn btn-warning"
        id="bulk-takedown-btn"
        hx-post="/admin/users/bulk/takedown"
        hx-include="input[name='selected_users']:checked"
        hx-confirm="Takedown all selected accounts?">
        Bulk Takedown
      </button>
      <button
        type="button"
        class="btn btn-destructive"
        id="bulk-delete-btn"
        hx-post="/admin/users/bulk/delete"
        hx-include="input[name='selected_users']:checked"
        hx-confirm="Permanently delete all selected accounts? This cannot be undone.">
        Bulk Delete
      </button>
    </div>
    <button type="button" class="btn btn-secondary" onclick="clearSelection()">Clear Selection</button>
  </div>
</div>

<div class="table-wrapper">
  <table class="table">
    <thead>
      <tr>
        <th><input type="checkbox" id="select-all-users" onchange="toggleSelectAll()" /></th>
        <th>DID</th>
        <th>Handle</th>
        <th>Email</th>
        <th>Status</th>
        <th>Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="users-list">
      <tr>
        <td colspan="7" class="text-secondary text-center p-lg">
          Enter a search query to load users.
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script>
function toggleSelectAll() {
  const selectAll = document.getElementById('select-all-users');
  const checkboxes = document.querySelectorAll('.user-checkbox');
  checkboxes.forEach(cb => cb.checked = selectAll.checked);
  updateBulkActions();
}

function updateBulkActions() {
  const checked = document.querySelectorAll('.user-checkbox:checked');
  const bar = document.getElementById('bulk-actions-bar');
  const count = document.getElementById('selected-count');
  if (checked.length > 0) {
    bar.style.display = 'block';
    count.textContent = checked.length + ' selected';
  } else {
    bar.style.display = 'none';
  }
}

function clearSelection() {
  document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = false);
  document.getElementById('select-all-users').checked = false;
  document.getElementById('bulk-actions-bar').style.display = 'none';
}

// Listen for checkbox changes
document.addEventListener('change', function(e) {
  if (e.target.classList.contains('user-checkbox')) {
    updateBulkActions();
  }
});
</script>

<!-- User Action Modal -->
<dialog id="user-action-modal" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 class="modal-title">User Action</h2>
      <button
        type="button"
        class="btn btn-icon"
        onclick="document.getElementById('user-action-modal').close()">
        ✕
      </button>
    </div>
    <div class="modal-body" id="user-action-content">
      <!-- Content will be loaded here -->
    </div>
  </div>
</dialog>
