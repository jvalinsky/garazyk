<div class="content-header">
  <h1>Identity</h1>
  <p class="text-secondary mt-sm">Manage DID resolution and handle updates.</p>
</div>

<div class="grid-2 mb-lg">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">DID Resolution</h3>
    </div>
    <div class="card-body">
      <form class="form" hx-get="/admin/identity/resolve" hx-target="#did-result">
        <div class="form-group">
          <label class="form-label" for="did-input">DID</label>
          <input type="text" class="form-input" id="did-input" name="did" 
                 placeholder="did:plc:z72i7hdynmk6r22z27h6tvur">
        </div>
        <button type="submit" class="btn btn-primary">Resolve DID</button>
      </form>
      <div id="did-result" class="mt-md"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Handle Lookup</h3>
    </div>
    <div class="card-body">
      <form class="form" hx-get="/admin/identity/resolve-handle" hx-target="#handle-result">
        <div class="form-group">
          <label class="form-label" for="handle-input">Handle</label>
          <input type="text" class="form-input" id="handle-input" name="handle" 
                 placeholder="user.bsky.social">
        </div>
        <button type="submit" class="btn btn-primary">Lookup Handle</button>
      </form>
      <div id="handle-result" class="mt-md"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Update Handle</h3>
  </div>
  <div class="card-body">
    <form class="form" hx-post="/admin/identity/update-handle" hx-swap="innerHTML">
      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label" for="update-did">DID</label>
          <input type="text" class="form-input" id="update-did" name="did" 
                 placeholder="did:plc:...">
        </div>
        <div class="form-group flex-1">
          <label class="form-label" for="new-handle">New Handle</label>
          <input type="text" class="form-input" id="new-handle" name="handle" 
                 placeholder="new-handle.bsky.social">
        </div>
        <div class="form-group">
          <label class="form-label">&nbsp;</label>
          <button type="submit" class="btn btn-primary">Update</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="card mt-lg">
  <div class="card-header">
    <h3 class="card-title">Recent Operations</h3>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>DID</th>
            <th>Operation</th>
            <th>Timestamp</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {{#each recent_ops}}
          <tr>
            <td><code class="text-xs">{{did}}</code></td>
            <td>{{operation}}</td>
            <td class="text-secondary text-xs">{{timestamp}}</td>
            <td>
              {{#if success}}
              <span class="badge badge-success">Success</span>
              {{else}}
              <span class="badge badge-destructive">Failed</span>
              {{/if}}
            </td>
          </tr>
          {{/each}}
        </tbody>
      </table>
    </div>
  </div>
</div>
