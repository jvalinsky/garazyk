<div class="table-wrapper">
  <table class="table">
    <thead>
      <tr>
        <th>DID</th>
        <th>Verified At</th>
        <th>Granted By</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {{#each verifications}}
      <tr>
        <td class="text-xs"><code>{{did}}</code></td>
        <td class="text-xs">{{verified_at}}</td>
        <td class="text-xs">{{granted_by}}</td>
        <td>
          <button class="btn btn-sm btn-destructive"
                  data-action="ozone-verification-revoke"
                  data-did="{{did}}">
            Revoke
          </button>
        </td>
      </tr>
      {{/each}}
      {{#if has_verifications}}
      {{else}}
      <tr>
        <td colspan="4" class="text-center text-secondary">No verified accounts found.</td>
      </tr>
      {{/if}}
    </tbody>
  </table>
</div>
