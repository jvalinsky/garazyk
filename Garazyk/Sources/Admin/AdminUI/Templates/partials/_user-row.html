<tr>
  <td style="width: 40px;"><input type="checkbox" class="user-checkbox" data-did="{{did}}"></td>
  <td><code class="code-sm">{{did}}</code></td>
  <td>{{handle}}</td>
  <td>{{email}}</td>
  <td>
    {{#if active}}
      <span class="badge badge-success">Active</span>
    {{else}}
      <span class="badge badge-secondary">Inactive</span>
    {{/if}}
  </td>
  <td><small>{{createdAt}}</small></td>
  <td>
    <div class="btn-group">
      <button
        type="button"
        class="btn btn-sm btn-secondary"
        data-action="view-user"
        data-did="{{did}}">
        View
      </button>
      {{#if active}}
        <button
          type="button"
          class="btn btn-sm btn-destructive"
          data-action="deactivate-user"
          data-did="{{did}}">
          Deactivate
        </button>
      {{/if}}
    </div>
  </td>
</tr>
