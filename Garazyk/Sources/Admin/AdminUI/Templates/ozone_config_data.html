<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Server Config</h3>
    <button class="btn btn-sm btn-primary" data-action="ozone-config-update">Update JSON</button>
  </div>
  <div class="card-body">
    <pre class="code-block" id="ozone-config-json">{{config_pretty}}</pre>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Setting Options</h3>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Key</th>
            <th>Value</th>
            <th>Scope</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#each options}}
          <tr>
            <td class="text-xs"><code>{{key}}</code></td>
            <td class="text-xs">{{value}}</td>
            <td>{{scope}}</td>
            <td>
              <button class="btn btn-xs btn-destructive"
                      data-action="ozone-setting-remove"
                      data-key="{{key}}">
                Remove
              </button>
            </td>
          </tr>
          {{/each}}
          {{#if has_options}}
          {{else}}
          <tr>
            <td colspan="4" class="text-center text-secondary">No options configured.</td>
          </tr>
          {{/if}}
        </tbody>
      </table>
    </div>
  </div>
</div>
