<div class="table-wrapper">
  <table class="table">
    <thead>
      <tr>
        <th>DID</th>
        <th>Role</th>
        <th>Joined</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {{#each members}}
      <tr>
        <td class="text-xs"><code>{{did}}</code></td>
        <td><span class="badge">{{role}}</span></td>
        <td class="text-xs">{{joined_at}}</td>
        <td>
          <div class="btn-group">
            <button class="btn btn-xs"
                    data-action="ozone-team-edit"
                    data-email="{{email}}"
                    data-role="{{role}}">
              Edit
            </button>
            <button class="btn btn-xs btn-destructive"
                    data-action="ozone-team-delete"
                    data-id="{{did}}"
                    data-email="{{email}}"
                    data-did="{{did}}">
              Remove
            </button>
          </div>
        </td>
      </tr>
      {{/each}}
      {{#if members.length}}
      {{else}}
      <tr>
        <td colspan="4" class="text-center text-secondary">No team members found.</td>
      </tr>
      {{/if}}
    </tbody>
  </table>
</div>
<div class="mt-lg">
  <button class="btn btn-primary" data-action="ozone-team-add">Add Team Member</button>
</div>
