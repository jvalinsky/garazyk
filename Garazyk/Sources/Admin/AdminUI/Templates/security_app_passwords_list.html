<div class="card">
  <div class="card-header">
    <h4>App Passwords for <code>{{did}}</code></h4>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Created</th>
            <th>Privileged</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#each app_passwords}}
          <tr>
            <td><strong>{{name}}</strong></td>
            <td class="text-xs">{{created_at}}</td>
            <td>{{#if privileged}}<span class="badge badge-warning">Yes</span>{{else}}No{{/if}}</td>
            <td>
              <button class="btn btn-sm btn-destructive" data-action="security-revoke-app-password" data-id="{{id}}" data-did="{{did}}">Revoke</button>
            </td>
          </tr>
          {{/each}}
          {{#if app_passwords.length}}
          {{else}}
          <tr>
            <td colspan="4" class="text-center text-secondary">No application passwords found.</td>
          </tr>
          {{/if}}
        </tbody>
      </table>
    </div>
  </div>
</div>
