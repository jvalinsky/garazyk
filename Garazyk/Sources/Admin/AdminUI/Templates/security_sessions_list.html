<div class="card">
  <div class="card-header flex justify-between items-center">
    <h4>Sessions for <code>{{did}}</code></h4>
    <button class="btn btn-xs btn-destructive" 
            hx-post="/admin/security/sessions/{{did}}/revoke-all"
            hx-confirm="Revoke all sessions for this user?"
            hx-swap="outerHTML">
      Revoke All
    </button>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Token (Prefix)</th>
            <th>Created</th>
            <th>Expires</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#each sessions}}
          <tr>
            <td class="text-xs"><code>{{token_prefix}}...</code></td>
            <td class="text-xs">{{created_at}}</td>
            <td class="text-xs">{{expires_at}}</td>
            <td>
              <button class="btn btn-xs btn-destructive" 
                      hx-post="/admin/security/sessions/{{did}}/revoke/{{token}}"
                      hx-confirm="Revoke this session?"
                      hx-swap="outerHTML">
                Revoke
              </button>
            </td>
          </tr>
          {{/each}}
          {{#if sessions.length}}
          {{else}}
          <tr>
            <td colspan="4" class="text-center text-secondary">No active sessions found.</td>
          </tr>
          {{/if}}
        </tbody>
      </table>
    </div>
  </div>
</div>
