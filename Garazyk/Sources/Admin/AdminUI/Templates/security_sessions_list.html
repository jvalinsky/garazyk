<div class="card">
  <div class="card-header flex justify-between items-center">
    <h4>Sessions for <code>{{did}}</code></h4>
    <button class="btn btn-xs btn-destructive" data-action="security-revoke-all" data-did="{{did}}">Revoke All</button>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Token (Prefix)</th>
            <th>Created</th>
            <th>Expires</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#each sessions}}
          <tr>
            <td class="text-xs"><code>{{token}}...</code></td>
            <td class="text-xs">{{created_at}}</td>
            <td class="text-xs">{{expires_at}}</td>
            <td>
              <button class="btn btn-xs btn-destructive" data-action="security-revoke-session" data-token="{{token}}">Revoke</button>
            </td>
          </tr>
          {{/each}}
          {{#if sessions.length}}
          {{else}}
          <tr>
            <td colspan="4" class="text-center text-secondary">No active sessions found.</td>
          </tr>
          {{/if}}
        </tbody>
      </table>
    </div>
  </div>
</div>
