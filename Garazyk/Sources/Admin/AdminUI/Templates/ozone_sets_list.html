<div class="table-wrapper">
  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Members</th>
        <th>Created By</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {{#each sets}}
      <tr>
        <td><strong>{{name}}</strong></td>
        <td class="text-xs">{{description}}</td>
        <td>{{memberCount}}</td>
        <td class="text-xs">{{created_by}}</td>
        <td>
          <div class="btn-group">
            <button class="btn btn-xs"
                    data-action="ozone-set-edit"
                    data-id="{{id}}"
                    data-name="{{name}}">
              Edit
            </button>
            <button class="btn btn-xs btn-destructive" data-action="ozone-set-delete" data-id="{{id}}">Delete</button>
          </div>
        </td>
      </tr>
      {{/each}}
      {{#if sets.length}}
      {{else}}
      <tr>
        <td colspan="5" class="text-center text-secondary">No moderation sets found.</td>
      </tr>
      {{/if}}
    </tbody>
  </table>
</div>
<div class="mt-lg">
  <button class="btn btn-primary" data-action="ozone-set-create">Create New Set</button>
</div>
