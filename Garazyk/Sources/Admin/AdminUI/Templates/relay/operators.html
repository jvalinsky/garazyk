<div class="content-header">
  <h2>Sync Operator Controls</h2>
  <p class="text-secondary">Manual controls for host sync, crawl requests, and repo status checks.</p>
</div>

<div class="grid-2 mb-lg">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Host Operations</h3>
    </div>
    <div class="card-body">
      <label class="form-label" for="sync-hostname-input">Hostname</label>
      <input id="sync-hostname-input" class="form-input" type="text" placeholder="pds.garazyk.xyz">
      <div class="btn-group mt-sm">
        <button class="btn btn-secondary" data-action="sync-list-hosts">List Hosts</button>
        <button class="btn btn-secondary" data-action="sync-get-host-status">Get Host Status</button>
        <button class="btn btn-primary" data-action="sync-request-crawl">Request Crawl</button>
        <button class="btn" data-action="sync-notify-update">Notify Update</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Repo Status</h3>
    </div>
    <div class="card-body">
      <label class="form-label" for="sync-repo-did-input">Repository DID</label>
      <input id="sync-repo-did-input" class="form-input" type="text" placeholder="did:plc:...">
      <button class="btn btn-primary mt-sm" data-action="sync-get-repo-status">Get Repo Status</button>
      <pre id="sync-repo-output" class="code-block mt-md">{}</pre>
    </div>
  </div>
</div>

<div class="card mb-lg">
  <div class="card-header">
    <h3 class="card-title">Known Hosts</h3>
  </div>
  <div class="card-body">
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Hostname</th>
            <th>Status</th>
            <th>Seq</th>
            <th>Account Count</th>
          </tr>
        </thead>
        <tbody id="sync-hosts-list">
          <tr>
            <td colspan="4" class="text-center text-secondary">Use "List Hosts" to load data.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Action Output</h3>
  </div>
  <div class="card-body">
    <pre id="sync-action-output" class="code-block">{}</pre>
  </div>
</div>
