<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>AT Protocol Admin UI</title>

  <!-- Shared Design System (all tokens, layout, components, utilities) -->
  <link rel="stylesheet" href="css/shared/system.css">

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>
  <!-- Skip Links for Accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <a href="#section-nav" class="skip-link">Skip to navigation</a>

  <!-- Header / Toolbar -->
  <header role="banner">
    <nav role="navigation" aria-label="Service navigation" class="toolbar toolbar-blur">
      <div class="toolbar-section">
        <button class="btn-secondary btn-sm" id="nav-toggle" aria-label="Toggle navigation">
          ≡
        </button>
        <!-- Strawberry icon - Polish motif (truskawka) -->
        <svg class="strawberry-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 4c-1.5 2-3 4-3 7s2.5 6 3 6 3-3 3-6-1.5-5-3-7z" fill="#e63946"/>
          <path d="M10.5 6c.5-1 1.5-1 1.5-1s1 0 1.5 1" stroke="#2d6a4f" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <div class="toolbar-section">
        <div class="service-segments" id="service-segments" role="tablist">
          <button class="service-segment active" data-service="pds" role="tab" aria-selected="true">
            PDS
          </button>
          <button class="service-segment" data-service="plc" role="tab" aria-selected="false">
            PLC
          </button>
          <button class="service-segment" data-service="relay" role="tab" aria-selected="false">
            Relay
          </button>
          <button class="service-segment" data-service="appview" role="tab" aria-selected="false">
            AppView
          </button>
          <button class="service-segment" data-service="chat" role="tab" aria-selected="false">
            Chat
          </button>
          <button class="service-segment" data-service="ozone" role="tab" aria-selected="false">
            Ozone
          </button>
          <button class="service-segment" data-service="security" role="tab" aria-selected="false">
            Security
          </button>
        </div>
      </div>

      <div class="toolbar-section">
        <button class="btn-secondary btn-sm" aria-label="Help" title="Help">
          ?
        </button>
        <button class="btn-secondary btn-sm" aria-label="Settings" title="Settings">
          ⚙
        </button>
        <button class="btn-secondary btn-sm" aria-label="User menu" title="User">
          👤
        </button>
      </div>
    </nav>
  </header>

  <!-- Main layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <aside id="section-nav" role="complementary" aria-label="Section navigation" class="sidebar-blur">
      <div class="sidebar" id="sidebar">
        <!-- PDS Section -->
        <div class="sidebar-section" data-service="pds">
          <button class="sidebar-section-title" aria-expanded="true" aria-controls="pds-items">
            <span>PDS</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items" id="pds-items">
            <a href="/explore" class="sidebar-item no-htmx">
              PDS Explorer
            </a>
            <button class="sidebar-item" hx-get="/admin/partials/users" hx-target="#content-pane" hx-push-url="/admin/users">
              Users
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/invites" hx-target="#content-pane" hx-push-url="/admin/invites">
              Invites
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/blobs" hx-target="#content-pane" hx-push-url="/admin/blobs">
              Blobs
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/identity" hx-target="#content-pane" hx-push-url="/admin/identity">
              Identity
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/health" hx-target="#content-pane" hx-push-url="/admin/health">
              Health
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/reports" hx-target="#content-pane" hx-push-url="/admin/reports">
              Reports
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/audit-log" hx-target="#content-pane" hx-push-url="/admin/audit-log">
              Audit Log
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/hosting-history" hx-target="#content-pane" hx-push-url="/admin/hosting-history">
              Hosting History
            </button>
          </div>
        </div>

        <!-- Diagnostics Section -->
        <div class="sidebar-section" data-service="pds">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="diagnostics-items">
            <span>Diagnostics</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="diagnostics-items">
            <button class="sidebar-item" hx-get="/admin/partials/diagnostics/overview" hx-target="#content-pane" hx-push-url="/admin/diagnostics">
              Overview
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/diagnostics/sequencer" hx-target="#content-pane" hx-push-url="/admin/diagnostics/sequencer">
              Sequencer Health
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/diagnostics/blobs" hx-target="#content-pane" hx-push-url="/admin/diagnostics/blobs">
              Blob Audits
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/diagnostics/ratelimits" hx-target="#content-pane" hx-push-url="/admin/diagnostics/ratelimits">
              Rate Limits
            </button>
          </div>
        </div>

        <!-- PLC Section -->
        <div class="sidebar-section" data-service="plc">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="plc-items">
            <span>PLC</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="plc-items">
            <button class="sidebar-item" hx-get="/admin/partials/plc/lookup" hx-target="#content-pane" hx-push-url="/admin/plc/lookup">
              DID Lookup
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/plc/export" hx-target="#content-pane" hx-push-url="/admin/plc/export">
              Export
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/plc/metrics" hx-target="#content-pane" hx-push-url="/admin/plc/metrics">
              Metrics
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/plc/operations" hx-target="#content-pane" hx-push-url="/admin/plc/operations">
              Operations
            </button>
          </div>
        </div>

        <!-- Relay Section -->
        <div class="sidebar-section" data-service="relay">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="relay-items">
            <span>Relay</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="relay-items">
            <button class="sidebar-item" hx-get="/admin/partials/relay/upstreams" hx-target="#content-pane" hx-push-url="/admin/relay/upstreams">
              Upstreams
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/relay/events" hx-target="#content-pane" hx-push-url="/admin/relay/events">
              Events
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/relay/crawl" hx-target="#content-pane" hx-push-url="/admin/relay/crawl">
              Crawl Queue
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/relay/operators" hx-target="#content-pane" hx-push-url="/admin/relay/operators">
              Operators
            </button>
          </div>
        </div>

        <!-- AppView Section -->
        <div class="sidebar-section" data-service="appview">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="appview-items">
            <span>AppView</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="appview-items">
            <button class="sidebar-item" hx-get="/admin/partials/appview/backfill" hx-target="#content-pane" hx-push-url="/admin/appview/backfill">
              Backfill
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/appview/index" hx-target="#content-pane" hx-push-url="/admin/appview/index">
              Index
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/appview/metrics" hx-target="#content-pane" hx-push-url="/admin/appview/metrics">
              Metrics
            </button>
          </div>
        </div>

        <!-- Chat Section -->
        <div class="sidebar-section" data-service="chat">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="chat-items">
            <span>Chat</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="chat-items">
            <button class="sidebar-item" hx-get="/admin/partials/chat/convos" hx-target="#content-pane" hx-push-url="/admin/chat/convos">
              Conversations
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/chat/groups" hx-target="#content-pane" hx-push-url="/admin/chat/groups">
              Groups
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/chat/invite-links" hx-target="#content-pane" hx-push-url="/admin/chat/invite-links">
              Invite Links
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/chat/messages" hx-target="#content-pane" hx-push-url="/admin/chat/messages">
              Messages
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/chat/reports" hx-target="#content-pane" hx-push-url="/admin/chat/reports">
              Reports
            </button>
          </div>
        </div>

        <!-- Ozone Section -->
        <div class="sidebar-section" data-service="ozone">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="ozone-items">
            <span>Ozone</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="ozone-items">
            <button class="sidebar-item" hx-get="/admin/partials/ozone/events" hx-target="#content-pane" hx-push-url="/admin/ozone/events">
              Mod Events
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/statuses" hx-target="#content-pane" hx-push-url="/admin/ozone/statuses">
              Subject Status
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/sets" hx-target="#content-pane" hx-push-url="/admin/ozone/sets">
              Moderation Sets
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/correlations" hx-target="#content-pane" hx-push-url="/admin/ozone/correlations">
              Correlations
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/verification" hx-target="#content-pane" hx-push-url="/admin/ozone/verification">
              Verification
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/team" hx-target="#content-pane" hx-push-url="/admin/ozone/team">
              Team
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/templates" hx-target="#content-pane" hx-push-url="/admin/ozone/templates">
              Templates
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/safelinks" hx-target="#content-pane" hx-push-url="/admin/ozone/safelinks">
              Safe Links
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/scheduled" hx-target="#content-pane" hx-push-url="/admin/ozone/scheduled">
              Scheduled
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/ozone/config" hx-target="#content-pane" hx-push-url="/admin/ozone/config">
              Config
            </button>
          </div>
        </div>

        <!-- Security Section -->
        <div class="sidebar-section" data-service="security">
          <button class="sidebar-section-title" aria-expanded="false" aria-controls="security-items">
            <span>Security</span>
            <span class="sidebar-section-toggle">▶</span>
          </button>
          <div class="sidebar-items hidden" id="security-items">
            <button class="sidebar-item" hx-get="/admin/partials/security/sessions" hx-target="#content-pane" hx-push-url="/admin/security/sessions">
              Active Sessions
            </button>
            <button class="sidebar-item" hx-get="/admin/partials/security/app-passwords" hx-target="#content-pane" hx-push-url="/admin/security/app-passwords">
              App Passwords
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content area with optional inspector pane -->
    <main id="main-content" role="main" aria-label="Content area">
      <div class="content-area" id="content-area">
        <div class="content-pane" id="content-pane" hx-get="/admin/partials/overview" hx-trigger="load">
          <!-- Will be replaced by overview partial -->
          <div class="p-lg text-secondary text-center" role="status" aria-live="polite">Loading dashboard...</div>
        </div>
      </div>
      <!-- Inspector pane - shows selected item details -->
      <aside class="inspector-pane" id="inspector-pane" aria-label="Inspector" hidden>
        <div class="inspector-header">
          <span class="inspector-title" id="inspector-title">Inspector</span>
          <button class="btn-close-inline" data-action="close-inspector" aria-label="Close inspector">×</button>
        </div>
        <div class="inspector-content" id="inspector-content">
          <!-- Inspector content loaded dynamically -->
        </div>
      </aside>
    </main>
  </div>

  <!-- Footer / Status bar -->
  <footer role="contentinfo">
    <div class="status-bar-item">
      <span class="status-indicator connected"></span>
      <span>Connected</span>
    </div>
    <div class="status-bar-item">
      <span>Last sync: <span id="last-sync">--:--:--</span></span>
    </div>
    <div class="status-bar-item text-secondary">
      <small><span class="version-info">1.0.0</span></small>
    </div>
  </footer>

  <!-- Admin Login Panel -->
  <div id="admin-login-panel" class="admin-login-panel hidden">
    <div class="admin-login-backdrop" data-action="hide-login-panel"></div>
    <div class="admin-login-window">
      <div class="title-bar">
        <span class="title">Admin Login</span>
      </div>
      <div class="window-body">
        <div class="field-row-stacked">
          <label for="admin-password">Password:</label>
          <input type="password" id="admin-password" class="w-full">
        </div>
        <div id="admin-login-error" class="auth-error"></div>
        <div class="field-row justify-end mt-md">
          <button id="admin-login-btn" class="btn btn-primary">Login</button>
        </div>
      </div>
    </div>
  </div>

  <div id="admin-a11y-status" class="sr-only" aria-live="polite"></div>

<!-- Scripts -->
  <script type="module" src="js/app.js"></script>

  <!-- HTMX error handling for 401 auth required -->
  <script>
    document.addEventListener('htmx:responseError', function(evt) {
      if (evt.detail.xhr && evt.detail.xhr.status === 401) {
        evt.preventDefault();
        // Check if already have token - if not, show login panel
        if (!sessionStorage.getItem('admin_token')) {
          AdminAuth.showLoginPanel();
          return;
        }
        const target = evt.detail.target;
        if (target) {
          target.innerHTML = `<div class="empty-state empty-state-auth">
            <div class="empty-state-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <h3 class="empty-state-title">Sign In Required</h3>
            <p class="empty-state-description">You must be authenticated to view this resource.</p>
            <div class="empty-state-actions">
              <a href="/admin" class="btn btn-primary">Sign In</a>
            </div>
          </div>`;
        }
      }
    });

    // Also handle 401 on swap errors
    document.addEventListener('htmx:afterSwap', function(evt) {
      const target = evt.detail.target;
      if (target && target.textContent && target.textContent.includes('401')) {
        target.innerHTML = `<div class="empty-state empty-state-auth">
          <div class="empty-state-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h3 class="empty-state-title">Sign In Required</h3>
          <p class="empty-state-description">You must be authenticated to view this resource.</p>
          <div class="empty-state-actions">
            <a href="/admin" class="btn btn-primary">Sign In</a>
          </div>
        </div>`;
      }
    });
  </script>
</body>
</html>
