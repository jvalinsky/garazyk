<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{csrf_token}}">
    <title>Authorize Access - Kaszlak</title>
    <link rel="stylesheet" href="/css/shared/system.css">
</head>

<body class="auth-page">
    <main class="auth-container">
        <section class="card auth-card" aria-labelledby="auth-title">
            <header class="auth-card-header">
                <h1 id="auth-title" class="auth-title">Authorization</h1>
            </header>

            <div class="auth-card-body">
                <div id="auth-step-signin">
                    <div class="client-info">
                        <h2 id="client-name">Application</h2>
                        <p>wants to access your ATProto account.</p>
                        <p>Please sign in to continue.</p>
                    </div>

                    <div class="field-row-stacked">
                        <label class="form-label" for="auth-handle">Handle</label>
                        <input class="form-input" type="text" id="auth-handle" placeholder="alice.test">
                    </div>
                    <div class="field-row-stacked">
                        <label class="form-label" for="auth-password">Password</label>
                        <input class="form-input" type="password" id="auth-password" placeholder="••••••••">
                    </div>

                    <div id="auth-error" class="auth-error"></div>

                    <div class="actions">
                        <button class="btn btn-secondary" id="auth-cancel-btn">Cancel</button>
                        <button class="btn btn-primary" id="auth-signin-btn">Sign In</button>
                    </div>

                    <div class="auth-divider"><span>or</span></div>

                    <div id="auth-passkey-section">
                        <button class="btn btn-secondary auth-passkey-btn" id="auth-passkey-btn">
                            Sign in with Passkey
                        </button>
                    </div>
                </div>

                <div id="auth-step-consent" class="hidden">
                    <div class="client-info">
                        <h2 id="consent-client-name">Application</h2>
                        <p>would like to access your account.</p>
                    </div>

                    <p class="signed-in-as">
                        Signed in as <strong id="consent-handle"></strong>
                    </p>

                    <p>This application will be able to:</p>
                    <ul class="scope-list" id="scope-list"></ul>

                    <p class="auth-note">Make sure you trust this application before authorizing.</p>

                    <div class="actions">
                        <form action="/oauth/authorize/confirm" method="POST">
                            <input type="hidden" name="client_id" value="{{client_id}}">
                            <input type="hidden" name="state" value="{{state}}">
                            <input type="hidden" name="scope" value="{{scope}}">
                            <input type="hidden" name="redirect_uri" value="{{redirect_uri}}">
                            <input type="hidden" name="response_type" value="{{response_type}}">
                            <input type="hidden" name="code_challenge" value="{{code_challenge}}">
                            <input type="hidden" name="code_challenge_method" value="{{code_challenge_method}}">
                            <input type="hidden" name="nonce" value="{{nonce}}">
                            <input type="hidden" name="login_hint" value="{{login_hint}}">
                            <input type="hidden" name="session_token" value="">
                            <input type="hidden" name="decision" value="allow">
                            <button type="submit" class="btn btn-primary">Authorize</button>
                        </form>

                        <form action="/oauth/authorize/confirm" method="POST">
                            <input type="hidden" name="client_id" value="{{client_id}}">
                            <input type="hidden" name="state" value="{{state}}">
                            <input type="hidden" name="redirect_uri" value="{{redirect_uri}}">
                            <input type="hidden" name="login_hint" value="{{login_hint}}">
                            <input type="hidden" name="decision" value="deny">
                            <button type="submit" class="btn btn-secondary">Cancel</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('client_id') || 'Unknown App';
        const scopeStr = params.get('scope') || 'atproto';
        const loginHint = params.get('login_hint');

        // Populate client names
        document.getElementById('client-name').textContent = clientId;
        document.getElementById('consent-client-name').textContent = clientId;

        // Pre-fill handle from login_hint
        const handleInput = document.getElementById('auth-handle');
        if (loginHint) {
            handleInput.value = loginHint;
            handleInput.readOnly = true;
            handleInput.classList.add('input-readonly');
        }

        // Populate scope list
        const scopeList = document.getElementById('scope-list');
        const scopeDescriptions = {
            'atproto': 'Full access to your account',
            'transition:generic': 'Access to your account data',
            'transition:chat.bsky': 'Access to your chats',
            'repo:write': 'Write to your repository',
            'repo:read': 'Read your repository',
            'email:read': 'Read your email address',
            'email:manage': 'Manage your email settings',
            'identity': 'Access your identity information',
            'account': 'Manage your account settings',
            'chat.bsky.convo': 'Access your conversations',
            'chat.bsky.moderation': 'Moderate chat content'
        };
        scopeStr.split(' ').forEach(s => {
            const li = document.createElement('li');
            li.textContent = scopeDescriptions[s] || s;
            scopeList.appendChild(li);
        });

        // Sign-in button
        document.getElementById('auth-signin-btn').addEventListener('click', async () => {
            const handle = handleInput.value.trim();
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');

            if (!handle || !password) {
                errorEl.textContent = 'Please enter your handle and password.';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            document.getElementById('auth-signin-btn').disabled = true;
            document.getElementById('auth-signin-btn').textContent = 'Signing in…';

            try {
                const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
                const resp = await fetch('/oauth/authorize/sign-in', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRF-Token': csrfToken
                    },
                    body: new URLSearchParams({ handle, password }).toString()
                });

                const data = await resp.json();

                if (data.ok) {
                    // Success — transition to consent step
                    document.getElementById('consent-handle').textContent = handle;
                    // Inject session token into both consent forms
                    document.querySelectorAll('input[name="session_token"]').forEach(el => {
                        el.value = data.session_token || '';
                    });
                    document.getElementById('auth-step-signin').style.display = 'none';
                    document.getElementById('auth-step-consent').style.display = 'block';
                } else {
                    errorEl.textContent = data.error || 'Invalid credentials';
                    errorEl.style.display = 'block';
                    document.getElementById('auth-signin-btn').disabled = false;
                    document.getElementById('auth-signin-btn').textContent = 'Sign In';
                }
            } catch (e) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
                document.getElementById('auth-signin-btn').disabled = false;
                document.getElementById('auth-signin-btn').textContent = 'Sign In';
            }
        });

        // Enter key on password field
        document.getElementById('auth-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('auth-signin-btn').click();
        });

        // Cancel button on sign-in step — redirect back with access_denied
        document.getElementById('auth-cancel-btn').addEventListener('click', () => {
            const redirectUri = params.get('redirect_uri');
            const state = params.get('state');
            if (redirectUri) {
                const url = new URL(redirectUri);
                url.searchParams.set('error', 'access_denied');
                url.searchParams.set('error_description', 'User cancelled');
                if (state) url.searchParams.set('state', state);
                window.location.href = url.href;
            } else {
                window.history.back();
            }
        });

        // --- Passkey (WebAuthn) sign-in ---
        const passkeyBtn = document.getElementById('auth-passkey-btn');
        const passkeySection = document.getElementById('auth-passkey-section');

        // Hide passkey option if WebAuthn is not supported
        if (!window.PublicKeyCredential) {
            document.querySelector('.auth-divider').style.display = 'none';
            passkeySection.style.display = 'none';
        }

        function base64urlDecode(str) {
            // Pad with = to make length a multiple of 4
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) str += '=';
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        function base64urlEncode(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        passkeyBtn.addEventListener('click', async () => {
            const handle = handleInput.value.trim();
            const errorEl = document.getElementById('auth-error');

            if (!handle) {
                errorEl.textContent = 'Please enter your handle to sign in with a passkey.';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            passkeyBtn.disabled = true;
            passkeyBtn.textContent = 'Signing in…';

            try {
                // Step 1: Resolve handle → DID
                const resolveResp = await fetch('/xrpc/com.atproto.identity.resolveHandle?handle=' + encodeURIComponent(handle));
                if (!resolveResp.ok) {
                    throw new Error('Could not resolve handle. Please check your handle.');
                }
                const resolveData = await resolveResp.json();
                const did = resolveData.did;
                if (!did) {
                    throw new Error('Could not resolve handle to a DID.');
                }

                // Step 2: Request passkey challenge
                const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
                const challengeResp = await fetch('/oauth/authorize/passkey/challenge', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    body: JSON.stringify({ did })
                });
                const challengeData = await challengeResp.json();
                if (!challengeData.challenge || !challengeData.sessionId) {
                    throw new Error(challengeData.error || 'Failed to get passkey challenge');
                }

                // Step 3: Authenticate with WebAuthn
                const credential = await navigator.credentials.get({
                    publicKey: {
                        challenge: base64urlDecode(challengeData.challenge),
                        rpId: challengeData.rpId || window.location.hostname,
                        userVerification: 'preferred',
                        allowCredentials: [] // Discoverable credentials (passkeys)
                    }
                });

                // Step 4: Submit assertion
                const assertion = {
                    id: credential.id,
                    rawId: base64urlEncode(credential.rawId),
                    response: {
                        authenticatorData: base64urlEncode(credential.response.authenticatorData),
                        clientDataJSON: base64urlEncode(credential.response.clientDataJSON),
                        signature: base64urlEncode(credential.response.signature),
                        userHandle: credential.response.userHandle
                            ? base64urlEncode(credential.response.userHandle)
                            : null
                    },
                    type: credential.type
                };

                const signinResp = await fetch('/oauth/authorize/passkey', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    body: JSON.stringify({
                        sessionId: challengeData.sessionId,
                        assertion: assertion,
                        did: did
                    })
                });
                const signinData = await signinResp.json();

                if (signinData.ok) {
                    // Success — transition to consent step
                    document.getElementById('consent-handle').textContent = handle;
                    document.querySelectorAll('input[name="session_token"]').forEach(el => {
                        el.value = signinData.session_token || '';
                    });
                    document.getElementById('auth-step-signin').style.display = 'none';
                    document.getElementById('auth-step-consent').style.display = 'block';
                } else {
                    throw new Error(signinData.error || 'Passkey authentication failed');
                }
            } catch (e) {
                let msg = e.message || 'Passkey sign-in failed';
                if (e.name === 'NotAllowedError') {
                    msg = 'Passkey operation was cancelled or not allowed.';
                } else if (e.name === 'SecurityError') {
                    msg = 'Security error during passkey authentication.';
                }
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
                passkeyBtn.disabled = false;
                passkeyBtn.textContent = 'Sign in with Passkey';
            }
        });
    </script>
</body>

</html>
