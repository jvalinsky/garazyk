services:
  pds:
    build:
      context: .
      dockerfile: docker/Dockerfile.gnustep
    image: nspds:local
    container_name: nspds
    ports:
      - "2583:2583"
    volumes:
      - pds_data:/var/lib/atprotopds
      - ./config.json:/var/lib/atprotopds/config.json:ro
    environment:
      - TZ=UTC
      - PDS_PORT=2583
      - PDS_HOST=0.0.0.0
      - PDS_ISSUER=https://pds.garazyk.xyz
      - PDS_HOSTNAME=pds.garazyk.xyz
      - PDS_AVAILABLE_USER_DOMAINS=garazyk.xyz
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - HOME=/var/lib/atprotopds
    command: [ "serve", "--config", "/var/lib/atprotopds/config.json", "--foreground" ]
    restart: unless-stopped

volumes:
  pds_data:
    name: pds_pds_data
    external: true
