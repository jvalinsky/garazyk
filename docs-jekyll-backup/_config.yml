# PDS Objective-C Implementation Guide - Jekyll Configuration

title: PDS Objective-C Implementation Guide
description: Comprehensive documentation for implementing an ATProto Personal Data Server in Objective-C
baseurl: /pds-objc-guide
url: https://pds.garazyk.xyz/docs

# Build settings
markdown: kramdown
theme: jekyll-theme-minimal

# Navigation
collections:
  docs:
    output: true
    permalink: /:collection/:path/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Exclude from processing
exclude:
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Defaults
defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "page"
      toc: true
