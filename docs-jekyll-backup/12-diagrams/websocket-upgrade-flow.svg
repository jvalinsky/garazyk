<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .decision { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .error-arrow { stroke: #cc0000; stroke-width: 2; fill: none; marker-end: url(#error-arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="error-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#cc0000" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="title">WebSocket Upgrade Flow</text>

  <!-- Client initiates request -->
  <rect x="250" y="60" width="300" height="60" class="box" rx="5"/>
  <text x="400" y="85" class="text">Client initiates HTTP upgrade</text>
  <text x="400" y="105" class="label">GET /xrpc/com.atproto.sync.subscribeRepos</text>

  <!-- Arrow -->
  <path d="M 400 120 L 400 150" class="arrow"/>

  <!-- HttpServer receives -->
  <rect x="250" y="150" width="300" height="60" class="process" rx="5"/>
  <text x="400" y="175" class="text">HttpServer receives request</text>
  <text x="400" y="195" class="label">Check Upgrade header</text>

  <!-- Arrow -->
  <path d="M 400 210 L 400 240" class="arrow"/>

  <!-- Verify handshake -->
  <polygon points="400,240 500,290 400,340 300,290" class="decision"/>
  <text x="400" y="290" class="text">Verify WebSocket</text>
  <text x="400" y="305" class="label">handshake headers</text>

  <!-- Error path -->
  <path d="M 300 290 L 150 290" class="error-arrow"/>
  <rect x="30" y="265" width="120" height="50" class="error" rx="5"/>
  <text x="90" y="290" class="text">Send 400 error</text>
  <text x="90" y="305" class="label">Invalid handshake</text>

  <!-- Success path -->
  <path d="M 400 340 L 400 370" class="arrow"/>
  <text x="420" y="360" class="label">Valid</text>

  <!-- Calculate Sec-WebSocket-Accept -->
  <rect x="250" y="370" width="300" height="60" class="process" rx="5"/>
  <text x="400" y="395" class="text">Calculate Sec-WebSocket-Accept</text>
  <text x="400" y="415" class="label">SHA1(key + magic) → Base64</text>

  <!-- Arrow -->
  <path d="M 400 430 L 400 460" class="arrow"/>

  <!-- Send 101 response -->
  <rect x="250" y="460" width="300" height="60" class="success" rx="5"/>
  <text x="400" y="485" class="text">Send 101 Switching Protocols</text>
  <text x="400" y="505" class="label">Include Sec-WebSocket-Accept header</text>

  <!-- Arrow -->
  <path d="M 400 520 L 400 550" class="arrow"/>

  <!-- Create WebSocketConnection -->
  <rect x="250" y="550" width="300" height="60" class="process" rx="5"/>
  <text x="400" y="575" class="text">Create WebSocketConnection</text>
  <text x="400" y="595" class="label">Initialize buffers and handlers</text>

  <!-- Arrow -->
  <path d="M 400 610 L 400 640" class="arrow"/>

  <!-- Register with SubscribeReposHandler -->
  <rect x="250" y="640" width="300" height="60" class="process" rx="5"/>
  <text x="400" y="665" class="text">Register with SubscribeReposHandler</text>
  <text x="400" y="685" class="label">Add to subscriptions list</text>

  <!-- Arrow -->
  <path d="M 400 700 L 400 730" class="arrow"/>

  <!-- Send historical events -->
  <polygon points="400,730 500,780 400,830 300,780" class="decision"/>
  <text x="400" y="780" class="text">Cursor provided?</text>

  <!-- No path -->
  <path d="M 300 780 L 150 780" class="arrow"/>
  <text x="220" y="775" class="label">No</text>
  <rect x="30" y="755" width="120" height="50" class="success" rx="5"/>
  <text x="90" y="780" class="text">Ready for events</text>

  <!-- Yes path -->
  <path d="M 400 830 L 400 860" class="arrow"/>
  <text x="420" y="850" class="label">Yes</text>
  <rect x="250" y="860" width="300" height="30" class="process" rx="5"/>
  <text x="400" y="880" class="text">Send historical events from cursor</text>
</svg>
