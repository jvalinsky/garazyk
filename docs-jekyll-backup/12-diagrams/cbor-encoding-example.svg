<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .code { font-family: monospace; font-size: 11px; fill: #000; }
      .json-box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .cbor-box { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; font-weight: bold; }
      .text-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
      .type-label { font-family: Arial, sans-serif; font-size: 10px; fill: #666; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">CBOR Encoding Process</text>

  <!-- Original Data (JSON) -->
  <text x="50" y="70" class="subtitle">1. Original Data (JSON):</text>

  <rect x="50" y="90" width="400" height="200" class="json-box" rx="5"/>
  <text x="70" y="115" class="code">{</text>
  <text x="90" y="135" class="code">"text": "Hello, world!",</text>
  <text x="90" y="155" class="code">"createdAt": "2024-01-01T00:00:00Z",</text>
  <text x="90" y="175" class="code">"likes": 42,</text>
  <text x="90" y="195" class="code">"facets": [],</text>
  <text x="90" y="215" class="code">"verified": true</text>
  <text x="70" y="235" class="code">}</text>

  <!-- Arrow to CBOR -->
  <path d="M 500 190 L 550 190" class="arrow"/>
  <text x="525" y="180" text-anchor="middle" class="arrow-label">Encode</text>

  <!-- CBOR Encoding -->
  <text x="550" y="70" class="subtitle">2. CBOR Encoding:</text>

  <rect x="550" y="90" width="400" height="200" class="cbor-box" rx="5"/>
  <text x="570" y="115" class="code">a5</text>
  <text x="570" y="135" class="code">64 text</text>
  <text x="570" y="155" class="code">6d Hello, world!</text>
  <text x="570" y="175" class="code">69 createdAt</text>
  <text x="570" y="195" class="code">78 1a 2024-01-01T00:00:00Z</text>
  <text x="570" y="215" class="code">65 likes 18 2a</text>
  <text x="570" y="235" class="code">66 facets 80</text>

  <!-- Type Reference Section -->
  <text x="50" y="330" class="subtitle">3. CBOR Type Reference:</text>

  <!-- Type Table -->
  <rect x="50" y="350" width="900" height="200" class="text-box" rx="5"/>

  <!-- Header Row -->
  <rect x="50" y="350" width="900" height="25" fill="#e9ecef" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="368" class="label" font-weight="bold">Type</text>
  <text x="200" y="368" class="label" font-weight="bold">Example</text>
  <text x="400" y="368" class="label" font-weight="bold">CBOR Encoding</text>
  <text x="700" y="368" class="label" font-weight="bold">Notes</text>

  <!-- Integer Row -->
  <line x1="50" y1="375" x2="950" y2="375" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="393" class="small-label">Integer</text>
  <text x="200" y="393" class="code">42</text>
  <text x="400" y="393" class="code">0x18 0x2a</text>
  <text x="700" y="393" class="small-label">Smallest representation</text>

  <!-- String Row -->
  <line x1="50" y1="400" x2="950" y2="400" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="418" class="small-label">String</text>
  <text x="200" y="418" class="code">"hello"</text>
  <text x="400" y="418" class="code">0x65 hello</text>
  <text x="700" y="418" class="small-label">0x65 = 5 chars, UTF-8</text>

  <!-- Array Row -->
  <line x1="50" y1="425" x2="950" y2="425" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="443" class="small-label">Array</text>
  <text x="200" y="443" class="code">[1, 2, 3]</text>
  <text x="400" y="443" class="code">0x83 0x01 0x02 0x03</text>
  <text x="700" y="443" class="small-label">0x83 = 3 elements</text>

  <!-- Map Row -->
  <line x1="50" y1="450" x2="950" y2="450" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="468" class="small-label">Map</text>
  <text x="200" y="468" class="code">{"a": 1}</text>
  <text x="400" y="468" class="code">0xa1 0x61 0x61 0x01</text>
  <text x="700" y="468" class="small-label">0xa1 = 1 pair, sorted keys</text>

  <!-- Boolean Row -->
  <line x1="50" y1="475" x2="950" y2="475" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="493" class="small-label">Boolean</text>
  <text x="200" y="493" class="code">true</text>
  <text x="400" y="493" class="code">0xf5</text>
  <text x="700" y="493" class="small-label">Fixed encoding</text>

  <!-- Null Row -->
  <line x1="50" y1="500" x2="950" y2="500" stroke="#dee2e6" stroke-width="1"/>
  <text x="70" y="518" class="small-label">Null</text>
  <text x="200" y="518" class="code">null</text>
  <text x="400" y="518" class="code">0xf6</text>
  <text x="700" y="518" class="small-label">Fixed encoding</text>

  <!-- DAG-CBOR Rules Section -->
  <text x="50" y="590" class="subtitle">4. DAG-CBOR Canonical Rules:</text>

  <rect x="50" y="610" width="900" height="140" class="text-box" rx="5"/>
  <text x="70" y="635" class="label" font-weight="bold">✓ Deterministic Encoding:</text>
  <text x="90" y="655" class="small-label">• Use smallest representation for integers</text>
  <text x="90" y="675" class="small-label">• Sort map keys lexicographically</text>
  <text x="90" y="695" class="small-label">• No duplicate keys in maps</text>
  <text x="90" y="715" class="small-label">• No floating-point numbers (use integers only)</text>
  <text x="90" y="735" class="small-label">• No undefined values (use null instead)</text>

  <!-- CID Calculation Section -->
  <text x="50" y="790" class="subtitle">5. CID Calculation (Hash of CBOR):</text>

  <rect x="50" y="810" width="900" height="120" class="text-box" rx="5"/>
  <text x="70" y="835" class="code">CBOR Data → SHA-256 Hash → Base32 Encoding → CID</text>
  <text x="70" y="860" class="small-label">Example CID:</text>
  <text x="70" y="880" class="code">bafyreigdyrzt5sfp4jgxlrjg23sgvplbslqwcyyisyws5yc5beunuyakm</text>
  <text x="70" y="900" class="small-label">This CID uniquely identifies the record and proves its content</text>

  <!-- Benefits Section -->
  <text x="50" y="960" class="subtitle">Why CBOR for AT Protocol:</text>

  <g transform="translate(50, 975)">
    <text x="0" y="0" class="small-label">✓ Compact (smaller than JSON)  ✓ Deterministic (same data = same hash)  ✓ Type-safe  ✓ Fast encoding/decoding</text>
  </g>
</svg>
