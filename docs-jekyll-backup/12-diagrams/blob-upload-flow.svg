<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .validation { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .code { font-family: monospace; font-size: 10px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .error-arrow { stroke: #cc0000; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title">Blob Upload Flow</text>

  <!-- Client Request -->
  <rect x="250" y="60" width="400" height="60" class="box" rx="5"/>
  <text x="450" y="85" class="text">Client Request</text>
  <text x="450" y="105" class="code">POST /xrpc/com.atproto.repo.uploadBlob</text>

  <!-- Arrow -->
  <path d="M 450 120 L 450 150" class="arrow"/>

  <!-- XRPC Handler -->
  <rect x="250" y="150" width="400" height="60" class="process" rx="5"/>
  <text x="450" y="175" class="text">XrpcRepoMethods Handler</text>
  <text x="450" y="195" class="label">Extract auth, blob data, MIME type</text>

  <!-- Arrow -->
  <path d="M 450 210 L 450 240" class="arrow"/>

  <!-- Auth Verification -->
  <rect x="250" y="240" width="400" height="60" class="validation" rx="5"/>
  <text x="450" y="265" class="text">Verify Authentication</text>
  <text x="450" y="285" class="label">Extract DID from Bearer token</text>

  <!-- Error path -->
  <path d="M 650 270 L 750 270 L 750 1100" class="error-arrow"/>
  <text x="760" y="265" class="label">Invalid</text>
  <rect x="700" y="1080" width="100" height="40" class="error" rx="5"/>
  <text x="750" y="1105" class="label">401 Error</text>

  <!-- Arrow -->
  <path d="M 450 300 L 450 330" class="arrow"/>

  <!-- PDSBlobService -->
  <rect x="250" y="330" width="400" height="60" class="process" rx="5"/>
  <text x="450" y="355" class="text">PDSBlobService.uploadBlob</text>
  <text x="450" y="375" class="label">Coordinate upload process</text>

  <!-- Arrow -->
  <path d="M 450 390 L 450 420" class="arrow"/>

  <!-- BlobStorage Validation -->
  <rect x="250" y="420" width="400" height="80" class="validation" rx="5"/>
  <text x="450" y="445" class="text">BlobStorage.validateBlob</text>
  <text x="450" y="465" class="label">1. Validate MIME type format</text>
  <text x="450" y="480" class="label">2. Check if MIME type is supported</text>
  <text x="450" y="495" class="label">3. Validate size limits</text>

  <!-- Error path -->
  <path d="M 650 460 L 750 460" class="error-arrow"/>
  <text x="760" y="455" class="label">Invalid</text>

  <!-- Arrow -->
  <path d="M 450 500 L 450 530" class="arrow"/>

  <!-- Magic Bytes Validation -->
  <rect x="250" y="530" width="400" height="60" class="validation" rx="5"/>
  <text x="450" y="555" class="text">Validate Magic Bytes</text>
  <text x="450" y="575" class="label">Verify file signature matches MIME type</text>

  <!-- Error path -->
  <path d="M 650 560 L 750 560" class="error-arrow"/>
  <text x="760" y="555" class="label">Mismatch</text>

  <!-- Arrow -->
  <path d="M 450 590 L 450 620" class="arrow"/>

  <!-- Compute CID -->
  <rect x="250" y="620" width="400" height="80" class="process" rx="5"/>
  <text x="450" y="645" class="text">Compute CID</text>
  <text x="450" y="665" class="label">1. SHA-256 hash of blob data</text>
  <text x="450" y="680" class="label">2. Create multihash (0x12 + length + digest)</text>
  <text x="450" y="695" class="label">3. Create CIDv1 with raw codec (0x55)</text>

  <!-- Arrow -->
  <path d="M 450 700 L 450 730" class="arrow"/>

  <!-- Check Existing -->
  <rect x="250" y="730" width="400" height="60" class="process" rx="5"/>
  <text x="450" y="755" class="text">Check if Blob Already Exists</text>
  <text x="450" y="775" class="label">Query actor database for CID</text>

  <!-- Arrow -->
  <path d="M 450 790 L 450 820" class="arrow"/>

  <!-- Decision Diamond -->
  <polygon points="450,820 550,870 450,920 350,870" class="validation"/>
  <text x="450" y="870" class="text">Already</text>
  <text x="450" y="885" class="label">exists?</text>

  <!-- Yes path -->
  <path d="M 550 870 L 650 870 L 650 1020" class="arrow"/>
  <text x="660" y="865" class="label">Yes</text>
  <rect x="600" y="1020" width="100" height="60" class="success" rx="5"/>
  <text x="650" y="1045" class="label">Return</text>
  <text x="650" y="1060" class="label">existing ref</text>

  <!-- No path -->
  <path d="M 450 920 L 450 950" class="arrow"/>
  <text x="470" y="940" class="label">No</text>

  <!-- Store in Provider -->
  <rect x="250" y="950" width="400" height="60" class="process" rx="5"/>
  <text x="450" y="975" class="text">Store Blob Data in Provider</text>
  <text x="450" y="995" class="label">File system, S3, or other storage backend</text>

  <!-- Error path -->
  <path d="M 650 980 L 750 980" class="error-arrow"/>
  <text x="760" y="975" class="label">Failure</text>

  <!-- Arrow -->
  <path d="M 450 1010 L 450 1040" class="arrow"/>

  <!-- Save Metadata -->
  <rect x="250" y="1040" width="400" height="80" class="process" rx="5"/>
  <text x="450" y="1065" class="text">Save Blob Metadata (Transaction)</text>
  <text x="450" y="1085" class="label">Store: CID, DID, MIME type, size, created_at</text>
  <text x="450" y="1100" class="label">In actor database</text>

  <!-- Error path -->
  <path d="M 650 1080 L 750 1080" class="error-arrow"/>
  <text x="760" y="1075" class="label">DB Error</text>

  <!-- Arrow -->
  <path d="M 450 1120 L 450 1150" class="arrow"/>

  <!-- Return Success -->
  <rect x="250" y="1150" width="400" height="40" class="success" rx="5"/>
  <text x="450" y="1175" class="text">Return Blob Reference</text>

  <!-- Blob Reference Format -->
  <g transform="translate(50, 1050)">
    <text x="0" y="0" class="label" text-anchor="start" font-weight="bold">Blob Reference Format:</text>
    <text x="0" y="20" class="code" text-anchor="start">{</text>
    <text x="10" y="35" class="code" text-anchor="start">"blob": {</text>
    <text x="20" y="50" class="code" text-anchor="start">"$type": "blob",</text>
    <text x="20" y="65" class="code" text-anchor="start">"ref": {"$link": "bafkrei..."},</text>
    <text x="20" y="80" class="code" text-anchor="start">"mimeType": "image/jpeg",</text>
    <text x="20" y="95" class="code" text-anchor="start">"size": 102400</text>
    <text x="10" y="110" class="code" text-anchor="start">}</text>
    <text x="0" y="125" class="code" text-anchor="start">}</text>
  </g>
</svg>
