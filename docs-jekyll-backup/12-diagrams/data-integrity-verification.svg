<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .decision { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .warning { fill: #fff9e6; stroke: #ffcc00; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title">Data Integrity Verification</text>

  <!-- Start integrity check -->
  <rect x="300" y="60" width="300" height="60" class="box" rx="5"/>
  <text x="450" y="85" class="text">Start Integrity Check</text>
  <text x="450" y="105" class="label">Scheduled or on-demand verification</text>

  <path d="M 450 120 L 450 150" class="arrow"/>

  <!-- SQLite integrity check -->
  <rect x="300" y="150" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="175" class="text">SQLite Integrity Check</text>
  <text x="450" y="195" class="label">PRAGMA integrity_check</text>

  <path d="M 450 210 L 450 240" class="arrow"/>

  <!-- Decision: integrity OK? -->
  <polygon points="450,240 550,280 450,320 350,280" class="decision"/>
  <text x="450" y="285" class="text">Integrity OK?</text>

  <path d="M 550 280 L 700 280 L 700 1050 L 450 1050 L 450 1020" class="arrow"/>
  <text x="625" y="275" class="label">No - Critical</text>

  <path d="M 450 320 L 450 350" class="arrow"/>
  <text x="420" y="340" class="label">Yes</text>

  <!-- Foreign key check -->
  <rect x="300" y="350" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="375" class="text">Foreign Key Check</text>
  <text x="450" y="395" class="label">PRAGMA foreign_key_check</text>

  <path d="M 450 410 L 450 440" class="arrow"/>

  <!-- Decision: FK violations? -->
  <polygon points="450,440 550,480 450,520 350,480" class="decision"/>
  <text x="450" y="485" class="text">Violations?</text>

  <path d="M 550 480 L 650 480 L 650 960 L 600 960" class="arrow"/>
  <text x="600 " y="475" class="label">Yes</text>

  <path d="M 450 520 L 450 550" class="arrow"/>
  <text x="420" y="540" class="label">No</text>

  <!-- Repository consistency check -->
  <rect x="300" y="550" width="300" height="80" class="process" rx="5"/>
  <text x="450" y="575" class="text">Repository Consistency Check</text>
  <text x="450" y="595" class="label">• Verify repo_root exists</text>
  <text x="450" y="615" class="label">• Check records have blocks</text>

  <path d="M 450 630 L 450 660" class="arrow"/>

  <!-- Decision: repo consistent? -->
  <polygon points="450,660 550,700 450,740 350,700" class="decision"/>
  <text x="450" y="705" class="text">Consistent?</text>

  <path d="M 550 700 L 650 700 L 650 960 L 600 960" class="arrow"/>
  <text x="600" y="695" class="label">No</text>

  <path d="M 450 740 L 450 770" class="arrow"/>
  <text x="420" y="760" class="label">Yes</text>

  <!-- Fragmentation check -->
  <rect x="300" y="770" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="795" class="text">Fragmentation Analysis</text>
  <text x="450" y="815" class="label">Calculate fragmentation percentage</text>

  <path d="M 450 830 L 450 860" class="arrow"/>

  <!-- Decision: fragmentation level -->
  <polygon points="450,860 550,900 450,940 350,900" class="decision"/>
  <text x="450" y="900" class="text">Frag > 30%?</text>

  <path d="M 550 900 L 650 900 L 650 960 L 600 960" class="arrow"/>
  <text x="600" y="895" class="label">Yes</text>

  <path d="M 450 940 L 450 970" class="arrow"/>
  <text x="420" y="960" class="label">No</text>

  <!-- Warning: high fragmentation -->
  <rect x="300" y="960" width="300" height="60" class="warning" rx="5"/>
  <text x="450" y="985" class="text">Warning: High Fragmentation</text>
  <text x="450" y="1005" class="label">Schedule VACUUM operation</text>

  <path d="M 450 1020 L 450 1050 L 450 1020" class="arrow"/>

  <!-- All checks passed -->
  <rect x="300" y="970" width="300" height="60" class="success" rx="5"/>
  <text x="450" y="995" class="text">All Checks Passed</text>
  <text x="450" y="1015" class="label">Database is healthy</text>

  <path d="M 450 1030 L 450 1050 L 450 1020" class="arrow"/>

  <!-- Critical error -->
  <rect x="300" y="1020" width="300" height="60" class="error" rx="5"/>
  <text x="450" y="1045" class="text">Critical Error Detected</text>
  <text x="450" y="1065" class="label">Notify administrators, initiate repair</text>

</svg>
