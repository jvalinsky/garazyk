<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .decision { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title">Migration Rollback Procedure</text>

  <!-- Migration failure detected -->
  <rect x="300" y="60" width="300" height="60" class="error" rx="5"/>
  <text x="450" y="85" class="text">Migration Failure Detected</text>
  <text x="450" y="105" class="label">Error during migration execution</text>

  <path d="M 450 120 L 450 150" class="arrow"/>

  <!-- Automatic transaction rollback -->
  <rect x="300" y="150" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="175" class="text">Automatic Transaction Rollback</text>
  <text x="450" y="195" class="label">ROLLBACK (if in transaction)</text>

  <path d="M 450 210 L 450 240" class="arrow"/>

  <!-- Check database integrity -->
  <rect x="300" y="240" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="265" class="text">Check Database Integrity</text>
  <text x="450" y="285" class="label">PRAGMA integrity_check</text>

  <path d="M 450 300 L 450 330" class="arrow"/>

  <!-- Decision: database intact? -->
  <polygon points="450,330 550,370 450,410 350,370" class="decision"/>
  <text x="450" y="375" class="text">DB Intact?</text>

  <path d="M 550 370 L 650 370 L 650 480 L 600 480" class="arrow"/>
  <text x="600" y="365" class="label">No</text>

  <path d="M 450 410 L 450 440" class="arrow"/>
  <text x="420" y="430" class="label">Yes</text>

  <!-- Database corrupted path -->
  <rect x="300" y="460" width="300" height="60" class="error" rx="5"/>
  <text x="450" y="485" class="text">Database Corrupted</text>
  <text x="450" y="505" class="label">Must restore from backup</text>

  <path d="M 450 520 L 450 550" class="arrow"/>

  <!-- Can retry migration -->
  <rect x="300" y="440" width="300" height="60" class="success" rx="5"/>
  <text x="450" y="465" class="text">Migration Can Be Retried</text>
  <text x="450" y="485" class="label">Database state is consistent</text>

  <path d="M 450 500 L 450 920 L 450 890" class="arrow"/>

  <!-- Find most recent backup -->
  <rect x="300" y="550" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="575" class="text">Find Most Recent Backup</text>
  <text x="450" y="595" class="label">Locate backup file with timestamp</text>

  <path d="M 450 610 L 450 640" class="arrow"/>

  <!-- Decision: backup exists? -->
  <polygon points="450,640 550,680 450,720 350,680" class="decision"/>
  <text x="450" y="685" class="text">Backup Exists?</text>

  <path d="M 350 680 L 200 680 L 200 920 L 300 920" class="arrow"/>
  <text x="250" y="675" class="label">No</text>

  <path d="M 450 720 L 450 750" class="arrow"/>
  <text x="420" y="740" class="label">Yes</text>

  <!-- Close database connections -->
  <rect x="300" y="750" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="775" class="text">Close All Database Connections</text>
  <text x="450" y="795" class="label">Ensure exclusive access</text>

  <path d="M 450 810 L 450 840" class="arrow"/>

  <!-- Restore from backup -->
  <rect x="300" y="840" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="865" class="text">Restore from Backup</text>
  <text x="450" y="885" class="label">Copy backup files to production location</text>

  <path d="M 450 900 L 450 920" class="arrow"/>

  <!-- Unrecoverable error -->
  <rect x="300" y="920" width="300" height="60" class="error" rx="5"/>
  <text x="450" y="945" class="text">Unrecoverable Error</text>
  <text x="450" y="965" class="label">Manual intervention required</text>

  <!-- Report result -->
  <rect x="300" y="890" width="300" height="60" class="box" rx="5"/>
  <text x="450" y="915" class="text">Report Rollback Result</text>
  <text x="450" y="935" class="label">Log outcome and notify administrators</text>

</svg>
