<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #333; }
      .label { font: 14px sans-serif; fill: #333; }
      .small { font: 12px sans-serif; fill: #666; }
      .box { fill: #f0f8ff; stroke: #4682b4; stroke-width: 2; }
      .secure-box { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .storage-box { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .secure-arrow { fill: none; stroke: #4caf50; stroke-width: 2; marker-end: url(#arrowhead-secure); }
      .note { fill: #fffacd; stroke: #daa520; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-secure" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4caf50" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Secrets Management Flow</text>

  <!-- Phase 1: Key Generation -->
  <text x="50" y="70" class="label" font-weight="bold">Phase 1: Key Generation</text>
  
  <rect x="50" y="80" width="200" height="80" class="secure-box" rx="5"/>
  <text x="150" y="105" text-anchor="middle" class="label" font-weight="bold">SecRandomCopyBytes</text>
  <text x="150" y="125" text-anchor="middle" class="small">Generate crypto-secure</text>
  <text x="150" y="140" text-anchor="middle" class="small">random key material</text>
  
  <rect x="300" y="80" width="200" height="80" class="secure-box" rx="5"/>
  <text x="400" y="105" text-anchor="middle" class="label" font-weight="bold">Key Derivation</text>
  <text x="400" y="125" text-anchor="middle" class="small">PBKDF2 / HKDF</text>
  <text x="400" y="140" text-anchor="middle" class="small">Derive signing keys</text>

  <path d="M 250 120 L 300 120" class="secure-arrow"/>

  <!-- Phase 2: Secure Storage -->
  <text x="50" y="200" class="label" font-weight="bold">Phase 2: Secure Storage</text>

  <rect x="50" y="210" width="200" height="100" class="storage-box" rx="5"/>
  <text x="150" y="235" text-anchor="middle" class="label" font-weight="bold">macOS Keychain</text>
  <text x="150" y="255" text-anchor="middle" class="small">kSecAttrAccessible:</text>
  <text x="150" y="270" text-anchor="middle" class="small">WhenUnlockedThisDeviceOnly</text>
  <text x="150" y="290" text-anchor="middle" class="small">Hardware-backed (Secure Enclave)</text>

  <rect x="300" y="210" width="200" height="100" class="storage-box" rx="5"/>
  <text x="400" y="235" text-anchor="middle" class="label" font-weight="bold">Linux Keyring</text>
  <text x="400" y="255" text-anchor="middle" class="small">Encrypted file storage</text>
  <text x="400" y="270" text-anchor="middle" class="small">with OS keyring integration</text>
  <text x="400" y="290" text-anchor="middle" class="small">(libsecret / gnome-keyring)</text>

  <path d="M 400 160 L 400 180 L 150 180 L 150 210" class="secure-arrow"/>
  <path d="M 400 160 L 400 210" class="secure-arrow"/>

  <!-- Phase 3: Key Retrieval -->
  <text x="50" y="350" class="label" font-weight="bold">Phase 3: Key Retrieval</text>

  <rect x="50" y="360" width="200" height="80" class="box" rx="5"/>
  <text x="150" y="385" text-anchor="middle" class="label" font-weight="bold">Application Request</text>
  <text x="150" y="405" text-anchor="middle" class="small">Need key for JWT signing</text>
  <text x="150" y="420" text-anchor="middle" class="small">or DPoP verification</text>

  <rect x="300" y="360" width="200" height="80" class="secure-box" rx="5"/>
  <text x="400" y="385" text-anchor="middle" class="label" font-weight="bold">KeychainManager</text>
  <text x="400" y="405" text-anchor="middle" class="small">Retrieve key by identifier</text>
  <text x="400" y="420" text-anchor="middle" class="small">Verify access permissions</text>

  <path d="M 250 400 L 300 400" class="arrow"/>

  <rect x="550" y="360" width="200" height="80" class="storage-box" rx="5"/>
  <text x="650" y="385" text-anchor="middle" class="label" font-weight="bold">Keychain/Keyring</text>
  <text x="650" y="405" text-anchor="middle" class="small">Return encrypted key</text>
  <text x="650" y="420" text-anchor="middle" class="small">Decrypt in secure memory</text>

  <path d="M 500 400 L 550 400" class="secure-arrow"/>

  <!-- Phase 4: Key Usage -->
  <text x="50" y="480" class="label" font-weight="bold">Phase 4: Key Usage</text>

  <rect x="50" y="490" width="200" height="80" class="box" rx="5"/>
  <text x="150" y="515" text-anchor="middle" class="label" font-weight="bold">JWT Signing</text>
  <text x="150" y="535" text-anchor="middle" class="small">Sign token with</text>
  <text x="150" y="550" text-anchor="middle" class="small">retrieved private key</text>

  <rect x="300" y="490" width="200" height="80" class="box" rx="5"/>
  <text x="400" y="515" text-anchor="middle" class="label" font-weight="bold">DPoP Verification</text>
  <text x="400" y="535" text-anchor="middle" class="small">Verify proof with</text>
  <text x="400" y="550" text-anchor="middle" class="small">public key</text>

  <rect x="550" y="490" width="200" height="80" class="box" rx="5"/>
  <text x="650" y="515" text-anchor="middle" class="label" font-weight="bold">Encryption</text>
  <text x="650" y="535" text-anchor="middle" class="small">Encrypt sensitive data</text>
  <text x="650" y="550" text-anchor="middle" class="small">with AES-256-GCM</text>

  <path d="M 650 440 L 650 460 L 150 460 L 150 490" class="arrow"/>
  <path d="M 650 440 L 650 460 L 400 460 L 400 490" class="arrow"/>
  <path d="M 650 440 L 650 490" class="arrow"/>

  <!-- Phase 5: Key Rotation -->
  <text x="50" y="610" class="label" font-weight="bold">Phase 5: Key Rotation</text>

  <rect x="50" y="620" width="200" height="100" class="secure-box" rx="5"/>
  <text x="150" y="645" text-anchor="middle" class="label" font-weight="bold">Generate New Key</text>
  <text x="150" y="665" text-anchor="middle" class="small">Create new key version</text>
  <text x="150" y="680" text-anchor="middle" class="small">Store with version ID</text>
  <text x="150" y="695" text-anchor="middle" class="small">(e.g., jwt-signing-v2)</text>

  <rect x="300" y="620" width="200" height="100" class="box" rx="5"/>
  <text x="400" y="645" text-anchor="middle" class="label" font-weight="bold">Transition Period</text>
  <text x="400" y="665" text-anchor="middle" class="small">Keep old key for verification</text>
  <text x="400" y="680" text-anchor="middle" class="small">Sign with new key</text>
  <text x="400" y="695" text-anchor="middle" class="small">Accept both versions</text>

  <rect x="550" y="620" width="200" height="100" class="secure-box" rx="5"/>
  <text x="650" y="645" text-anchor="middle" class="label" font-weight="bold">Retire Old Key</text>
  <text x="650" y="665" text-anchor="middle" class="small">After grace period:</text>
  <text x="650" y="680" text-anchor="middle" class="small">Delete old key version</text>
  <text x="650" y="695" text-anchor="middle" class="small">Update key references</text>

  <path d="M 250 670 L 300 670" class="arrow"/>
  <path d="M 500 670 L 550 670" class="arrow"/>

  <!-- Security Notes -->
  <rect x="50" y="760" width="700" height="120" class="note" rx="5"/>
  <text x="400" y="785" text-anchor="middle" class="label" font-weight="bold">Security Best Practices</text>
  
  <text x="70" y="810" class="small">• Never store keys in source code, config files, or environment variables</text>
  <text x="70" y="830" class="small">• Use hardware-backed storage (Secure Enclave on macOS) when available</text>
  <text x="70" y="850" class="small">• Rotate keys regularly (recommended: every 90 days for signing keys)</text>
  <text x="70" y="870" class="small">• Use separate keys for different purposes (signing, encryption, DPoP)</text>

  <!-- Legend -->
  <rect x="50" y="900" width="15" height="15" class="secure-box"/>
  <text x="75" y="912" class="small">Cryptographically Secure Operation</text>

  <rect x="300" y="900" width="15" height="15" class="storage-box"/>
  <text x="325" y="912" class="small">Secure Storage</text>

  <rect x="500" y="900" width="15" height="15" class="box"/>
  <text x="525" y="912" class="small">Application Operation</text>
</svg>
