name: ATProtoPDS
options:
  bundleIdPrefix: com.atproto
  deploymentTarget:
    macOS: "14.0"
  objectVersion: 56

settings:
  base:
    CLANG_ENABLE_OBJC_ARC: YES
    SDKROOT: macosx
    CLANG_C_LANGUAGE_STANDARD: c11
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES

targets:
  # Main CLI Tool - wrapper around CMake build
  ATProtoPDS-CLI:
    type: tool
    platform: macOS
    sources: [] 
    settings:
      base:
        PRODUCT_NAME: september
        INFOPLIST_FILE: ATProtoPDS/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        EXECUTABLE_PATH: "$(PROJECT_DIR)/build/bin/september"
    prebuildScripts:
	      - name: "Build with CMake"
	        script: |
	          #!/bin/bash
	          set -e
	          mkdir -p "${PROJECT_DIR}/build"
	          cd "${PROJECT_DIR}/build"
	          XCODE_CLANG="$(xcrun -find clang)"
	          XCODE_CLANGXX="$(xcrun -find clang++)"
	          # CMake does not allow changing compilers in an existing build directory.
	          # If this build dir was configured via ~/.swiftly/bin/cc, reset it.
	          if [ -f CMakeCache.txt ] && grep -q "/\\.swiftly/bin/cc" CMakeCache.txt; then
	            rm -f CMakeCache.txt
	            rm -rf CMakeFiles
	          fi
	          # Configure and build
	          cmake .. \
	            -DCMAKE_BUILD_TYPE=${CONFIGURATION} \
	            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
	            -DCMAKE_C_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_CXX_COMPILER="${XCODE_CLANGXX}" \
	            -DCMAKE_OBJC_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_OBJCXX_COMPILER="${XCODE_CLANGXX}" \
	            -DBUILD_SECP256K1=ON \
	            -DBUILD_TESTS=OFF \
	            -DBUILD_FUZZERS=OFF
	          make -j$(sysctl -n hw.ncpu) september

  # Standalone PLC Server
  atproto-plc:
    type: tool
    platform: macOS
    sources: []
    settings:
      base:
        PRODUCT_NAME: atproto-plc
        INFOPLIST_FILE: ATProtoPDS/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        EXECUTABLE_PATH: "$(PROJECT_DIR)/build/bin/atproto-plc"
    prebuildScripts:
	      - name: "Build PLC with CMake"
	        script: |
	          #!/bin/bash
	          set -e
	          mkdir -p "${PROJECT_DIR}/build"
	          cd "${PROJECT_DIR}/build"
	          XCODE_CLANG="$(xcrun -find clang)"
	          XCODE_CLANGXX="$(xcrun -find clang++)"
	          if [ -f CMakeCache.txt ] && grep -q "/\\.swiftly/bin/cc" CMakeCache.txt; then
	            rm -f CMakeCache.txt
	            rm -rf CMakeFiles
	          fi
	          # Configure and build
	          cmake .. \
	            -DCMAKE_BUILD_TYPE=${CONFIGURATION} \
	            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
	            -DCMAKE_C_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_CXX_COMPILER="${XCODE_CLANGXX}" \
	            -DCMAKE_OBJC_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_OBJCXX_COMPILER="${XCODE_CLANGXX}" \
	            -DBUILD_SECP256K1=ON \
	            -DBUILD_TESTS=OFF \
	            -DBUILD_FUZZERS=OFF
	          make -j$(sysctl -n hw.ncpu) atproto-plc

  # Test Runner - wrapper around CMake build
  AllTests:
    type: tool
    platform: macOS
    sources: []
    settings:
      base:
        PRODUCT_NAME: AllTests
        INFOPLIST_FILE: ATProtoPDS/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        EXECUTABLE_PATH: "$(PROJECT_DIR)/build/tests/AllTests"
    prebuildScripts:
	      - name: "Build Tests with CMake"
	        script: |
	          #!/bin/bash
	          set -e
	          mkdir -p "${PROJECT_DIR}/build"
	          cd "${PROJECT_DIR}/build"
	          XCODE_CLANG="$(xcrun -find clang)"
	          XCODE_CLANGXX="$(xcrun -find clang++)"
	          if [ -f CMakeCache.txt ] && grep -q "/\\.swiftly/bin/cc" CMakeCache.txt; then
	            rm -f CMakeCache.txt
	            rm -rf CMakeFiles
	          fi
	          # Configure and build tests
	          cmake .. \
	            -DCMAKE_BUILD_TYPE=${CONFIGURATION} \
	            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
	            -DCMAKE_C_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_CXX_COMPILER="${XCODE_CLANGXX}" \
	            -DCMAKE_OBJC_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_OBJCXX_COMPILER="${XCODE_CLANGXX}" \
	            -DBUILD_SECP256K1=ON \
	            -DBUILD_TESTS=ON \
	            -DBUILD_FUZZERS=OFF
	          make -j$(sysctl -n hw.ncpu) AllTests

  # Fuzzers - aggregate target to build all fuzzers
  Fuzzers:
    type: tool
    platform: macOS
    sources: []
    settings:
      base:
        PRODUCT_NAME: Fuzzers
    prebuildScripts:
	      - name: "Build Fuzzers with CMake"
	        script: |
	          #!/bin/bash
	          set -e
	          mkdir -p "${PROJECT_DIR}/build"
	          cd "${PROJECT_DIR}/build"
	          XCODE_CLANG="$(xcrun -find clang)"
	          XCODE_CLANGXX="$(xcrun -find clang++)"
	          if [ -f CMakeCache.txt ] && grep -q "/\\.swiftly/bin/cc" CMakeCache.txt; then
	            rm -f CMakeCache.txt
	            rm -rf CMakeFiles
	          fi
	          # Configure and build fuzzers
	          cmake .. \
	            -DCMAKE_BUILD_TYPE=${CONFIGURATION} \
	            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
	            -DCMAKE_C_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_CXX_COMPILER="${XCODE_CLANGXX}" \
	            -DCMAKE_OBJC_COMPILER="${XCODE_CLANG}" \
	            -DCMAKE_OBJCXX_COMPILER="${XCODE_CLANGXX}" \
	            -DBUILD_SECP256K1=ON \
	            -DBUILD_TESTS=OFF \
	            -DBUILD_FUZZERS=ON
	          make -j$(sysctl -n hw.ncpu) fuzz_xrpc fuzz_cbor fuzz_http fuzz_auth
