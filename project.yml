name: ATProtoPDS
options:
  bundleIdPrefix: com.atproto
  deploymentTarget:
    macOS: "14.0"
  objectVersion: 56

settings:
  base:
    CLANG_ENABLE_OBJC_ARC: YES
    SDKROOT: macosx
    LIBRARY_SEARCH_PATHS:
      - "$(PROJECT_DIR)/secp256k1/build/lib"
    CLANG_C_LANGUAGE_STANDARD: c11
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  ATProtoPDS:
    type: tool
    platform: macOS
    sources:
      - path: ATProtoPDS/Sources
        excludes:
          - "**/tests/*"
          - "**/CLI/main.m"
          - "**/App/server_main.m"
    settings:
      base:
        PRODUCT_NAME: atprotopds
        INFOPLIST_FILE: ATProtoPDS/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        OTHER_LDFLAGS:
          - "-framework"
          - Foundation
          - "-framework"
          - AppKit
          - "-framework"
          - Network
          - "-framework"
          - Security
          - "-lsqlite3"
          - "-lsecp256k1"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ATProtoPDS/Sources"
          - "$(PROJECT_DIR)/secp256k1/include"
          - "$(PROJECT_DIR)/tests"

  ATProtoPDS-CLI:
    type: tool
    platform: macOS
    sources:
      - path: ATProtoPDS/Sources
        excludes:
          - "**/tests/*"
          - "**/App/main.m"
          - "**/App/server_main.m"
    settings:
      base:
        PRODUCT_NAME: atprotopds-cli
        INFOPLIST_FILE: ATProtoPDS/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        OTHER_LDFLAGS:
          - "-framework"
          - Foundation
          - "-framework"
          - Network
          - "-framework"
          - Security
          - "-lsqlite3"
          - "-lsecp256k1"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ATProtoPDS/Sources"
          - "$(PROJECT_DIR)/secp256k1/include"

  AllTests:
    type: tool
    platform: macOS
    sources:
      - path: ATProtoPDS/Sources
        excludes:
          - "**/tests/*"
          - "**/App/main.m"
      - path: tests/Database/ActorStore/ActorStoreTests.m
      - path: tests/Database/Pool/DatabasePoolTests.m
      - path: tests/Database/PDSControllerTests.m
      - path: tests/test_main.m
    settings:
      base:
        PRODUCT_NAME: AllTests
        INFOPLIST_FILE: ATProtoPDS/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/Library/Frameworks"
        OTHER_LDFLAGS:
          - "-framework"
          - XCTest
          - "-framework"
          - Foundation
          - "-framework"
          - Security
          - "-lsqlite3"
          - "-lsecp256k1"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/ATProtoPDS/Sources"
          - "$(PROJECT_DIR)/secp256k1/include"
          - "$(PROJECT_DIR)/tests"
