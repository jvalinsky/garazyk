# Auto-generated scenario for ijavascript (blessed/notebook)
# Framework confidence via semantic detection will be verified
# UI Patterns: editor, table, chart, tab-navigation
name: ijavascript notebook
description: "Launch ijavascript, verify semantic detection, exercise notebook patterns, then quit"
command: /opt/homebrew/bin/ijavascript
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for ijavascript to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ijavascript
    maxMs: 500
    label: Verify app is ijavascript
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch tab
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for tab switch
  - type: quit
    maxMs: 2000
    label: Quit ijavascript
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
