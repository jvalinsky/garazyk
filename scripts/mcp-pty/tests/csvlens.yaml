# Auto-generated scenario for csvlens (ratatui/data-browser)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, horizontal-scroll, filter-search, sort
name: csvlens data browser
description: "Launch csvlens, verify semantic detection, exercise data-browser patterns, then quit"
command: /opt/homebrew/bin/csvlens
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 3000
    label: Wait for csvlens to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: csvlens
    maxMs: 500
    label: Verify app is csvlens
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit csvlens
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
