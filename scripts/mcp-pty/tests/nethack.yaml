# Auto-generated scenario for nethack (ncurses/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: game-board, inventory, dungeon, status-bar
name: nethack game
description: "Launch nethack, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/nethack
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for nethack to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: nethack
    maxMs: 500
    label: Verify app is nethack
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: observe
    maxMs: 500
    label: "Verify app still responsive after navigation (known: ncurses cursor)"
  - type: quit
    maxMs: 3000
    label: Quit nethack
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
