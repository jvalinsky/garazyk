# Auto-generated scenario for moar (bubbletea/pager)
# Framework confidence via semantic detection will be verified
# UI Patterns: scroll, search, status-bar
name: moar pager
description: "Launch moar, verify semantic detection, exercise pager patterns, then quit"
command: /opt/homebrew/bin/moar
cols: 80
rows: 24
settleMs: 500
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for moar to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: moar
    label: Verify app is moar
  - type: press_key
    value: j
    label: Scroll down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_content_changed
    label: Verify content scrolled
  - type: press_key
    value: k
    label: Scroll up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit moar
  - type: wait
    timeoutMs: 500
    label: Wait for exit
