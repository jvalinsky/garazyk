# Auto-generated scenario for procs (ratatui/system-monitor)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, process-list, filter-search, tree
name: procs system monitor
description: "Launch procs, verify semantic detection, exercise system-monitor patterns, then quit"
command: /opt/homebrew/bin/procs
cols: 120
rows: 30
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for procs to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: procs
    maxMs: 500
    label: Verify app is procs
  - type: assert_semantic
    target: framework
    expected: ratatui
    maxMs: 500
    label: Verify framework is ratatui
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit procs
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
