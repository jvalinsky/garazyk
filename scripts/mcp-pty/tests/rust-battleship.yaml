# Auto-generated scenario for rust-battleship (ratatui/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: game-board, grid, 2d-selection, score-bar
name: rust-battleship game
description: "Launch rust-battleship, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/battleship
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for rust-battleship to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: rust-battleship
    maxMs: 500
    label: Verify app is rust-battleship
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 4 directions)
  - type: quit
    maxMs: 2000
    label: Quit rust-battleship
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
