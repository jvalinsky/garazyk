# Auto-generated scenario for soft-serve (bubbletea/git-server)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, tab-navigation, status-bar, form-input
name: soft-serve git server
description: "Launch soft-serve, verify semantic detection, exercise git-server patterns, then quit"
command: /opt/homebrew/bin/soft
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for soft-serve to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: soft-serve
    maxMs: 500
    label: Verify app is soft-serve
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit soft-serve
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
