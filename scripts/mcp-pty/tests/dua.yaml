# Auto-generated scenario for dua-cli (ratatui/disk-analyzer)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, chart, list-selection
name: dua-cli disk analyzer
description: "Launch dua-cli, verify semantic detection, exercise disk-analyzer patterns, then quit"
command: /opt/homebrew/bin/dua
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for dua-cli to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: dua-cli
    maxMs: 500
    label: Verify app is dua-cli
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit dua-cli
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
