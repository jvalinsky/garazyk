# Auto-generated scenario for tui-form-wizard (opentui/form)
# Framework confidence via semantic detection will be verified
# UI Patterns: form-input, wizard, checkbox, select, progress
name: tui-form-wizard form
description: "Launch tui-form-wizard, verify semantic detection, exercise form patterns, then quit"
command: /opt/homebrew/bin/tui-form-wizard
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for tui-form-wizard to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tui-form-wizard
    maxMs: 500
    label: Verify app is tui-form-wizard
  - type: assert_capability
    target: quit.keys
    contains: q, ctrl+c
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit tui-form-wizard
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
