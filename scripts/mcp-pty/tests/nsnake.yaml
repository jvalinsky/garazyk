# Auto-generated scenario for nsnake (ncurses/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: game-board, score-bar, 2d-movement
name: nsnake game
description: "Launch nsnake, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/nsnake
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for nsnake to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: nsnake
    maxMs: 500
    label: Verify app is nsnake
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: observe
    maxMs: 500
    label: "Verify app still responsive after navigation (known: ncurses cursor)"
  - type: press_key
    value: p
    maxMs: 500
    label: Pause game
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit nsnake
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
