# Auto-generated scenario for speed-test (ink/network-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: chart, real-time-data, meter
name: speed-test network tool
description: "Launch speed-test, verify semantic detection, exercise network-tool patterns, then quit"
command: /opt/homebrew/bin/speed-test
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 3000
    label: Wait for speed-test to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: speed-test
    label: Verify app is speed-test
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit speed-test
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
