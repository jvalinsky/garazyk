# Auto-generated scenario for broot (ratatui/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, search, filter, status-bar
name: broot file manager
description: "Launch broot, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/broot
cols: 100
rows: 28
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for broot to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: broot
    maxMs: 500
    label: Verify app is broot
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 3000
    label: Quit broot
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
