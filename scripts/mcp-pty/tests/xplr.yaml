# Auto-generated scenario for xplr (ratatui/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, dual-pane, form, status-bar
name: xplr file manager
description: "Launch xplr, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/xplr
cols: 100
rows: 28
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for xplr to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: xplr
    label: Verify app is xplr
  - type: press_key
    value: j
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved down
  - type: press_key
    value: k
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit xplr
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
