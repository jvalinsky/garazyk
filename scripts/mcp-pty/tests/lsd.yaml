# Auto-generated scenario for lsd (stdout/file-lister)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-output, color, icon, tree
name: lsd file lister
description: "Launch lsd, verify semantic detection, exercise file-lister patterns, then quit"
command: /opt/homebrew/bin/lsd
cols: 80
rows: 24
settleMs: 300
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for lsd to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: lsd
    maxMs: 500
    label: Verify app is lsd
  - type: assert_capability
    target: quit.keys
    contains: [q]
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit lsd
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
