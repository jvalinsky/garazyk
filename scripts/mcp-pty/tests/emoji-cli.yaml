# Auto-generated scenario for emoji-cli (ink/emoji-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: search, grid-select, copy
name: emoji-cli emoji tool
description: "Launch emoji-cli, verify semantic detection, exercise emoji-tool patterns, then quit"
command: /opt/homebrew/bin/emoji-cli
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for emoji-cli to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: emoji-cli
    label: Verify app is emoji-cli
  - type: type
    value: test
    label: Type search filter
  - type: wait
    timeoutMs: 300
    label: Wait for filter
  - type: assert_content_changed
    label: Verify content filtered
  - type: quit
    label: Quit emoji-cli
  - type: wait
    timeoutMs: 500
    label: Wait for exit
