# Auto-generated scenario for cmatrix (ncurses/art)
# Framework confidence via semantic detection will be verified
# UI Patterns: animation, styling, scroll
name: cmatrix art
description: "Launch cmatrix, verify semantic detection, exercise art patterns, then quit"
command: /opt/homebrew/bin/cmatrix
cols: 80
rows: 24
settleMs: 2000
steps:
