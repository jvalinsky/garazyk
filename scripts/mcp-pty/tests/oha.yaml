# Auto-generated scenario for oha (ratatui/network-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: chart, gauge, real-time-data, progress-bar
name: oha network tool
description: "Launch oha, verify semantic detection, exercise network-tool patterns, then quit"
command: /opt/homebrew/bin/oha
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 3000
    label: Wait for oha to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: oha
    label: Verify app is oha
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit oha
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
