# Auto-generated scenario for vtop (blessed/system-monitor)
# Framework confidence via semantic detection will be verified
# UI Patterns: chart, table, braille-chart
name: vtop system monitor
description: "Launch vtop, verify semantic detection, exercise system-monitor patterns, then quit"
command: /opt/homebrew/bin/vtop
cols: 120
rows: 30
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for vtop to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: vtop
    maxMs: 500
    label: Verify app is vtop
  - type: assert_semantic
    target: framework
    expected: blessed
    maxMs: 500
    label: Verify framework is blessed
  - type: quit
    maxMs: 2000
    label: Quit vtop
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
