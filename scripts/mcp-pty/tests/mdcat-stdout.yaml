# Auto-generated scenario for mdcat (stdout/markdown-viewer)
# Framework confidence via semantic detection will be verified
# UI Patterns: markdown, syntax-highlight, pager
name: mdcat markdown viewer
description: "Launch mdcat, verify semantic detection, exercise markdown-viewer patterns, then quit"
command: /opt/homebrew/bin/mdcat
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for mdcat to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: mdcat-stdout
    label: Verify app is mdcat-stdout
  - type: press_key
    value: j
    label: Scroll down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Scroll up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit mdcat
  - type: wait
    timeoutMs: 500
    label: Wait for exit
