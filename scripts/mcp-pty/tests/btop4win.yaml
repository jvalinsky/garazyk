# Auto-generated scenario for btop4win (ratatui/system-monitor)
# Framework confidence via semantic detection will be verified
# UI Patterns: braille-chart, tab-navigation, table, block-bar
name: btop4win system monitor
description: "Launch btop4win, verify semantic detection, exercise system-monitor patterns, then quit"
command: /opt/homebrew/bin/btop4win
cols: 120
rows: 30
settleMs: 3000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for btop4win to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: btop4win
    maxMs: 500
    label: Verify app is btop4win
  - type: assert_semantic
    target: framework
    expected: ratatui
    maxMs: 500
    label: Verify framework is ratatui
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch to next tab
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Brief pause
  - type: assert_content_changed
    maxMs: 500
    label: Verify content changed after tab switch
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch to third tab
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit btop4win
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
