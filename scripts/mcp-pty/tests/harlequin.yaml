# Auto-generated scenario for harlequin (textual/database)
# Framework confidence via semantic detection will be verified
# UI Patterns: schema-tree, editor, table
name: harlequin database
description: "Launch harlequin, verify semantic detection, exercise database patterns, then quit"
command: /opt/homebrew/bin/harlequin
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for harlequin to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: harlequin
    maxMs: 500
    label: Verify app is harlequin
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 3000
    label: Quit harlequin
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
