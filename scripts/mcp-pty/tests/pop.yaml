# Auto-generated scenario for pop (bubbletea/email)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, compose, search, sidebar
name: pop email
description: "Launch pop, verify semantic detection, exercise email patterns, then quit"
command: /Users/jack/go/bin/pop
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for pop to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: pop
    maxMs: 500
    label: Verify app is pop
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit pop
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
