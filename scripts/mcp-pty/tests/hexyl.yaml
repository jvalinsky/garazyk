# Auto-generated scenario for hexyl (cursive/dev-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: hexview, scroll, search
name: hexyl dev tool
description: "Launch hexyl, verify semantic detection, exercise dev-tool patterns, then quit"
command: /opt/homebrew/bin/hexyl
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for hexyl to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: hexyl
    label: Verify app is hexyl
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit hexyl
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
