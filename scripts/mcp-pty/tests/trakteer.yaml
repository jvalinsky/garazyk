# Auto-generated scenario for trakteer (ink/task-mgmt)
# Framework confidence via semantic detection will be verified
# UI Patterns: board, list-selection, status-bar, filter-search
name: trakteer task mgmt
description: "Launch trakteer, verify semantic detection, exercise task-mgmt patterns, then quit"
command: /opt/homebrew/bin/trakteer
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for trakteer to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: trakteer
    label: Verify app is trakteer
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit trakteer
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
