# Auto-generated scenario for cbonsai (ratatui/art)
# Framework confidence via semantic detection will be verified
# UI Patterns: animation, ascii-art, color
name: cbonsai art
description: "Launch cbonsai, verify semantic detection, exercise art patterns, then quit"
command: /opt/homebrew/bin/cbonsai
cols: 80
rows: 24
settleMs: 500
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for cbonsai to animate
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: cbonsai
    maxMs: 500
    label: Verify app is cbonsai
  - type: quit
    maxMs: 2000
    label: Quit cbonsai
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
