# Auto-generated scenario for promptui-prompt (promptui/form-library)
# Framework confidence via semantic detection will be verified
# UI Patterns: form-input, confirm-dialog, select, masked-input
name: promptui-prompt form library
description: "Launch promptui-prompt, verify semantic detection, exercise form-library patterns, then quit"
command: /opt/homebrew/bin/promptui-prompt
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for promptui-prompt to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: promptui-prompt
    label: Verify app is promptui-prompt
  - type: assert_capability
    target: quit.keys
    contains: Esc
    label: Verify quit key is available
  - type: quit
    label: Quit promptui-prompt
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
