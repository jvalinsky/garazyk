# Auto-generated scenario for lynx (ncurses/web)
# Framework confidence via semantic detection will be verified
# UI Patterns: pager, form-input, list-selection, link-navigation
name: lynx web
description: "Launch lynx, verify semantic detection, exercise web patterns, then quit"
command: /opt/homebrew/bin/lynx
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for lynx to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: lynx
    maxMs: 500
    label: Verify app is lynx
  - type: assert_capability
    target: quit.keys
    contains: [q]
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit lynx
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
