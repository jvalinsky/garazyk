# Auto-generated scenario for rusty-krab-manager (ratatui/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree-view, list-selection, tab-navigation, search
name: rusty-krab-manager file manager
description: "Launch rusty-krab-manager, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/rkm
cols: 100
rows: 28
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for rusty-krab-manager to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: rusty-krab
    label: Verify app is rusty-krab
  - type: press_key
    value: j
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved down
  - type: press_key
    value: k
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit rusty-krab-manager
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
