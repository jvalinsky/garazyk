# Auto-generated scenario for cointop (bubbletea/finance)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, chart, search, real-time-data, list-selection
name: cointop finance
description: "Launch cointop, verify semantic detection, exercise finance patterns, then quit"
command: /opt/homebrew/bin/cointop
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 3000
    maxMs: 9000
    label: Wait for cointop to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: cointop
    maxMs: 500
    label: Verify app is cointop
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit cointop
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
