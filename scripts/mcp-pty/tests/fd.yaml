# Auto-generated scenario for fd (stdout/search)
# Framework confidence via semantic detection will be verified
# UI Patterns: search, list-output, color
name: fd search
description: "Launch fd, verify semantic detection, exercise search patterns, then quit"
command: /opt/homebrew/bin/fd
cols: 80
rows: 24
settleMs: 500
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for fd to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: fd
    label: Verify app is fd
  - type: type
    value: test
    label: Type search filter
  - type: wait
    timeoutMs: 300
    label: Wait for filter
  - type: assert_content_changed
    label: Verify content filtered
  - type: quit
    label: Quit fd
  - type: wait
    timeoutMs: 500
    label: Wait for exit
