# Auto-generated scenario for textual-fs (textual/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree-view, list-selection, file-ops, preview
name: textual-fs file manager
description: "Launch textual-fs, verify semantic detection, exercise file-manager patterns, then quit"
command: textual-fs
cols: 100
rows: 28
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for textual-fs to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: textual-fs
    maxMs: 500
    label: Verify app is textual-fs
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit textual-fs
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
