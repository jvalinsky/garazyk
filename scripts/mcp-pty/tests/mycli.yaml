# Auto-generated scenario for mycli (textual/database)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, autocomplete, syntax-highlighting, editor
name: mycli database
description: "Launch mycli, verify semantic detection, exercise database patterns, then quit"
command: /opt/homebrew/bin/mycli
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for mycli to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: mycli
    maxMs: 500
    label: Verify app is mycli
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit mycli
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
