# Auto-generated scenario for ncdu (ncurses/disk-analyzer)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, list-selection, confirm-dialog, sort
name: ncdu disk analyzer
description: "Launch ncdu, verify semantic detection, exercise disk-analyzer patterns, then quit"
command: /opt/homebrew/bin/ncdu
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for ncdu to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ncdu
    label: Verify app is ncdu
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit ncdu
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
