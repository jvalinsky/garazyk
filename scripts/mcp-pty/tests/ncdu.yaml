# Auto-generated scenario for ncdu (ncurses/disk-analyzer)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, list-selection, confirm-dialog, sort
name: ncdu disk analyzer
description: "Launch ncdu, verify semantic detection, exercise disk-analyzer patterns, then quit"
command: /opt/homebrew/bin/ncdu
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for ncdu to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ncdu
    maxMs: 500
    label: Verify app is ncdu
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit ncdu
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
