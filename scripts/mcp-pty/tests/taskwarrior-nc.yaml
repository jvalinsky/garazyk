# Auto-generated scenario for taskwarrior (ncurses/task-mgmt)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, filter-search, tag, priority, urgency
name: taskwarrior task mgmt
description: "Launch taskwarrior, verify semantic detection, exercise task-mgmt patterns, then quit"
command: /opt/homebrew/bin/task
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for taskwarrior to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: taskwarrior-nc
    label: Verify app is taskwarrior-nc
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit taskwarrior
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
