# Auto-generated scenario for midnight-commander (ncurses/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: dual-pane, menu, form, dialog, f-key-bar
name: midnight-commander file manager
description: "Launch midnight-commander, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/mc
cols: 100
rows: 28
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for midnight-commander to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: mc
    maxMs: 500
    label: Verify app is mc
  - type: press_key
    value: down
    maxMs: 500
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: up
    maxMs: 500
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_content_changed
    maxMs: 500
    label: Verify content changed after navigation
  - type: quit
    maxMs: 3000
    label: Quit midnight-commander
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
