# Auto-generated scenario for mdcat (ratatui/markdown-viewer)
# Framework confidence via semantic detection will be verified
# UI Patterns: markdown, syntax-highlight, scroll, table
name: mdcat markdown viewer
description: "Launch mdcat, verify semantic detection, exercise markdown-viewer patterns, then quit"
command: /opt/homebrew/bin/mdcat
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for mdcat to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: mdcat
    maxMs: 500
    label: Verify app is mdcat
  - type: press_key
    value: j
    maxMs: 500
    label: Scroll down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Scroll up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit mdcat
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
