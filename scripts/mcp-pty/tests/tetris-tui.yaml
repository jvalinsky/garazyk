# Auto-generated scenario for tetris-tui (cursive/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: game-board, grid, score-bar, controls
name: tetris-tui game
description: "Launch tetris-tui, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/tetris-tui
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for tetris-tui to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tetris-tui
    maxMs: 500
    label: Verify app is tetris-tui
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit tetris-tui
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
