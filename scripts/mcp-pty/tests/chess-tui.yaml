# Auto-generated scenario for chess-tui (ratatui/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: board, entities, game-loop, move-list, timer
name: chess-tui game
description: "Launch chess-tui, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/chess-tui
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for chess-tui to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: chess-tui
    maxMs: 500
    label: Verify app is chess-tui
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit chess-tui
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
