# Auto-generated scenario for cyclopts (rich/cli-builder)
# Framework confidence via semantic detection will be verified
# UI Patterns: form-input, panel, help-viewer
name: cyclopts cli builder
description: "Launch cyclopts, verify semantic detection, exercise cli-builder patterns, then quit"
command: cyclopts
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for cyclopts to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: cyclopts
    label: Verify app is cyclopts
  - type: assert_capability
    target: quit.keys
    contains: ctrl+c
    label: Verify quit key is available
  - type: quit
    label: Quit cyclopts
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
