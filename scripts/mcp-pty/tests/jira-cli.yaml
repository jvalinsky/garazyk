# Auto-generated scenario for jira-cli (ink/project-mgmt)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, form-input, tab-navigation, filter-search
name: jira-cli project mgmt
description: "Launch jira-cli, verify semantic detection, exercise project-mgmt patterns, then quit"
command: /opt/homebrew/bin/jira-cli
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for jira-cli to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: jira-cli
    label: Verify app is jira-cli
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit jira-cli
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
