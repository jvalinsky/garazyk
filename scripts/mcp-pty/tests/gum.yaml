# Auto-generated scenario for gum (bubbletea/form-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: input, choose, confirm, filter
name: gum form tool
description: "Launch gum, verify semantic detection, exercise form-tool patterns, then quit"
command: /opt/homebrew/bin/gum
cols: 80
rows: 24
settleMs: 500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for gum to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: gum
    maxMs: 500
    label: Verify app is gum
  - type: assert_capability
    target: quit.keys
    contains: [q, escape]
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit gum
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
