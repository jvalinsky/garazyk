# Auto-generated scenario for visidata (rich/data-browser)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, column-sort, filter, chart, form-input
name: visidata data browser
description: "Launch visidata, verify semantic detection, exercise data-browser patterns, then quit"
command: vd
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for visidata to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: visidata
    label: Verify app is visidata
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit visidata
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
