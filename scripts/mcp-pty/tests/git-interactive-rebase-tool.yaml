# Auto-generated scenario for interactive-rebase-tool (cursive/git-client)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, reorder-list, confirm-dialog, status-bar
name: interactive-rebase-tool git client
description: "Launch interactive-rebase-tool, verify semantic detection, exercise git-client patterns, then quit"
command: /opt/homebrew/bin/interactive-rebase-tool
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for interactive-rebase-tool to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: git-interactive-rebase-tool
    maxMs: 500
    label: Verify app is git-interactive-rebase-tool
  - type: assert_semantic
    target: framework
    expected: cursive
    maxMs: 500
    label: Verify framework is cursive
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down in list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up in list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit interactive-rebase-tool
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
