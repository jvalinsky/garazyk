# Auto-generated scenario for saws (rich/dev-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: form-input, autocomplete, syntax-highlight, table
name: saws dev tool
description: "Launch saws, verify semantic detection, exercise dev-tool patterns, then quit"
command: saws
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for saws to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: saws
    maxMs: 500
    label: Verify app is saws
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit saws
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
