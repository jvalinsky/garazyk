# Auto-generated scenario for textual-web (rich/web)
# Framework confidence via semantic detection will be verified
# UI Patterns: proxy, status-bar
name: textual-web web
description: "Launch textual-web, verify semantic detection, exercise web patterns, then quit"
command: textual-web
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for textual-web to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: textual-web
    maxMs: 500
    label: Verify app is textual-web
  - type: assert_capability
    target: quit.keys
    contains: ctrl+c
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit textual-web
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
