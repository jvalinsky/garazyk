# Auto-generated scenario for cmus (ncurses/music)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, tree, tab-navigation, status-bar, filter-search
name: cmus music
description: "Launch cmus, verify semantic detection, exercise music patterns, then quit"
command: /opt/homebrew/bin/cmus
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for cmus to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: cmus
    label: Verify app is cmus
  - type: press_key
    value: "1"
    label: Switch to library tab
  - type: wait
    timeoutMs: 300
    label: Brief pause
  - type: press_key
    value: "2"
    label: Switch to playlist tab
  - type: wait
    timeoutMs: 300
    label: Brief pause
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: quit
    label: Quit cmus
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
