# Auto-generated scenario for cmus (ncurses/music)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, tree, tab-navigation, status-bar, filter-search
name: cmus music
description: "Launch cmus, verify semantic detection, exercise music patterns, then quit"
command: /opt/homebrew/bin/cmus
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for cmus to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: cmus
    maxMs: 500
    label: Verify app is cmus
  - type: press_key
    value: "1"
    maxMs: 500
    label: Switch to library tab
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: "2"
    maxMs: 500
    label: Switch to playlist tab
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 3000
    label: Quit cmus
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
