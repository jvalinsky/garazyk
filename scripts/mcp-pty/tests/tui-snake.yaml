# Auto-generated scenario for tui-snake (opentui/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: game-board, 2d-movement, score-bar, popup-modal
name: tui-snake game
description: "Launch tui-snake, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/tui-snake
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 2000
    label: Wait for tui-snake to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tui-snake
    label: Verify app is tui-snake
  - type: press_key
    value: j
    label: Move down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Move up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: l
    label: Move right
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: h
    label: Move left
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit tui-snake
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
