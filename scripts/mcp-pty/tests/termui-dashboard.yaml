# Auto-generated scenario for termui-dashboard (termui/dashboard)
# Framework confidence via semantic detection will be verified
# UI Patterns: dashboard, chart, gauge, sparkline, table
name: termui-dashboard dashboard
description: "Launch termui-dashboard, verify semantic detection, exercise dashboard patterns, then quit"
command: /opt/homebrew/bin/termui-dashboard
cols: 120
rows: 30
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 3000
    maxMs: 9000
    label: Wait for termui-dashboard to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: termui-dashboard
    maxMs: 500
    label: Verify app is termui-dashboard
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch panel focus
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for focus switch
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit termui-dashboard
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
