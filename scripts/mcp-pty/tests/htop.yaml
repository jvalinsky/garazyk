# Auto-generated scenario for htop (ncurses/system-monitor)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, pipe-meter, f-key-bar, process-list
name: htop system monitor
description: "Launch htop, verify semantic detection, exercise system-monitor patterns, then quit"
command: /opt/homebrew/bin/htop
cols: 120
rows: 30
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for htop to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: htop
    maxMs: 500
    label: Verify app is htop
  - type: assert_semantic
    target: framework
    expected: ncurses
    maxMs: 500
    label: Verify framework is ncurses
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 3000
    label: Quit htop
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
