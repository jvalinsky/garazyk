# Auto-generated scenario for dry (bubbletea/docker)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, log-viewer, tab-navigation, form-input
name: dry docker
description: "Launch dry, verify semantic detection, exercise docker patterns, then quit"
command: /opt/homebrew/bin/dry
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for dry to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: dry
    maxMs: 500
    label: Verify app is dry
  - type: assert_semantic
    target: framework
    expected: bubbletea
    maxMs: 500
    label: Verify framework is bubbletea
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch to next tab
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Brief pause
  - type: assert_content_changed
    maxMs: 500
    label: Verify content changed after tab switch
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch to third tab
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved after navigation
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit dry
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
