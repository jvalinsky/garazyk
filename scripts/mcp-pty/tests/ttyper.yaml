# Auto-generated scenario for ttyper (ratatui/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: game-loop, score, text-input, timer
name: ttyper game
description: "Launch ttyper, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/ttyper
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 2000
    label: Wait for ttyper to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ttyper
    label: Verify app is ttyper
  - type: press_key
    value: j
    label: Move down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Move up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: l
    label: Move right
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: h
    label: Move left
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit ttyper
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
