# Auto-generated scenario for ftxui-radiobox (ftxui/form-library)
# Framework confidence via semantic detection will be verified
# UI Patterns: radio, toggle, checkbox, button
name: ftxui-radiobox form library
description: "Launch ftxui-radiobox, verify semantic detection, exercise form-library patterns, then quit"
command: /opt/homebrew/bin/ftxui-radiobox
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for ftxui-radiobox to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ftxui-radiobox
    maxMs: 500
    label: Verify app is ftxui-radiobox
  - type: assert_capability
    target: quit.keys
    contains: Esc
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit ftxui-radiobox
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
