# Auto-generated scenario for game-of-life (ftxui/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: grid, animation, controls, game-board
name: game-of-life game
description: "Launch game-of-life, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/game-of-life
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 2000
    label: Wait for game-of-life to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: game-of-life
    label: Verify app is game-of-life
  - type: press_key
    value: j
    label: Move down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Move up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: l
    label: Move right
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: h
    label: Move left
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit game-of-life
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
