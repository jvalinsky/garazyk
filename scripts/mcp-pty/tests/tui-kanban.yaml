# Auto-generated scenario for tui-kanban (opentui/board)
# Framework confidence via semantic detection will be verified
# UI Patterns: board, card, drag, tag, search
name: tui-kanban board
description: "Launch tui-kanban, verify semantic detection, exercise board patterns, then quit"
command: /opt/homebrew/bin/tui-kanban
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for tui-kanban to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tui-kanban
    label: Verify app is tui-kanban
  - type: assert_capability
    target: quit.keys
    contains: q, ctrl+c
    label: Verify quit key is available
  - type: quit
    label: Quit tui-kanban
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
