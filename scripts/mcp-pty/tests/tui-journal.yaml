# Auto-generated scenario for tui-journal (ratatui/notes)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, form-input, search, markdown
name: tui-journal notes
description: "Launch tui-journal, verify semantic detection, exercise notes patterns, then quit"
command: /opt/homebrew/bin/tui-journal
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for tui-journal to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tui-journal
    maxMs: 500
    label: Verify app is tui-journal
  - type: type
    value: test
    maxMs: 500
    label: Type search filter
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Wait for filter
  - type: assert_content_changed
    maxMs: 500
    label: Verify content filtered
  - type: quit
    maxMs: 2000
    label: Quit tui-journal
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
