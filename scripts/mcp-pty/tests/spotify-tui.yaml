# Auto-generated scenario for spotify-tui (ratatui/music)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, search, status-bar, tab-navigation
name: spotify-tui music
description: "Launch spotify-tui, verify semantic detection, exercise music patterns, then quit"
command: /opt/homebrew/bin/spt
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for spotify-tui to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: spotify-tui
    label: Verify app is spotify-tui
  - type: press_key
    value: "1"
    label: Switch to library tab
  - type: wait
    timeoutMs: 300
    label: Brief pause
  - type: press_key
    value: "2"
    label: Switch to playlist tab
  - type: wait
    timeoutMs: 300
    label: Brief pause
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: quit
    label: Quit spotify-tui
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
