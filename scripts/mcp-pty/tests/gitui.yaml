# Auto-generated scenario for gitui (ratatui/git-client)
# Framework confidence via semantic detection will be verified
# UI Patterns: split-pane, list-selection, popup-modal, confirm-dialog, tab-navigation
name: gitui git client
description: "Launch gitui, verify semantic detection, exercise git-client patterns, then quit"
command: /opt/homebrew/bin/gitui
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for gitui to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: gitui
    maxMs: 500
    label: Verify app is gitui
  - type: assert_semantic
    target: framework
    expected: ratatui
    maxMs: 500
    label: Verify framework is ratatui
  - type: press_key
    value: "1"
    maxMs: 500
    label: Switch to first panel
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: "2"
    maxMs: 500
    label: Switch to second panel
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down in list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up in list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit gitui
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
