# Auto-generated scenario for spotifyd (ncspot/music)
# Framework confidence via semantic detection will be verified
# UI Patterns: status-bar, list-selection, queue
name: spotifyd music
description: "Launch spotifyd, verify semantic detection, exercise music patterns, then quit"
command: /opt/homebrew/bin/spotifyd
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for spotifyd to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: spotifyd
    label: Verify app is spotifyd
  - type: press_key
    value: "1"
    label: Switch to library tab
  - type: wait
    timeoutMs: 300
    label: Brief pause
  - type: press_key
    value: "2"
    label: Switch to playlist tab
  - type: wait
    timeoutMs: 300
    label: Brief pause
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: quit
    label: Quit spotifyd
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
