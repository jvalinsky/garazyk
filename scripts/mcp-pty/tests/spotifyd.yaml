# Auto-generated scenario for spotifyd (ncspot/music)
# Framework confidence via semantic detection will be verified
# UI Patterns: status-bar, list-selection, queue
name: spotifyd music
description: "Launch spotifyd, verify semantic detection, exercise music patterns, then quit"
command: /opt/homebrew/bin/spotifyd
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for spotifyd to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: spotifyd
    maxMs: 500
    label: Verify app is spotifyd
  - type: press_key
    value: "1"
    maxMs: 500
    label: Switch to library tab
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: "2"
    maxMs: 500
    label: Switch to playlist tab
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: quit
    maxMs: 2000
    label: Quit spotifyd
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
