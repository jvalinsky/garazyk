# Auto-generated scenario for textual-fspicker (textual/file-picker)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, search, form-input, list-selection
name: textual-fspicker file picker
description: "Launch textual-fspicker, verify semantic detection, exercise file-picker patterns, then quit"
command: textual-fspicker
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for textual-fspicker to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: textual-fspicker
    label: Verify app is textual-fspicker
  - type: press_key
    value: j
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved down
  - type: press_key
    value: k
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit textual-fspicker
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
