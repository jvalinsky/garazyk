# Auto-generated scenario for ctop (bubbletea/docker)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, chart, real-time-data, list-selection
name: ctop docker
description: "Launch ctop, verify semantic detection, exercise docker patterns, then quit"
command: /opt/homebrew/bin/ctop
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for ctop to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ctop
    maxMs: 500
    label: Verify app is ctop
  - type: assert_semantic
    target: framework
    expected: bubbletea
    maxMs: 500
    label: Verify framework is bubbletea
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit ctop
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
