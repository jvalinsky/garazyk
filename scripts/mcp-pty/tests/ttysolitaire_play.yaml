# Auto-generated scenario for tty-solitaire (ncurses/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: card-grid, 2d-selection, game-board, score-bar
name: tty-solitaire game
description: "Launch tty-solitaire, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/ttysolitaire
cols: 60
rows: 30
settleMs: 3000
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for tty-solitaire to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tty-solitaire
    maxMs: 500
    label: Verify app is tty-solitaire
  - type: press_key
    value: space
    maxMs: 500
    label: Start the game
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for game board
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 4 directions)
  - type: quit
    maxMs: 2000
    label: Quit tty-solitaire
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
