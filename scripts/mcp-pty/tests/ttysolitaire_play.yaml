# Auto-generated scenario for tty-solitaire (ncurses/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: card-grid, 2d-selection, game-board, score-bar
name: tty-solitaire game
description: "Launch tty-solitaire, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/ttysolitaire
cols: 60
rows: 30
settleMs: 3000
steps:
  - type: wait
    timeoutMs: 2000
    label: Wait for tty-solitaire to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: tty-solitaire
    label: Verify app is tty-solitaire
  - type: press_key
    value: space
    label: Start the game
  - type: wait
    timeoutMs: 1500
    label: Wait for game board
  - type: press_key
    value: j
    label: Move down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved
  - type: press_key
    value: k
    label: Move up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: l
    label: Move right
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: h
    label: Move left
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit tty-solitaire
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
