# Auto-generated scenario for diskonaut (ratatui/disk-analyzer)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, chart, table, list-selection
name: diskonaut disk analyzer
description: "Launch diskonaut, verify semantic detection, exercise disk-analyzer patterns, then quit"
command: /Users/jack/.cargo/bin/diskonaut
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for diskonaut to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: diskonaut
    label: Verify app is diskonaut
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    label: Quit diskonaut
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
