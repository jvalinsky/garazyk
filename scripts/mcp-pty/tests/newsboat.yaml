# Auto-generated scenario for newsboat (ncurses/rss)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, tab-navigation, status-bar, filter-search, form-input
name: newsboat rss
description: "Launch newsboat, verify semantic detection, exercise rss patterns, then quit"
command: /opt/homebrew/bin/newsboat
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for newsboat to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: newsboat
    maxMs: 500
    label: Verify app is newsboat
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: tab
    maxMs: 500
    label: Switch tab
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for tab switch
  - type: quit
    maxMs: 2000
    label: Quit newsboat
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
