# Auto-generated scenario for newsboat (ncurses/rss)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, tab-navigation, status-bar, filter-search, form-input
name: newsboat rss
description: "Launch newsboat, verify semantic detection, exercise rss patterns, then quit"
command: /opt/homebrew/bin/newsboat
args: [-C, /Users/jack/.newsboat/config, -u, /Users/jack/.newsboat/urls, -c, /Users/jack/.newsboat/cache.db]
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    label: Wait for newsboat to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: newsboat
    label: Verify app is newsboat
  - type: press_key
    value: j
    label: Navigate down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: press_key
    value: k
    label: Navigate up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: press_key
    value: tab
    label: Switch tab
  - type: wait
    timeoutMs: 500
    label: Wait for tab switch
  - type: quit
    label: Quit newsboat
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
