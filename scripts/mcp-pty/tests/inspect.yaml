# Auto-generated scenario for inspect (rich/debugger)
# Framework confidence via semantic detection will be verified
# UI Patterns: tree, table, scroll
name: inspect debugger
description: "Launch inspect, verify semantic detection, exercise debugger patterns, then quit"
command: inspect
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for inspect to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: inspect
    maxMs: 500
    label: Verify app is inspect
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit inspect
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
