# Auto-generated scenario for ishell-demo (ishell/form-library)
# Framework confidence via semantic detection will be verified
# UI Patterns: form-input, autocomplete, menu, progress-bar
name: ishell-demo form library
description: "Launch ishell-demo, verify semantic detection, exercise form-library patterns, then quit"
command: /opt/homebrew/bin/ishell-demo
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for ishell-demo to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ishell-demo
    maxMs: 500
    label: Verify app is ishell-demo
  - type: assert_capability
    target: quit.keys
    contains: [Ctrl+C]
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit ishell-demo
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
