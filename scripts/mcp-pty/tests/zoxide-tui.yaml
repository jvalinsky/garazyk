# Auto-generated scenario for zoxide (ratatui/picker)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, search, frecency, sort
name: zoxide picker
description: "Launch zoxide, verify semantic detection, exercise picker patterns, then quit"
command: /opt/homebrew/bin/zoxide
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for zoxide to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: zoxide-tui
    maxMs: 500
    label: Verify app is zoxide-tui
  - type: type
    value: test
    maxMs: 500
    label: Type search filter
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Wait for filter
  - type: assert_content_changed
    maxMs: 500
    label: Verify content filtered
  - type: quit
    maxMs: 2000
    label: Quit zoxide
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
