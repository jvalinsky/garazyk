# Auto-generated scenario for glances (rich/system-monitor)
# Framework confidence via semantic detection will be verified
# UI Patterns: chart, gauge, table, real-time-data, alert
name: glances system monitor
description: "Launch glances, verify semantic detection, exercise system-monitor patterns, then quit"
command: glances
cols: 120
rows: 30
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for glances to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: glances
    maxMs: 500
    label: Verify app is glances
  - type: assert_semantic
    target: framework
    expected: rich
    maxMs: 500
    label: Verify framework is rich
  - type: quit
    maxMs: 2000
    label: Quit glances
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
