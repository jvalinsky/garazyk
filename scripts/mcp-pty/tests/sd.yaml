# Auto-generated scenario for sd (stdout/search)
# Framework confidence via semantic detection will be verified
# UI Patterns: search, color, replace
name: sd search
description: "Launch sd, verify semantic detection, exercise search patterns, then quit"
command: /opt/homebrew/bin/sd
cols: 80
rows: 24
settleMs: 300
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for sd to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: sd
    label: Verify app is sd
  - type: type
    value: test
    label: Type search filter
  - type: wait
    timeoutMs: 300
    label: Wait for filter
  - type: assert_content_changed
    label: Verify content filtered
  - type: quit
    label: Quit sd
  - type: wait
    timeoutMs: 500
    label: Wait for exit
