# Auto-generated scenario for wiki-tui (ratatui/search)
# Framework confidence via semantic detection will be verified
# UI Patterns: search, list-selection, pager, markdown
name: wiki-tui search
description: "Launch wiki-tui, verify semantic detection, exercise search patterns, then quit"
command: /opt/homebrew/bin/wiki-tui
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for wiki-tui to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: wiki-tui
    maxMs: 500
    label: Verify app is wiki-tui
  - type: type
    value: test
    maxMs: 500
    label: Type search filter
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Wait for filter
  - type: assert_content_changed
    maxMs: 500
    label: Verify content filtered
  - type: quit
    maxMs: 2000
    label: Quit wiki-tui
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
