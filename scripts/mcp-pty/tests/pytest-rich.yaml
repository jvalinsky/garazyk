# Auto-generated scenario for pytest-rich (rich/testing)
# Framework confidence via semantic detection will be verified
# UI Patterns: table, progress, status-bar
name: pytest-rich testing
description: "Launch pytest-rich, verify semantic detection, exercise testing patterns, then quit"
command: pytest
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for pytest-rich to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: pytest-rich
    maxMs: 500
    label: Verify app is pytest-rich
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit pytest-rich
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
