# Auto-generated scenario for ranger (ncurses/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: dual-pane, file-preview, tab-navigation, vim-keys
name: ranger file manager
description: "Launch ranger, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/ranger
cols: 100
rows: 28
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for ranger to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ranger
    label: Verify app is ranger
  - type: press_key
    value: j
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_cursor_moved
    label: Verify cursor moved down
  - type: press_key
    value: k
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit ranger
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
