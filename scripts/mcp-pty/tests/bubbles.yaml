# Auto-generated scenario for bubbles (bubbletea/demo)
# Framework confidence via semantic detection will be verified
# UI Patterns: tab-navigation, form-input, table, viewport, progress-bar
name: bubbles demo
description: "Launch bubbles, verify semantic detection, exercise demo patterns, then quit"
command: /opt/homebrew/bin/bubbles
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for bubbles to animate
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: bubbles
    maxMs: 500
    label: Verify app is bubbles
  - type: quit
    maxMs: 2000
    label: Quit bubbles
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
