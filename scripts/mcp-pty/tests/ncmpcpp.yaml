# Auto-generated scenario for ncmpcpp (notcurses/music)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, tree, tab-navigation, status-bar, filter-search
name: ncmpcpp music
description: "Launch ncmpcpp, verify semantic detection, exercise music patterns, then quit"
command: /opt/homebrew/bin/ncmpcpp
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for ncmpcpp to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: ncmpcpp
    maxMs: 500
    label: Verify app is ncmpcpp
  - type: press_key
    value: "1"
    maxMs: 500
    label: Switch to library tab
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: "2"
    maxMs: 500
    label: Switch to playlist tab
  - type: wait
    timeoutMs: 300
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit ncmpcpp
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
