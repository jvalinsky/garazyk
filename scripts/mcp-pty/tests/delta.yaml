# Auto-generated scenario for delta (ratatui/git-client)
# Framework confidence via semantic detection will be verified
# UI Patterns: syntax-highlighting, diff, pager, line-numbers
name: delta git client
description: "Launch delta, verify semantic detection, exercise git-client patterns, then quit"
command: /opt/homebrew/bin/delta
cols: 80
rows: 24
settleMs: 500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for delta to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: delta
    maxMs: 500
    label: Verify app is delta
  - type: assert_semantic
    target: framework
    expected: ratatui
    maxMs: 500
    label: Verify framework is ratatui
  - type: quit
    maxMs: 2000
    label: Quit delta
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
