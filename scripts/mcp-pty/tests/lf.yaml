# Auto-generated scenario for lf (bubbletea/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: dual-pane, tree, file-preview, status-bar
name: lf file manager
description: "Launch lf, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/lf
cols: 100
rows: 28
settleMs: 500
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for lf to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: lf
    maxMs: 500
    label: Verify app is lf
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit lf
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
