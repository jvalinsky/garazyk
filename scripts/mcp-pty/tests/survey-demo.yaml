# Auto-generated scenario for survey-demo (survey/form-library)
# Framework confidence via semantic detection will be verified
# UI Patterns: form-input, multi-select, confirm-dialog, password-input, dropdown
name: survey-demo form library
description: "Launch survey-demo, verify semantic detection, exercise form-library patterns, then quit"
command: /opt/homebrew/bin/survey-demo
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for survey-demo to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: survey-demo
    maxMs: 500
    label: Verify app is survey-demo
  - type: assert_capability
    target: quit.keys
    contains: Esc
    maxMs: 500
    label: Verify quit key is available
  - type: quit
    maxMs: 2000
    label: Quit survey-demo
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
