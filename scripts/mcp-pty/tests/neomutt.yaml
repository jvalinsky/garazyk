# Auto-generated scenario for neomutt (notcurses/email)
# Framework confidence via semantic detection will be verified
# UI Patterns: list-selection, compose, sidebar, search, status-bar
name: neomutt email
description: "Launch neomutt, verify semantic detection, exercise email patterns, then quit"
command: /opt/homebrew/bin/neomutt
cols: 80
rows: 24
settleMs: 1500
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for neomutt to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: neomutt
    maxMs: 500
    label: Verify app is neomutt
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit neomutt
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
