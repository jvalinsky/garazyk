# Auto-generated scenario for bat (ratatui/pager)
# Framework confidence via semantic detection will be verified
# UI Patterns: syntax-highlighting, pager, scroll, line-numbers, status-bar
name: bat pager
description: "Launch bat, verify semantic detection, exercise pager patterns, then quit"
command: /opt/homebrew/bin/bat
cols: 80
rows: 24
settleMs: 500
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for bat to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: bat
    label: Verify app is bat
  - type: press_key
    value: j
    label: Scroll down
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: assert_content_changed
    label: Verify content scrolled
  - type: press_key
    value: k
    label: Scroll up
  - type: wait
    timeoutMs: 200
    label: Brief pause
  - type: quit
    label: Quit bat
  - type: wait
    timeoutMs: 500
    label: Wait for exit
