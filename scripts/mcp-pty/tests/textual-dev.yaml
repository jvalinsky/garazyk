# Auto-generated scenario for textual-dev (textual/dev-tool)
# Framework confidence via semantic detection will be verified
# UI Patterns: log-viewer, css-editor, repl, tab-navigation
name: textual-dev dev tool
description: "Launch textual-dev, verify semantic detection, exercise dev-tool patterns, then quit"
command: textual-dev
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1500
    maxMs: 4500
    label: Wait for textual-dev to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: textual-dev
    maxMs: 500
    label: Verify app is textual-dev
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: quit
    maxMs: 2000
    label: Quit textual-dev
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
