# Auto-generated scenario for textual-paint (textual/drawing)
# Framework confidence via semantic detection will be verified
# UI Patterns: canvas, palette, tool-select
name: textual-paint drawing
description: "Launch textual-paint, verify semantic detection, exercise drawing patterns, then quit"
command: textual-paint
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 6000
    label: Wait for textual-paint to animate
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: textual-paint
    maxMs: 500
    label: Verify app is textual-paint
  - type: quit
    maxMs: 3000
    label: Quit textual-paint
  - type: wait
    timeoutMs: 500
    maxMs: 1500
    label: Wait for exit
