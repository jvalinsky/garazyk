name: Ncdu Navigate and Quit
description: Launch ncdu, navigate into a directory, go back up, and quit
command: /opt/homebrew/bin/ncdu
args: /Users/jack/Software/garazyk/scripts
cwd: /Users/jack/Software/garazyk
cols: 120
rows: 30
settleMs: 2000

steps:
  - type: select_item
    target: mcp-pty
    maxMs: 500
    label: Select the mcp-pty directory
  - type: press_key
    value: enter
    maxMs: 500
    label: Enter the mcp-pty directory
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for directory scan
  - type: press_key
    value: h
    maxMs: 500
    label: Go back up to parent directory
  - type: quit
    maxMs: 2000
    label: Quit ncdu
