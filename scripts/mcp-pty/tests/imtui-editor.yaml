# Auto-generated scenario for imtui-editor (imtui/text-editor)
# Framework confidence via semantic detection will be verified
# UI Patterns: editor, syntax-highlight, cursor, status-bar, tree-view
name: imtui-editor text editor
description: "Launch imtui-editor, verify semantic detection, exercise text-editor patterns, then quit"
command: /opt/homebrew/bin/imtui-editor
cols: 80
rows: 24
settleMs: 2000
steps:
  - type: wait
    timeoutMs: 1000
    label: Wait for imtui-editor to render
  - type: observe
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: imtui-editor
    label: Verify app is imtui-editor
  - type: quit
    label: Quit imtui-editor
  - type: wait
    timeoutMs: 1000
    label: Wait for exit
