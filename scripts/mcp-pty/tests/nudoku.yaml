# Auto-generated scenario for nudoku (ncurses/game)
# Framework confidence via semantic detection will be verified
# UI Patterns: grid, selection, input
name: nudoku game
description: "Launch nudoku, verify semantic detection, exercise game patterns, then quit"
command: /opt/homebrew/bin/nudoku
cols: 80
rows: 24
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 2000
    maxMs: 3000
    label: Wait for nudoku to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: nudoku
    maxMs: 500
    label: Verify app is nudoku
  - type: press_key
    value: j
    maxMs: 500
    label: Move down
  - type: wait
    timeoutMs: 200
    maxMs: 500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Move up
  - type: wait
    timeoutMs: 200
    maxMs: 500
    label: Brief pause
  - type: press_key
    value: l
    maxMs: 500
    label: Move right
  - type: wait
    timeoutMs: 200
    maxMs: 500
    label: Brief pause
  - type: press_key
    value: h
    maxMs: 500
    label: Move left
  - type: wait
    timeoutMs: 200
    maxMs: 500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 4 directions)
  - type: press_key
    value: "Q"
    maxMs: 3000
    label: Quit nudoku (Q)
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
