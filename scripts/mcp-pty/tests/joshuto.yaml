# Auto-generated scenario for joshuto (ratatui/file-manager)
# Framework confidence via semantic detection will be verified
# UI Patterns: dual-pane, tab-navigation, file-preview
name: joshuto file manager
description: "Launch joshuto, verify semantic detection, exercise file-manager patterns, then quit"
command: /opt/homebrew/bin/joshuto
cols: 100
rows: 28
settleMs: 1000
steps:
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for joshuto to render
  - type: observe
    maxMs: 500
    label: Take semantic snapshot
  - type: assert_semantic
    target: app
    expected: joshuto
    maxMs: 500
    label: Verify app is joshuto
  - type: press_key
    value: j
    maxMs: 500
    label: Navigate down in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: press_key
    value: k
    maxMs: 500
    label: Navigate up in file list
  - type: wait
    timeoutMs: 200
    maxMs: 1500
    label: Brief pause
  - type: assert_cursor_moved
    maxMs: 500
    label: Verify cursor moved (at least 1 of 2 directions)
  - type: quit
    maxMs: 2000
    label: Quit joshuto
  - type: wait
    timeoutMs: 1000
    maxMs: 3000
    label: Wait for exit
