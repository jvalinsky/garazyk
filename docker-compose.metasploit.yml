version: '3.8'

services:
  pds-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2583:2583"
    environment:
      - PDS_PORT=2583
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:2583/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  msf-harness:
    image: metasploitframework/metasploit-framework:latest
    depends_on:
      pds-server:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - RHOSTS=pds-server
      - RPORT=2583
    entrypoint: [ "/bin/bash", "/app/scripts/run-metasploit-tests.sh" ]
