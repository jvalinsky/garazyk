# SigNoz OTel Collector configuration
# Receives OTLP traces/metrics/logs and exports to ClickHouse

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s
  # Resource detection is not available in SigNoz collector build
  # memory_limiter:
  #   check_interval: 5s
  #   limit_mib: 256

exporters:
  clickhouse:
    datasource: tcp://clickhouse:9000
    ttl: 168h # 7 days for e2e test data
    traces_table_name: signoz_traces
    metrics_table_name: signoz_metrics
    logs_table_name: signoz_logs

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
