# SigNoz OpenTelemetry backend overlay for the Garazyk e2e test stack.
#
# Usage:
#   docker compose \
#     -f docker-compose.topology.yml \
#     -f docker/otel/docker-compose.signoz.yml \
#     up -d
#
# This adds SigNoz (UI + OTel Collector + ClickHouse + Zookeeper) to the
# e2e stack. ATProto services can send traces to the OTel Collector at
# signoz-otel-collector:4318 (HTTP) or signoz-otel-collector:4317 (gRPC).
#
# The Deno test harness sends traces to localhost:4318 (same ports, host-side).
#
# Ports:
#   3301  — SigNoz UI (remapped from 8080 to avoid conflict)
#   4317  — OTLP gRPC receiver
#   4318  — OTLP HTTP receiver

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.5
    container_name: signoz-clickhouse
    volumes:
      - signoz_clickhouse_data:/var/lib/clickhouse
      - signoz_clickhouse_logs:/var/log/clickhouse-server
    environment:
      - CLICKHOUSE_DB=signoz
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/clickhouse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - topology_net

  signoz-zookeeper:
    image: bitnami/zookeeper:3.7
    container_name: signoz-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_ENABLE_PROMETHEUS_METRICS=no
    volumes:
      - signoz_zookeeper_data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - topology_net

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:v0.144.4
    container_name: signoz-otel-collector
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check && \
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=false
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - topology_net

  signoz:
    image: signoz/signoz:v0.123.0
    container_name: signoz
    ports:
      - "3301:8080"  # UI on 3301 to avoid 8080 conflict
    volumes:
      - signoz_sqlite_data:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=localdev-signoz-secret
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - topology_net

volumes:
  signoz_clickhouse_data:
  signoz_clickhouse_logs:
  signoz_zookeeper_data:
  signoz_sqlite_data:
