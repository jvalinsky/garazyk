# docker-compose.scenarios.yml
# Override for ATProto scenario testing — adds a second PDS for federation scenarios.
# Usage: docker compose -f docker-compose.yml -f docker-compose.scenarios.yml up -d

version: '3.8'

services:

  local-pds2:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/kaszlak"]
    command:
      - "serve"
      - "--config"
      - "/var/lib/atprotopds/config.json"
      - "--foreground"
    ports:
      - "2587:2585"
    volumes:
      - local_pds2_data:/var/lib/atprotopds
      - ./pds2-config.json:/var/lib/atprotopds/config.json:ro
      - local_pds2_keys:/var/lib/atprotopds/keys
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - HOME=/var/lib/atprotopds
      - PDS_DATA_DIR=/var/lib/atprotopds
      - PDS_PLC_KEYS_DIR=/var/lib/atprotopds/keys
      - PDS_MASTER_SECRET=7ba3e8f1c092da445b485263cb2bd3157859cb94294a2355e3c4a7b0f825aff
    depends_on:
      local-plc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2585/xrpc/com.atproto.server.describeServer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - local_net

volumes:
  local_pds2_data:
  local_pds2_keys:
