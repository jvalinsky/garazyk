version: '3.8'

services:

  local-plc:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/campagnola"]
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "2582"
      - "--database"
      - "/var/lib/atprotopds/plc.db"
    ports:
      - "2582:2582"
    volumes:
      - local_plc_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2582/_health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-pds:
    build:
      context: .
      dockerfile: Dockerfile.local
    command:
      - "serve"
      - "--config"
      - "/var/lib/atprotopds/config.json"
      - "--foreground"
    ports:
      - "2583:2583"
    volumes:
      - local_pds_data:/var/lib/atprotopds
      - ./pds-config.json:/var/lib/atprotopds/config.json:ro
      - local_pds_keys:/var/lib/atprotopds/keys
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - HOME=/var/lib/atprotopds
      - PDS_DATA_DIR=/var/lib/atprotopds
      - PDS_PLC_KEYS_DIR=/var/lib/atprotopds/keys
      - PDS_MASTER_SECRET=32107992c973da8445b485263cb2bd3157859cb94294a2355e3c4a7b0f825afe
      - GARAZYK_ALLOW_PRIVATE_OAUTH_CLIENTS=1
      - GARAZYK_OAUTH_HOST_MAP=127.0.0.1:8080=oauth-client:8080
      - PDS_RUNNING_TESTS=1
      - PDS_USE_KEYCHAIN=false
      - PDS_ADMIN_PASSWORD=admin-localdev
    depends_on:
      local-plc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2583/xrpc/com.atproto.server.describeServer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - local_net

  oauth-client:
    build:
      context: ./oauth-client
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      local_net:
        aliases:
          - oauth-client
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/client-metadata.json"]
      interval: 5s
      timeout: 3s
      retries: 5

  local-relay:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/zuk"]
    command:
      - "serve"
      - "--upstream"
      - "ws://local-pds:2583/xrpc/com.atproto.sync.subscribeRepos"
      - "--port"
      - "2584"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "2584:2584"
    volumes:
      - local_relay_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2584/api/relay/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-appview:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/syrena"]
    command:
      - "serve"
      - "--relay"
      - "ws://local-relay:2584"
      - "--port"
      - "3200"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "3200:3200"
    volumes:
      - local_appview_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - PDS_WRITE_PROXY_OVERRIDE=http://local-pds:2583
      - APPVIEW_ADMIN_SECRET=localdevadmin
      - APPVIEW_DATA_DIR=/var/lib/atprotopds
      - APPVIEW_PLC_URL=http://local-plc:2582
      - APPVIEW_PDS_URL=http://local-pds:2583
      - APPVIEW_HTTP_PORT=3200
    depends_on:
      local-relay:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "-H"
        - "Authorization: Bearer localdevadmin"
        - "http://localhost:3200/admin/backfill/status"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - local_net

  local-ui:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/garazyk-ui"]
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "2590"
    ports:
      - "2590:2590"
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - GARAZYK_UI_PORT=2590
      - GARAZYK_UI_ADMIN_PASSWORD=admin-localdev
      - GARAZYK_UI_PDS_URL=http://local-pds:2583
      - GARAZYK_UI_PDS_PASSWORD=admin-localdev
      - GARAZYK_UI_APPVIEW_URL=http://local-appview:3200
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2590/admin"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

networks:
  local_net:
    driver: bridge

volumes:
  local_plc_data:
  local_pds_data:
  local_pds_keys:
  local_relay_data:
  local_appview_data:
