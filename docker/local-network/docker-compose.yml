services:
  local-plc:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/campagnola"]
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "2582"
      - "--database"
      - "/var/lib/atprotopds/plc.db"
    ports:
      - "2582:2582"
    volumes:
      - local_plc_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PLC_HOURLY_LIMIT=500
      - PLC_DAILY_LIMIT=1000
      - PLC_WEEKLY_LIMIT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2582/_health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-pds:
    build:
      context: .
      dockerfile: Dockerfile.local
    command:
      - "serve"
      - "--config"
      - "/var/lib/atprotopds/config.json"
      - "--foreground"
    ports:
      - "2583:2583"
    volumes:
      - local_pds_data:/var/lib/atprotopds
      - ./pds-config.json:/var/lib/atprotopds/config.json:ro
      - local_pds_keys:/var/lib/atprotopds/keys
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - HOME=/var/lib/atprotopds
      - PDS_RATELIMIT_ENABLED=false
      - PDS_HANDLE_RESOLVE_LIMIT=10000
      - PDS_DATA_DIR=/var/lib/atprotopds
      - PDS_PLC_KEYS_DIR=/var/lib/atprotopds/keys
      - PDS_MASTER_SECRET=32107992c973da8445b485263cb2bd3157859cb94294a2355e3c4a7b0f825afe
      - GARAZYK_ALLOW_PRIVATE_OAUTH_CLIENTS=1
      - PDS_RUNNING_TESTS=1
      - PDS_USE_KEYCHAIN=false
      - PDS_ADMIN_PASSWORD=admin-localdev
      - PDS_PHONE_VERIFICATION_PROVIDER=twilio
      - TWILIO_ACCOUNT_SID=AC00000000000000000000000000000000
      - TWILIO_AUTH_TOKEN=SK00000000000000000000000000000000
      - TWILIO_VERIFY_SERVICE_SID=VA00000000000000000000000000000000
      - TWILIO_API_BASE_URL=http://local-mock-twilio:8081
    depends_on:
      local-plc:
        condition: service_healthy
      local-mock-twilio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2583/xrpc/com.atproto.server.describeServer"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - local_net

  local-mock-twilio:
    image: denoland/deno:alpine
    entrypoint:
      - "deno"
      - "run"
      - "-A"
      - "--config"
      - "/workspace/deno.json"
    command:
      - "/workspace/packages/hamownia/mock_twilio_server.ts"
      - "--port=8081"
    ports:
      - "8081:8081"
    volumes:
      - ../../:/workspace:ro
      - deno_cache:/deno-dir
    environment:
      - DENO_DIR=/deno-dir
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/__control/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 120s
    networks:
      - local_net

  local-relay:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/zuk"]
    command:
      - "serve"
      - "--upstream"
      - "ws://local-pds:2583/xrpc/com.atproto.sync.subscribeRepos"
      - "--port"
      - "2584"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "2584:2584"
    volumes:
      - local_relay_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2584/api/relay/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-appview:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/syrena"]
    command:
      - "serve"
      - "--relay"
      - "ws://local-relay:2584"
      - "--port"
      - "3200"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "3200:3200"
    volumes:
      - local_appview_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - PDS_WRITE_PROXY_OVERRIDE=http://local-pds:2583
      - APPVIEW_ADMIN_SECRET=localdevadmin
      - APPVIEW_DATA_DIR=/var/lib/atprotopds
      - APPVIEW_PLC_URL=http://local-plc:2582
      - APPVIEW_PDS_URL=http://local-pds:2583
      - APPVIEW_VIDEO_SERVICE_URL=http://localhost:2586
      - APPVIEW_HTTP_PORT=3200
    depends_on:
      local-relay:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "-H"
        - "Authorization: Bearer localdevadmin"
        - "http://localhost:3200/admin/backfill/status"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - local_net

  local-mikrus:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/mikrus"]
    command:
      - "serve"
      - "--relay"
      - "ws://local-relay:2584"
      - "--port"
      - "3210"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "3210:3210"
    volumes:
      - local_mikrus_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - PDS_ALLOW_PRIVATE_SSRF=1
      - PDS_ALLOW_HTTP=1
      - PDS_PLC_URL=http://local-plc:2582
      - MIKRUS_RELAY_URLS=ws://local-relay:2584
      - MIKRUS_DATA_DIR=/var/lib/atprotopds
      - MIKRUS_HTTP_PORT=3210
    depends_on:
      local-relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/_health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - local_net

  local-chat:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/syrena-chat"]
    command:
      - "serve"
      - "--port"
      - "2585"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "2585:2585"
    volumes:
      - local_chat_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - CHAT_PDS_URL=http://local-pds:2583
      - CHAT_PLC_URL=http://local-plc:2582
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2585/_health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-germ:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/germ"]
    command:
      - "serve"
      - "--port"
      - "8082"
      - "--data-dir"
      - "/var/lib/atprotopds"
    ports:
      - "8082:8082"
    volumes:
      - local_germ_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - GERM_PDS_URL=http://local-pds:2583
      - GERM_PLC_URL=http://local-plc:2582
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/_health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-video:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/jelcz"]
    command:
      - "serve"
      - "--port"
      - "2586"
    ports:
      - "2586:2586"
    volumes:
      - local_video_data:/var/lib/atprotopds
    environment:
      - TZ=UTC
      - JELCZ_PDS_URL=http://local-pds:2583
      - JELCZ_PLC_URL=http://local-plc:2582
      - JELCZ_DATA_DIR=/var/lib/atprotopds
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2586/_health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  local-ui:
    build:
      context: .
      dockerfile: Dockerfile.local
    entrypoint: ["/usr/local/bin/garazyk-ui"]
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "2590"
    ports:
      - "2590:2590"
    environment:
      - TZ=UTC
      - GARAZYK_UI_PORT=2590
      - GARAZYK_UI_ADMIN_PASSWORD=admin-localdev
      - GARAZYK_UI_PDS_URL=http://local-pds:2583
      - GARAZYK_UI_PDS_PASSWORD=admin-localdev
      - GARAZYK_UI_APPVIEW_URL=http://local-appview:3200
    depends_on:
      local-pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2590/admin"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - local_net

  skylab:
    build:
      context: ../../skylab
      dockerfile: Dockerfile
    ports:
      - "2591:2591"
    environment:
      - PORT=2591
      - PDS_HOST=local-pds
      - PDS_PORT=2583
      - APPVIEW_HOST=local-appview
      - APPVIEW_PORT=3200
      - RELAY_HOST=local-relay
      - RELAY_PORT=2584
      - CHAT_HOST=local-chat
      - CHAT_PORT=2585
      - VIDEO_HOST=local-video
      - VIDEO_PORT=2586
      - MIKRUS_HOST=local-mikrus
      - MIKRUS_PORT=3210
      - PLC_HOST=local-plc
      - PLC_PORT=2582
      - GERM_HOST=local-germ
      - GERM_PORT=8082
      - UI_HOST=local-ui
      - UI_PORT=2590
    depends_on:
      - local-pds
      - local-appview
      - local-mikrus
      - local-chat
      - local-germ
    networks:
      - local_net

networks:
  local_net:
    driver: bridge

volumes:
  local_plc_data:
  local_pds_data:
  local_pds_keys:
  local_relay_data:
  local_appview_data:
  local_mikrus_data:
  local_chat_data:
  local_germ_data:
  local_video_data:
  deno_cache:
