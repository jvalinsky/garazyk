services:
  docs:
    build:
      context: ../../docs
      dockerfile: ../docker/docs/Dockerfile
    container_name: september-docs
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - docs-network
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    labels:
      - "com.september.service=documentation"
      - "com.september.version=1.0"

networks:
  docs-network:
    driver: bridge
