version: '3.8'

services:
  docs:
    build:
      context: ../../docs
      dockerfile: ../docker/docs/Dockerfile
    container_name: september-docs
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - docs-network
    volumes:
      # Mount built docs (read-only)
      - ../../docs/.vitepress/dist:/var/www/docs:ro
    environment:
      - NGINX_HOST=pds.garazyk.xyz
      - NGINX_PORT=80
    labels:
      - "com.september.service=documentation"
      - "com.september.version=1.0"

networks:
  docs-network:
    driver: bridge
