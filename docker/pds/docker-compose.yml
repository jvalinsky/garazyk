services:
  pds:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.gnustep
    image: nspds:local
    container_name: nspds
    ports:
      - "3000:3000"
    volumes:
      - pds_data:/var/lib/atprotopds
      - ./config.json:/var/lib/atprotopds/config.json:ro
    environment:
      - PDS_PORT=3000
      - PDS_HOST=0.0.0.0
      - PDS_ISSUER=https://pds.garazyk.xyz
    command: ["serve", "--config", "/var/lib/atprotopds/config.json", "--port", "3000", "--foreground"]
    restart: unless-stopped

volumes:
  pds_data:
