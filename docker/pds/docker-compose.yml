services:
  pds:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.gnustep
    image: nspds:local
    container_name: nspds
    ports:
      - "2583:2583"
    volumes:
      - pds_data:/var/lib/atprotopds
      - ./config.json:/var/lib/atprotopds/config.json:ro
    environment:
      - TZ=UTC
      - PDS_PORT=2583
      - PDS_HOST=0.0.0.0
      - PDS_ISSUER=https://pds.garazyk.xyz
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - HOME=/var/lib/atprotopds
      - PDS_DATA_DIR=/var/lib/atprotopds
      - PDS_TRUST_PROXY_HEADERS=1
    command: ["serve", "--config", "/var/lib/atprotopds/config.json", "--foreground"]
    labels:
      - "com.garazyk.git_commit=8750efa944d6af8a9a72c3ec5fc1f66c8de0af6d"
    restart: unless-stopped

volumes:
  pds_data:
    name: local_pds_data
    external: true
