    <title>CappuccinoUI</title>

    <!-- Custom javascript goes here -->
    <!-- End custom javascript -->

    <script type="text/javascript">
        OBJJ_MAIN_FILE = "main.j";
        OBJJ_INCLUDE_PATHS = ["Frameworks"];
        // The below will tell the compiler to not generate debug symbols but will generate type signatures and inline objj_msgSend functions.
        // This will affect only Objective-J code that is compiled when loading the application. It will not affect precompiled
        // code like the Cappuccino frameworks.
        // Uncomment or comment on the line below to change the flags
        //
        // Macros for the precompiler can also be added. It is 100% compatible with the Macros and Conditionals preprocessor
        // directives defined in the GNU C 11.0 Preprocessor User Guide. (https://gcc.gnu.org/onlinedocs/gcc-11.2.0/cpp/)
        // Example: OBJJ_COMPILER_FLAGS = [..., "-DMyMax(x,y)=((x)>(y))?(x):(y)]", "-DMYMACRO", "-DMYMACRO2=42"];
        OBJJ_COMPILER_FLAGS = [/*"IncludeDebugSymbols",*/ "IncludeTypeSignatures"/*, "SourceMap"*/, "InlineMsgSend"];

        var progressBar = null;

        OBJJ_PROGRESS_CALLBACK = function (percent, appSize, path) {
            percent = percent * 100;

            if (!progressBar)
                progressBar = document.getElementById("progress-bar");

            if (progressBar)
                progressBar.style.width = Math.min(percent, 100) + "%";
        }

        var loadingHTML =
            '<div id="loading">' +
            '    <div style="flex-grow: 35"></div>' +
            '    <div id="loading-text">Loading...</div>' +
            '    <div id="progress-indicator">' +
            '        <span id="progress-bar" style="width:0%"></span>' +
            '    </div>' +
            '    <div style="flex-grow: 65"></div>' +
            '</div>';
    </script>

    <script type="text/javascript" src="Frameworks/Objective-J/Objective-J.js" charset="UTF-8"></script>

    <style type="text/css">
        html,
        body,
        h1,
        p {
            margin: 0;
            padding: 0;
        }

        /* We need a body wrapper because Cappuccino is unhappy if we change the body element */
        #cappuccino-body {
            /* Position it absolutely so it will fill the height without content */
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;

            /* Put it at the bottom of the stack so it doesn't interfere with UI */
            z-index: 0;
        }

        #cappuccino-body .container {
            display: table;
            margin: 0 auto;
            height: 100%;
        }

        #cappuccino-body .content {
            display: table-cell;
            height: 100%;
            vertical-align: top;
        }

        #loading {
            height: 100%;
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            justify-content: space-evenly;
        }

        #loading-text {
            height: 1.5em;
            color: #555;
            font: normal bold 36px/36px Arial, sans-serif;
        }

        #progress-indicator {
            padding: 0px;
            height: 16px;
            border: 5px solid #555;
            border-radius: 18px;
            background-color: white;
        }

        #progress-bar {
            position: relative;
            top: -1px;
            left: -1px;
            display: block;
            height: 18px;

            /* Compensate for moving the bar left 1px to overlap the indicator border */
            border-right: 1px solid #555;
            background-color: #555;
        }

        #noscript {
            position: relative;
            top: 35%;
            padding: 1em 1.5em;
            border: 5px solid #555;
            border-radius: 16px;
            background-color: white;
            color: #555;
            text-align: center;
            font: bold 24px Arial, sans-serif;
        }

        #noscript a {
            color: #98c0ff;
            text-decoration: none;
        }

        /* ===========================================
           UX Components: Spinner, Focus, Skip Link
           =========================================== */

        /* In-place loading spinner - CSS animation */
        @keyframes cappuccino-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .cappuccino-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #555;
            border-radius: 50%;
            animation: cappuccino-spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 6px;
        }

        .cappuccino-spinner-large {
            width: 24px;
            height: 24px;
            border-width: 3px;
        }

        /* Focus ring for WCAG accessibility */
        :focus {
            outline: 2px solid #3B82F6;
            outline-offset: 2px;
        }

        .cpbutton:focus,
        .cptextfield:focus,
        .cptextview:focus,
        .cptableview:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
            outline: none; /* Use box-shadow instead */
        }

        /* Skip link for WCAG accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #3B82F6;
            color: white;
            padding: 8px 16px;
            z-index: 10000;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            border-radius: 0 0 4px 0;
            transition: top 0.15s ease;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Error/success/warning color classes for WCAG AA contrast */
        .status-error {
            color: #B91C1C !important; /* Red - 4.5:1 contrast on white */
        }

        .status-success {
            color: #047857 !important; /* Green - 4.5:1 contrast on white */
        }

        .status-warning {
            color: #B45309 !important; /* Orange - 4.5:1 contrast on white */
        }

        .status-info {
            color: #4B5563 !important; /* Gray - 7:1 contrast on white */
        }

        /* Empty state placeholder */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #6B7280;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .empty-state-icon {
            font-family: "Material Icons";
            font-size: 48px;
            color: #9CA3AF;
            margin-bottom: 12px;
        }

        .empty-state-message {
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Skip link for WCAG accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="cappuccino-body">
        <div class="container">
            <div class="content" id="loadingDiv">
                <script type="text/javascript">
                    document.getElementById("loadingDiv").innerHTML = loadingHTML;
                </script>
            </div>
        </div>
        <noscript style="position:absolute; top:0; left:0; width:100%; height:100%">
            <div class="container">
                <div class="content">
                    <div id="noscript">
                        <p style="font-size:120%; margin-bottom:.75em">JavaScript is required for this application.</p>
                        <p><a href="http://www.enable-javascript.com" target="_blank">Enable JavaScript</a></p>
                    </div>
                </div>
            </div>
        </noscript>
    </div>
</body>

</html>
