<svg xmlns="http://www.w3.org/2000/svg" width="18" height="22" viewBox="0 0 18 22">
<!-- 8-bit bober (beaver) pixel art -->
<!-- Row 1: ears -->
<rect x="3" y="0" width="2" height="2" fill="black"/>
<rect x="13" y="0" width="2" height="2" fill="black"/>
<!-- Row 2: head top -->
<rect x="3" y="2" width="2" height="2" fill="black"/>
<rect x="5" y="2" width="8" height="2" fill="black"/>
<rect x="13" y="2" width="2" height="2" fill="black"/>
<!-- Row 3: eyes -->
<rect x="3" y="4" width="2" height="2" fill="black"/>
<rect x="13" y="4" width="2" height="2" fill="black"/>
<rect x="6" y="4" width="2" height="2" fill="black"/>
<rect x="10" y="4" width="2" height="2" fill="black"/>
<!-- Row 4: nose/mouth -->
<rect x="3" y="6" width="2" height="2" fill="black"/>
<rect x="13" y="6" width="2" height="2" fill="black"/>
<rect x="7" y="6" width="4" height="2" fill="black"/>
<!-- Row 5: teeth -->
<rect x="3" y="8" width="12" height="2" fill="black"/>
<rect x="7" y="10" width="2" height="2" fill="black"/>
<rect x="9" y="10" width="2" height="2" fill="black"/>
<!-- Row 6-7: body -->
<rect x="1" y="10" width="2" height="2" fill="black"/>
<rect x="15" y="10" width="2" height="2" fill="black"/>
<rect x="1" y="12" width="16" height="2" fill="black"/>
<rect x="1" y="14" width="16" height="2" fill="black"/>
<!-- Row 8: legs -->
<rect x="1" y="16" width="4" height="2" fill="black"/>
<rect x="13" y="16" width="4" height="2" fill="black"/>
<!-- Row 9-10: tail -->
<rect x="6" y="18" width="6" height="2" fill="black"/>
<rect x="7" y="20" width="4" height="2" fill="black"/>
</svg>
