<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .primary { fill: #c8e6c9; }
      .fallback { fill: #fff9c4; }
      .failed { fill: #ffcdd2; }
      .success { fill: #a5d6a7; }
      .text { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
      .title { font-size: 16px; font-weight: bold; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-fail { stroke: #d32f2f; stroke-width: 2; fill: none; marker-end: url(#arrowhead-fail); stroke-dasharray: 5,5; }
      .arrow-success { stroke: #388e3c; stroke-width: 2; fill: none; marker-end: url(#arrowhead-success); }
      .label { font-size: 11px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-fail" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d32f2f" />
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#388e3c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="text title">PLC Failover Mechanism</text>

  <!-- Client -->
  <rect x="50" y="80" width="180" height="80" class="box primary" rx="5"/>
  <text x="140" y="105" text-anchor="middle" class="text title">PDS Client</text>
  <text x="140" y="125" text-anchor="middle" class="text">DIDPLCResolver</text>
  <text x="140" y="145" text-anchor="middle" class="label">resolveDID(did:plc:abc...)</text>

  <!-- Strategy 1: Retry with Exponential Backoff -->
  <g id="retry-strategy">
    <text x="50" y="200" class="text title">Strategy 1: Retry with Exponential Backoff</text>
    
    <!-- Primary Server -->
    <rect x="300" y="220" width="150" height="80" class="box primary" rx="5"/>
    <text x="375" y="245" text-anchor="middle" class="text title">Primary PLC</text>
    <text x="375" y="265" text-anchor="middle" class="text">plc.directory</text>
    <text x="375" y="285" text-anchor="middle" class="label">Status: Available</text>

    <!-- Attempt 1 -->
    <path d="M 230 120 L 300 240" class="arrow"/>
    <text x="260" y="180" class="label">Attempt 1 (0ms)</text>

    <!-- Attempt 2 -->
    <path d="M 230 130 L 300 250" class="arrow-fail"/>
    <text x="240" y="200" class="label">Attempt 2 (500ms)</text>
    <text x="240" y="215" class="label" fill="#d32f2f">503 Service Unavailable</text>

    <!-- Attempt 3 -->
    <path d="M 230 140 L 300 260" class="arrow-fail"/>
    <text x="220" y="220" class="label">Attempt 3 (1500ms)</text>
    <text x="220" y="235" class="label" fill="#d32f2f">Timeout</text>

    <!-- Attempt 4 -->
    <path d="M 230 150 L 300 270" class="arrow-success"/>
    <text x="200" y="240" class="label">Attempt 4 (3500ms)</text>
    <text x="200" y="255" class="label" fill="#388e3c">200 OK</text>

    <!-- Success -->
    <rect x="500" y="235" width="150" height="50" class="box success" rx="5"/>
    <text x="575" y="255" text-anchor="middle" class="text">Success</text>
    <text x="575" y="275" text-anchor="middle" class="label">DID Document Returned</text>
    <path d="M 450 260 L 500 260" class="arrow-success"/>
  </g>

  <!-- Strategy 2: Primary/Fallback Pattern -->
  <g id="fallback-strategy">
    <text x="50" y="360" class="text title">Strategy 2: Primary/Fallback Pattern</text>
    
    <!-- Primary Server (Failed) -->
    <rect x="300" y="380" width="150" height="80" class="box failed" rx="5"/>
    <text x="375" y="405" text-anchor="middle" class="text title">Primary PLC</text>
    <text x="375" y="425" text-anchor="middle" class="text">plc.directory</text>
    <text x="375" y="445" text-anchor="middle" class="label" fill="#d32f2f">Status: Down</text>

    <!-- Fallback Server -->
    <rect x="500" y="380" width="150" height="80" class="box fallback" rx="5"/>
    <text x="575" y="405" text-anchor="middle" class="text title">Fallback PLC</text>
    <text x="575" y="425" text-anchor="middle" class="text">plc-backup.example</text>
    <text x="575" y="445" text-anchor="middle" class="label">Status: Available</text>

    <!-- Try Primary -->
    <path d="M 230 120 L 300 400" class="arrow-fail"/>
    <text x="260" y="340" class="label">Try Primary</text>
    <text x="260" y="355" class="label" fill="#d32f2f">Failed after 3 retries</text>

    <!-- Fallback -->
    <path d="M 450 420 L 500 420" class="arrow"/>
    <text x="475" y="410" class="label">Fallback</text>

    <!-- Success -->
    <rect x="700" y="395" width="150" height="50" class="box success" rx="5"/>
    <text x="775" y="415" text-anchor="middle" class="text">Success</text>
    <text x="775" y="435" text-anchor="middle" class="label">DID Document Returned</text>
    <path d="M 650 420 L 700 420" class="arrow-success"/>
  </g>

  <!-- Strategy 3: Load Balancer with Health Checks -->
  <g id="loadbalancer-strategy">
    <text x="50" y="520" class="text title">Strategy 3: Load Balancer with Health Checks</text>
    
    <!-- Load Balancer -->
    <rect x="300" y="540" width="150" height="60" class="box primary" rx="5"/>
    <text x="375" y="560" text-anchor="middle" class="text title">Load Balancer</text>
    <text x="375" y="580" text-anchor="middle" class="text">HAProxy / nginx</text>

    <!-- Request -->
    <path d="M 230 120 L 300 560" class="arrow"/>
    <text x="260" y="500" class="label">Request</text>

    <!-- Server 1 (Failed) -->
    <rect x="500" y="540" width="120" height="50" class="box failed" rx="5"/>
    <text x="560" y="560" text-anchor="middle" class="text">PLC #1</text>
    <text x="560" y="580" text-anchor="middle" class="label" fill="#d32f2f">Health: Fail</text>
    <path d="M 450 560 L 500 560" class="arrow-fail"/>
    <text x="475" y="550" class="label" fill="#d32f2f">Skip</text>

    <!-- Server 2 (Active) -->
    <rect x="500" y="600" width="120" height="50" class="box success" rx="5"/>
    <text x="560" y="620" text-anchor="middle" class="text">PLC #2</text>
    <text x="560" y="640" text-anchor="middle" class="label" fill="#388e3c">Health: OK</text>
    <path d="M 450 580 L 500 620" class="arrow-success"/>
    <text x="475" y="600" class="label" fill="#388e3c">Route</text>

    <!-- Server 3 (Standby) -->
    <rect x="500" y="660" width="120" height="50" class="box fallback" rx="5"/>
    <text x="560" y="680" text-anchor="middle" class="text">PLC #3</text>
    <text x="560" y="700" text-anchor="middle" class="label">Health: OK</text>

    <!-- Success -->
    <rect x="670" y="600" width="150" height="50" class="box success" rx="5"/>
    <text x="745" y="620" text-anchor="middle" class="text">Success</text>
    <text x="745" y="640" text-anchor="middle" class="label">DID Document Returned</text>
    <path d="M 620 625 L 670 625" class="arrow-success"/>
  </g>

  <!-- Legend -->
  <rect x="50" y="600" width="200" height="110" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="150" y="620" text-anchor="middle" class="text" font-weight="bold">Legend</text>
  
  <rect x="60" y="630" width="50" height="15" class="box primary" rx="2"/>
  <text x="115" y="642" class="label">Primary/Active</text>
  
  <rect x="60" y="650" width="50" height="15" class="box fallback" rx="2"/>
  <text x="115" y="662" class="label">Fallback/Standby</text>
  
  <rect x="60" y="670" width="50" height="15" class="box failed" rx="2"/>
  <text x="115" y="682" class="label">Failed/Down</text>
  
  <rect x="60" y="690" width="50" height="15" class="box success" rx="2"/>
  <text x="115" y="702" class="label">Success</text>
</svg>
