<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-box { fill: #f0f4f8; stroke: #2c3e50; stroke-width: 2; }
      .table-title { fill: #2c3e50; font-weight: bold; font-size: 14px; }
      .table-field { fill: #34495e; font-size: 12px; }
      .pk { fill: #e74c3c; font-weight: bold; }
      .fk { fill: #3498db; }
      .index { fill: #27ae60; }
      .relationship { stroke: #7f8c8d; stroke-width: 2; fill: none; }
      .label { fill: #2c3e50; font-size: 11px; }
      .section-title { fill: #2c3e50; font-weight: bold; font-size: 16px; }
      .note { fill: #7f8c8d; font-size: 11px; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="section-title">PDS SQLite Database Schema</text>

  <!-- SERVICE DATABASE (Left side) -->
  <text x="150" y="70" class="section-title">Service Database (Shared)</text>

  <!-- accounts table -->
  <rect x="20" y="100" width="260" height="180" class="table-box"/>
  <text x="150" y="120" text-anchor="middle" class="table-title">accounts</text>
  <line x1="20" y1="130" x2="280" y2="130" stroke="#2c3e50" stroke-width="1"/>
  <text x="30" y="150" class="pk">id (PK)</text>
  <text x="30" y="170" class="pk">did (UNIQUE)</text>
  <text x="30" y="190" class="table-field">handle</text>
  <text x="30" y="210" class="table-field">email</text>
  <text x="30" y="230" class="table-field">created_at</text>
  <text x="30" y="250" class="table-field">updated_at</text>
  <text x="30" y="270" class="table-field">status</text>

  <!-- did_cache table -->
  <rect x="20" y="310" width="260" height="140" class="table-box"/>
  <text x="150" y="330" text-anchor="middle" class="table-title">did_cache</text>
  <line x1="20" y1="340" x2="280" y2="340" stroke="#2c3e50" stroke-width="1"/>
  <text x="30" y="360" class="pk">did (PK)</text>
  <text x="30" y="380" class="table-field">handle</text>
  <text x="30" y="400" class="table-field">public_key</text>
  <text x="30" y="420" class="table-field">cached_at</text>
  <text x="30" y="440" class="table-field">expires_at</text>

  <!-- sequencer table -->
  <rect x="20" y="480" width="260" height="120" class="table-box"/>
  <text x="150" y="500" text-anchor="middle" class="table-title">sequencer</text>
  <line x1="20" y1="510" x2="280" y2="510" stroke="#2c3e50" stroke-width="1"/>
  <text x="30" y="530" class="pk">seq (PK)</text>
  <text x="30" y="550" class="fk">did (FK)</text>
  <text x="30" y="570" class="table-field">event_type</text>
  <text x="30" y="590" class="table-field">timestamp</text>

  <!-- ACTOR DATABASE (Right side) -->
  <text x="750" y="70" class="section-title">Actor Database (Per-User)</text>

  <!-- records table -->
  <rect x="620" y="100" width="280" height="200" class="table-box"/>
  <text x="760" y="120" text-anchor="middle" class="table-title">records</text>
  <line x1="620" y1="130" x2="900" y2="130" stroke="#2c3e50" stroke-width="1"/>
  <text x="630" y="150" class="pk">uri (PK)</text>
  <text x="630" y="170" class="table-field">collection</text>
  <text x="630" y="190" class="table-field">rkey</text>
  <text x="630" y="210" class="table-field">value (CBOR)</text>
  <text x="630" y="230" class="table-field">cid</text>
  <text x="630" y="250" class="index">mst_node_cid</text>
  <text x="630" y="270" class="table-field">created_at</text>
  <text x="630" y="290" class="table-field">updated_at</text>

  <!-- mst_nodes table -->
  <rect x="620" y="330" width="280" height="160" class="table-box"/>
  <text x="760" y="350" text-anchor="middle" class="table-title">mst_nodes</text>
  <line x1="620" y1="360" x2="900" y2="360" stroke="#2c3e50" stroke-width="1"/>
  <text x="630" y="380" class="pk">cid (PK)</text>
  <text x="630" y="400" class="table-field">left_cid</text>
  <text x="630" y="420" class="table-field">right_cid</text>
  <text x="630" y="440" class="table-field">entries (JSON)</text>
  <text x="630" y="460" class="table-field">height</text>
  <text x="630" y="480" class="table-field">created_at</text>

  <!-- blobs table -->
  <rect x="620" y="530" width="280" height="160" class="table-box"/>
  <text x="760" y="550" text-anchor="middle" class="table-title">blobs</text>
  <line x1="620" y1="560" x2="900" y2="560" stroke="#2c3e50" stroke-width="1"/>
  <text x="630" y="580" class="pk">cid (PK)</text>
  <text x="630" y="600" class="table-field">mime_type</text>
  <text x="630" y="620" class="table-field">size</text>
  <text x="630" y="640" class="table-field">path</text>
  <text x="630" y="660" class="table-field">created_at</text>
  <text x="630" y="680" class="table-field">deleted_at</text>

  <!-- commits table -->
  <rect x="620" y="730" width="280" height="140" class="table-box"/>
  <text x="760" y="750" text-anchor="middle" class="table-title">commits</text>
  <line x1="620" y1="760" x2="900" y2="760" stroke="#2c3e50" stroke-width="1"/>
  <text x="630" y="780" class="pk">cid (PK)</text>
  <text x="630" y="800" class="table-field">rev</text>
  <text x="630" y="820" class="table-field">root_cid</text>
  <text x="630" y="840" class="table-field">timestamp</text>

  <!-- Relationships -->
  <path d="M 280 150 L 620 150" class="relationship" marker-end="url(#arrowhead)"/>
  <text x="450" y="140" class="label">did</text>

  <path d="M 280 320 L 620 400" class="relationship" marker-end="url(#arrowhead)"/>
  <text x="450" y="360" class="label">references</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="20" y="850" class="section-title">Legend</text>
  <text x="20" y="875" class="pk">PK = Primary Key</text>
  <text x="150" y="875" class="fk">FK = Foreign Key</text>
  <text x="300" y="875" class="index">Index</text>
</svg>
