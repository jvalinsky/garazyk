<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="1100" viewBox="0 0 1000 1100">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .code { font-family: monospace; font-size: 10px; fill: #000; }
      .flow-box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .key-box { fill: #ffe8e8; stroke: #cc0000; stroke-width: 2; }
      .verify-box { fill: #e8ffe8; stroke: #00cc00; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; font-weight: bold; }
      .text-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
      .section-header { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Cryptography Flow in AT Protocol</text>

  <!-- JWT Token Flow Section -->
  <rect x="30" y="50" width="940" height="30" fill="#0066cc" rx="3"/>
  <text x="50" y="70" class="section-header">JWT Token Generation & Verification</text>

  <!-- JWT Generation -->
  <text x="50" y="110" class="subtitle">1. JWT Generation (Minting):</text>

  <rect x="50" y="130" width="420" height="180" class="flow-box" rx="5"/>
  <text x="70" y="155" class="label" font-weight="bold">Step 1: Create Header</text>
  <text x="90" y="175" class="code">{</text>
  <text x="110" y="190" class="code">"alg": "ES256",</text>
  <text x="110" y="205" class="code">"typ": "JWT"</text>
  <text x="90" y="220" class="code">}</text>

  <text x="70" y="245" class="label" font-weight="bold">Step 2: Create Payload</text>
  <text x="90" y="265" class="code">{</text>
  <text x="110" y="280" class="code">"iss": "did:web:pds.example.com",</text>
  <text x="110" y="295" class="code">"sub": "did:plc:user123",</text>
  <text x="110" y="310" class="code">"exp": 1234567890</text>
  <text x="90" y="325" class="code">}</text>

  <!-- Arrow -->
  <path d="M 530 220 L 570 220" class="arrow"/>
  <text x="550" y="210" text-anchor="middle" class="arrow-label">Sign</text>

  <!-- JWT Signing -->
  <rect x="570" y="130" width="400" height="180" class="key-box" rx="5"/>
  <text x="590" y="155" class="label" font-weight="bold">Step 3: Sign with Private Key</text>
  <text x="610" y="175" class="small-label">Algorithm: ECDSA P-256</text>
  <text x="610" y="195" class="small-label">Key Size: 256 bits (32 bytes)</text>

  <text x="590" y="225" class="label" font-weight="bold">Step 4: Combine Parts</text>
  <text x="610" y="245" class="code">header.payload.signature</text>
  <text x="610" y="265" class="code">eyJhbGc...eyJpc3M...signature</text>

  <text x="590" y="295" class="small-label">Result: JWT Token ready for use</text>

  <!-- JWT Verification -->
  <text x="50" y="340" class="subtitle">2. JWT Verification:</text>

  <rect x="50" y="360" width="420" height="160" class="verify-box" rx="5"/>
  <text x="70" y="385" class="label" font-weight="bold">Step 1: Parse Token</text>
  <text x="90" y="405" class="small-label">Split by "." into 3 parts</text>

  <text x="70" y="435" class="label" font-weight="bold">Step 2: Verify Signature</text>
  <text x="90" y="455" class="small-label">Use issuer's public key</text>
  <text x="90" y="475" class="small-label">Verify ECDSA signature</text>

  <text x="70" y="505" class="label" font-weight="bold">Step 3: Check Expiration</text>
  <text x="90" y="525" class="small-label">Ensure exp > current time</text>

  <!-- Arrow -->
  <path d="M 530 440 L 570 440" class="arrow"/>
  <text x="550" y="430" text-anchor="middle" class="arrow-label">Verify</text>

  <!-- Verification Result -->
  <rect x="570" y="360" width="400" height="160" class="verify-box" rx="5"/>
  <text x="590" y="385" class="label" font-weight="bold">Verification Result:</text>

  <text x="610" y="410" class="small-label">✓ Signature valid</text>
  <text x="610" y="430" class="small-label">✓ Token not expired</text>
  <text x="610" y="450" class="small-label">✓ Claims verified</text>

  <text x="590" y="490" class="label" font-weight="bold">Return Payload:</text>
  <text x="610" y="510" class="code">{"iss": "...", "sub": "...", ...}</text>

  <!-- DPoP Flow Section -->
  <rect x="30" y="560" width="940" height="30" fill="#ff9900" rx="3"/>
  <text x="50" y="580" class="section-header">DPoP (Demonstration of Proof-of-Possession)</text>

  <!-- DPoP Proof Generation -->
  <text x="50" y="620" class="subtitle">3. DPoP Proof Generation:</text>

  <rect x="50" y="640" width="420" height="160" class="flow-box" rx="5"/>
  <text x="70" y="665" class="label" font-weight="bold">Create DPoP JWT:</text>
  <text x="90" y="685" class="code">{</text>
  <text x="110" y="700" class="code">"htm": "POST",</text>
  <text x="110" y="715" class="code">"htu": "https://pds.../endpoint",</text>
  <text x="110" y="730" class="code">"iat": 1234567890,</text>
  <text x="110" y="745" class="code">"jti": "unique-id"</text>
  <text x="90" y="760" class="code">}</text>

  <text x="70" y="785" class="small-label">Sign with client's private key</text>

  <!-- Arrow -->
  <path d="M 530 720 L 570 720" class="arrow"/>
  <text x="550" y="710" text-anchor="middle" class="arrow-label">Bind</text>

  <!-- DPoP Verification -->
  <rect x="570" y="640" width="400" height="160" class="verify-box" rx="5"/>
  <text x="590" y="665" class="label" font-weight="bold">DPoP Verification:</text>

  <text x="610" y="685" class="small-label">1. Verify DPoP JWT signature</text>
  <text x="610" y="705" class="small-label">2. Check HTTP method matches</text>
  <text x="610" y="725" class="small-label">3. Check URI matches</text>
  <text x="610" y="745" class="small-label">4. Verify timestamp (< 60s old)</text>
  <text x="610" y="765" class="small-label">5. Check JTI not used before</text>

  <text x="590" y="795" class="small-label">Result: Token bound to client</text>

  <!-- Commit Signing Section -->
  <rect x="30" y="840" width="940" height="30" fill="#6600cc" rx="3"/>
  <text x="50" y="860" class="section-header">Commit Signing & Verification</text>

  <!-- Commit Signing -->
  <text x="50" y="900" class="subtitle">4. Commit Signing:</text>

  <rect x="50" y="920" width="420" height="140" class="flow-box" rx="5"/>
  <text x="70" y="945" class="label" font-weight="bold">Encode Commit:</text>
  <text x="90" y="965" class="small-label">Serialize to DAG-CBOR</text>

  <text x="70" y="995" class="label" font-weight="bold">Sign with User Key:</text>
  <text x="90" y="1015" class="small-label">ECDSA P-256 signature</text>

  <text x="70" y="1045" class="small-label">Result: Signed commit proof</text>

  <!-- Arrow -->
  <path d="M 530 980 L 570 980" class="arrow"/>
  <text x="550" y="970" text-anchor="middle" class="arrow-label">Verify</text>

  <!-- Commit Verification -->
  <rect x="570" y="920" width="400" height="140" class="verify-box" rx="5"/>
  <text x="590" y="945" class="label" font-weight="bold">Verify Commit:</text>
  <text x="610" y="965" class="small-label">Decode DAG-CBOR</text>
  <text x="610" y="985" class="small-label">Verify signature with public key</text>
  <text x="610" y="1005" class="small-label">Ensure commit not tampered</text>

  <text x="590" y="1045" class="small-label">Result: Commit authenticity proven</text>

  <!-- Key Algorithms Summary -->
  <text x="50" y="1090" class="subtitle">Cryptographic Algorithms Used:</text>

  <g transform="translate(50, 1100)">
    <text x="0" y="0" class="small-label">• ECDSA P-256: Digital signatures for commits and tokens</text>
    <text x="0" y="20" class="small-label">• SHA-256: Hashing for CIDs and password verification</text>
    <text x="0" y="40" class="small-label">• HMAC-SHA256: Message authentication codes</text>
    <text x="0" y="60" class="small-label">• PBKDF2: Password hashing with salt and iterations</text>
  </g>
</svg>
