<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .decision { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title">Database Migration Workflow</text>

  <!-- Check current version -->
  <rect x="300" y="60" width="300" height="60" class="box" rx="5"/>
  <text x="450" y="85" class="text">Check Current Schema Version</text>
  <text x="450" y="105" class="label">SELECT MAX(version) FROM schema_version</text>

  <path d="M 450 120 L 450 150" class="arrow"/>

  <!-- Determine target version -->
  <rect x="300" y="150" width="300" height="60" class="box" rx="5"/>
  <text x="450" y="175" class="text">Determine Target Version</text>
  <text x="450" y="195" class="label">Latest available migration</text>

  <path d="M 450 210 L 450 240" class="arrow"/>

  <!-- Pre-migration checks -->
  <rect x="300" y="240" width="300" height="80" class="process" rx="5"/>
  <text x="450" y="265" class="text">Pre-Migration Safety Checks</text>
  <text x="450" y="285" class="label">• Verify backup exists</text>
  <text x="450" y="305" class="label">• Check disk space</text>

  <path d="M 450 320 L 450 350" class="arrow"/>

  <!-- Decision: checks passed? -->
  <polygon points="450,350 550,390 450,430 350,390" class="decision"/>
  <text x="450" y="395" class="text">Checks Pass?</text>

  <path d="M 550 390 L 650 390 L 650 1050 L 450 1050 L 450 1020" class="arrow"/>
  <text x="600" y="385" class="label">No</text>

  <path d="M 450 430 L 450 460" class="arrow"/>
  <text x="420" y="450" class="label">Yes</text>

  <!-- For each migration loop -->
  <rect x="250" y="460" width="400" height="60" class="box" rx="5"/>
  <text x="450" y="485" class="text">For Each Migration (current + 1 to target)</text>
  <text x="450" y="505" class="label">Iterate through migration versions</text>

  <path d="M 450 520 L 450 550" class="arrow"/>

  <!-- Begin transaction -->
  <rect x="300" y="550" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="575" class="text">Begin Transaction</text>
  <text x="450" y="595" class="label">BEGIN TRANSACTION</text>

  <path d="M 450 610 L 450 640" class="arrow"/>

  <!-- Execute migration SQL -->
  <rect x="300" y="640" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="665" class="text">Execute Migration SQL</text>
  <text x="450" y="685" class="label">Run schema changes</text>

  <path d="M 450 700 L 450 730" class="arrow"/>

  <!-- Decision: success? -->
  <polygon points="450,730 550,770 450,810 350,770" class="decision"/>
  <text x="450" y="775" class="text">Success?</text>

  <path d="M 350 770 L 200 770 L 200 880 L 300 880" class="arrow"/>
  <text x="250" y="765" class="label">No</text>

  <path d="M 450 810 L 450 840" class="arrow"/>
  <text x="420" y="830" class="label">Yes</text>

  <!-- Update schema_version -->
  <rect x="300" y="840" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="865" class="text">Update schema_version Table</text>
  <text x="450" y="885" class="label">INSERT INTO schema_version VALUES (...)</text>

  <path d="M 450 900 L 450 930" class="arrow"/>

  <!-- Commit transaction -->
  <rect x="300" y="930" width="300" height="60" class="success" rx="5"/>
  <text x="450" y="955" class="text">Commit Transaction</text>
  <text x="450" y="975" class="label">COMMIT</text>

  <path d="M 450 990 L 450 1020" class="arrow"/>

  <!-- Rollback transaction -->
  <rect x="300" y="880" width="300" height="60" class="error" rx="5"/>
  <text x="450" y="905" class="text">Rollback Transaction</text>
  <text x="450" y="925" class="label">ROLLBACK</text>

  <path d="M 450 940 L 450 1050 L 450 1020" class="arrow"/>

  <!-- Final result -->
  <rect x="300" y="1020" width="300" height="60" class="box" rx="5"/>
  <text x="450" y="1045" class="text">Report Success/Failure</text>
  <text x="450" y="1065" class="label">Return migration result</text>

</svg>
