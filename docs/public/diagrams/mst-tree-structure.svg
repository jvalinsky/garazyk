<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="900" viewBox="0 0 1000 900">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .root-node { fill: #ff6b6b; stroke: #c92a2a; stroke-width: 2; }
      .internal-node { fill: #4ecdc4; stroke: #0a8a7b; stroke-width: 2; }
      .leaf-node { fill: #95e1d3; stroke: #38a169; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,5; }
      .text-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Merkle Search Tree (MST) Structure</text>

  <!-- Tree Diagram Section -->
  <text x="50" y="70" class="subtitle">Binary Tree Organization:</text>

  <!-- Root Node -->
  <circle cx="500" cy="120" r="35" class="root-node"/>
  <text x="500" y="125" text-anchor="middle" class="label" font-weight="bold">Root</text>
  <text x="500" y="140" text-anchor="middle" class="small-label">CID: abc123...</text>

  <!-- Level 1 - Internal Nodes -->
  <circle cx="300" cy="220" r="30" class="internal-node"/>
  <text x="300" y="223" text-anchor="middle" class="label">Node A</text>
  <text x="300" y="238" text-anchor="middle" class="small-label">CID: def456...</text>

  <circle cx="700" cy="220" r="30" class="internal-node"/>
  <text x="700" y="223" text-anchor="middle" class="label">Node B</text>
  <text x="700" y="238" text-anchor="middle" class="small-label">CID: ghi789...</text>

  <!-- Arrows from Root to Level 1 -->
  <path d="M 475 150 L 325 195" class="arrow"/>
  <path d="M 525 150 L 675 195" class="arrow"/>

  <!-- Level 2 - Leaf Nodes -->
  <circle cx="150" cy="320" r="28" class="leaf-node"/>
  <text x="150" y="318" text-anchor="middle" class="label" font-size="11">Leaf 1</text>
  <text x="150" y="333" text-anchor="middle" class="small-label">rec1</text>

  <circle cx="300" cy="320" r="28" class="leaf-node"/>
  <text x="300" y="318" text-anchor="middle" class="label" font-size="11">Leaf 2</text>
  <text x="300" y="333" text-anchor="middle" class="small-label">rec2</text>

  <circle cx="550" cy="320" r="28" class="leaf-node"/>
  <text x="550" y="318" text-anchor="middle" class="label" font-size="11">Leaf 3</text>
  <text x="550" y="333" text-anchor="middle" class="small-label">rec3</text>

  <circle cx="700" cy="320" r="28" class="leaf-node"/>
  <text x="700" y="318" text-anchor="middle" class="label" font-size="11">Leaf 4</text>
  <text x="700" y="333" text-anchor="middle" class="small-label">rec4</text>

  <!-- Arrows from Level 1 to Leaves -->
  <path d="M 280 248 L 165 295" class="arrow"/>
  <path d="M 310 248 L 295 295" class="arrow"/>
  <path d="M 690 248 L 565 295" class="arrow"/>
  <path d="M 710 248 L 715 295" class="arrow"/>

  <!-- Node Structure Section -->
  <text x="50" y="420" class="subtitle">Node Structure:</text>

  <!-- Node Structure Box -->
  <rect x="50" y="440" width="400" height="180" class="text-box" rx="5"/>
  <text x="70" y="465" class="label" font-weight="bold">Internal Node:</text>
  <text x="70" y="485" class="small-label">• Key: Lexicographic key (e.g., "app.bsky.feed.post/abc123")</text>
  <text x="70" y="505" class="small-label">• Value: Hash of child nodes (for internal nodes)</text>
  <text x="70" y="525" class="small-label">• Left: Pointer to left subtree</text>
  <text x="70" y="545" class="small-label">• Right: Pointer to right subtree</text>

  <text x="70" y="575" class="label" font-weight="bold">Leaf Node:</text>
  <text x="70" y="595" class="small-label">• Key: Record key</text>
  <text x="70" y="615" class="small-label">• Value: CID of the record</text>

  <!-- Key Ordering Section -->
  <text x="550" y="420" class="subtitle">Lexicographic Key Ordering:</text>

  <rect x="550" y="440" width="400" height="180" class="text-box" rx="5"/>
  <text x="570" y="465" class="small-label">Records ordered by key:</text>
  <text x="570" y="490" class="small-label" font-family="monospace">app.bsky.feed.like/abc123</text>
  <text x="570" y="510" class="small-label" font-family="monospace">app.bsky.feed.like/def456</text>
  <text x="570" y="530" class="small-label" font-family="monospace">app.bsky.feed.post/ghi789</text>
  <text x="570" y="550" class="small-label" font-family="monospace">app.bsky.feed.post/jkl012</text>

  <text x="570" y="580" class="label" font-weight="bold">Benefits:</text>
  <text x="570" y="600" class="small-label">✓ O(log n) lookup time</text>
  <text x="570" y="620" class="small-label">✓ Efficient range queries</text>

  <!-- Operations Section -->
  <text x="50" y="680" class="subtitle">Key Operations:</text>

  <!-- Insert Operation -->
  <rect x="50" y="700" width="280" height="140" class="text-box" rx="5"/>
  <text x="70" y="725" class="label" font-weight="bold">Insert Record:</text>
  <text x="70" y="745" class="small-label">1. Calculate CID of record</text>
  <text x="70" y="765" class="small-label">2. Insert into tree by key</text>
  <text x="70" y="785" class="small-label">3. Recalculate parent CIDs</text>
  <text x="70" y="805" class="small-label">4. Update root CID</text>

  <!-- Lookup Operation -->
  <rect x="370" y="700" width="280" height="140" class="text-box" rx="5"/>
  <text x="390" y="725" class="label" font-weight="bold">Lookup Record:</text>
  <text x="390" y="745" class="small-label">1. Start at root node</text>
  <text x="390" y="765" class="small-label">2. Compare key with node</text>
  <text x="390" y="785" class="small-label">3. Traverse left or right</text>
  <text x="390" y="805" class="small-label">4. Return CID when found</text>

  <!-- Diff Operation -->
  <rect x="690" y="700" width="260" height="140" class="text-box" rx="5"/>
  <text x="710" y="725" class="label" font-weight="bold">Diff Trees:</text>
  <text x="710" y="745" class="small-label">1. Compare root CIDs</text>
  <text x="710" y="765" class="small-label">2. Recursively find diffs</text>
  <text x="710" y="785" class="small-label">3. Only traverse changed</text>
  <text x="710" y="805" class="small-label">   branches</text>

  <!-- Legend -->
  <g transform="translate(50, 870)">
    <circle cx="10" cy="0" r="8" class="root-node"/>
    <text x="25" y="5" class="small-label">Root Node (entire tree hash)</text>

    <circle cx="200" cy="0" r="8" class="internal-node"/>
    <text x="215" y="5" class="small-label">Internal Node (branch hash)</text>

    <circle cx="500" cy="0" r="8" class="leaf-node"/>
    <text x="515" y="5" class="small-label">Leaf Node (record CID)</text>
  </g>
</svg>
