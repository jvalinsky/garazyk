<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="1400" viewBox="0 0 1200 1400">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .macro-box { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .logger-box { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .formatter-box { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .output-box { fill: #e6f7e6; stroke: #00aa00; stroke-width: 2; }
      .aggregator-box { fill: #fffacd; stroke: #daa520; stroke-width: 2; }
      .security-box { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,5; }
      .step-number { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: white; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title" font-size="20">Logging Pipeline</text>

  <!-- ===== PHASE 1: LOG MACROS ===== -->
  <text x="50" y="70" class="title" font-size="14">Phase 1: Log Statement Macros</text>

  <!-- Basic Macros -->
  <rect x="50" y="90" width="180" height="100" class="macro-box" rx="5"/>
  <circle cx="65" cy="105" r="12" fill="#0066cc"/>
  <text x="65" y="110" text-anchor="middle" class="step-number">1</text>
  <text x="140" y="115" text-anchor="middle" class="title">Basic Macros</text>
  <text x="140" y="135" text-anchor="middle" class="small">PDS_LOG_DEBUG()</text>
  <text x="140" y="150" text-anchor="middle" class="small">PDS_LOG_INFO()</text>
  <text x="140" y="165" text-anchor="middle" class="small">PDS_LOG_WARN()</text>
  <text x="140" y="180" text-anchor="middle" class="small">PDS_LOG_ERROR()</text>

  <!-- Component Macros -->
  <rect x="270" y="90" width="180" height="100" class="macro-box" rx="5"/>
  <text x="360" y="115" text-anchor="middle" class="title">Component Macros</text>
  <text x="360" y="135" text-anchor="middle" class="small">PDS_LOG_*_C(component)</text>
  <text x="360" y="155" text-anchor="middle" class="small">PDS_LOG_AUTH_*()</text>
  <text x="360" y="170" text-anchor="middle" class="small">PDS_LOG_DB_*()</text>
  <text x="360" y="185" text-anchor="middle" class="small">PDS_LOG_HTTP_*()</text>

  <!-- Shorthand Macros -->
  <rect x="490" y="90" width="180" height="100" class="macro-box" rx="5"/>
  <text x="580" y="115" text-anchor="middle" class="title">Shorthand Macros</text>
  <text x="580" y="135" text-anchor="middle" class="small">PDS_LOG_SYNC_*()</text>
  <text x="580" y="150" text-anchor="middle" class="small">PDS_LOG_ADMIN_*()</text>
  <text x="580" y="165" text-anchor="middle" class="small">PDS_LOG_SERVICE_*()</text>
  <text x="580" y="180" text-anchor="middle" class="small">+ 6 more components</text>

  <!-- Macro Context -->
  <rect x="710" y="90" width="180" height="100" class="security-box" rx="5"/>
  <text x="800" y="115" text-anchor="middle" class="title">Auto-Captured</text>
  <text x="800" y="135" text-anchor="middle" class="small">__FILE__</text>
  <text x="800" y="150" text-anchor="middle" class="small">__LINE__</text>
  <text x="800" y="165" text-anchor="middle" class="small">Thread ID</text>
  <text x="800" y="180" text-anchor="middle" class="small">Timestamp</text>

  <!-- Arrows down from macros -->
  <path d="M 140 190 L 140 230 L 360 230 L 360 260" class="arrow"/>
  <path d="M 360 190 L 360 260" class="arrow"/>
  <path d="M 580 190 L 580 230 L 360 230 L 360 260" class="arrow"/>

  <!-- ===== PHASE 2: SANITIZATION ===== -->
  <text x="50" y="250" class="title" font-size="14">Phase 2: Data Sanitization (Before Logging)</text>

  <!-- Sanitization Helpers -->
  <rect x="50" y="270" width="220" height="100" class="security-box" rx="5"/>
  <circle cx="65" cy="285" r="12" fill="#cc0000"/>
  <text x="65" y="290" text-anchor="middle" class="step-number">2</text>
  <text x="160" y="295" text-anchor="middle" class="title">Sanitization Helpers</text>
  <text x="160" y="315" text-anchor="middle" class="small">SanitizedErrorSummary()</text>
  <text x="160" y="330" text-anchor="middle" class="small">SanitizedURLString()</text>
  <text x="160" y="345" text-anchor="middle" class="small">Remove recordCBOR</text>
  <text x="160" y="360" text-anchor="middle" class="small">Strip null bytes</text>

  <!-- Redaction Rules -->
  <rect x="310" y="270" width="220" height="100" class="security-box" rx="5"/>
  <text x="420" y="295" text-anchor="middle" class="title">Never Log</text>
  <text x="420" y="315" text-anchor="middle" class="small">Passwords, tokens, keys</text>
  <text x="420" y="330" text-anchor="middle" class="small">Private keys, secrets</text>
  <text x="420" y="345" text-anchor="middle" class="small">Full error userInfo</text>
  <text x="420" y="360" text-anchor="middle" class="small">Binary/CBOR data</text>

  <!-- Safe Patterns -->
  <rect x="570" y="270" width="220" height="100" class="output-box" rx="5"/>
  <text x="680" y="295" text-anchor="middle" class="title">Safe to Log</text>
  <text x="680" y="315" text-anchor="middle" class="small">DIDs, request IDs</text>
  <text x="680" y="330" text-anchor="middle" class="small">Error domain + code</text>
  <text x="680" y="345" text-anchor="middle" class="small">Metadata (size, type)</text>
  <text x="680" y="360" text-anchor="middle" class="small">Sanitized URLs</text>

  <!-- Arrow down -->
  <path d="M 360 370 L 360 420" class="arrow"/>

  <!-- ===== PHASE 3: PDSLOGGER SINGLETON ===== -->
  <text x="50" y="410" class="title" font-size="14">Phase 3: PDSLogger Singleton</text>

  <!-- PDSLogger Core -->
  <rect x="150" y="430" width="500" height="120" class="logger-box" rx="5"/>
  <circle cx="165" cy="445" r="12" fill="#ff9900"/>
  <text x="165" y="450" text-anchor="middle" class="step-number">3</text>
  <text x="400" y="455" text-anchor="middle" class="title">[PDSLogger sharedLogger]</text>
  
  <text x="180" y="480" class="small">• Check log level (DEBUG/INFO/WARN/ERROR)</text>
  <text x="180" y="500" class="small">• Check component filter (if enabled)</text>
  <text x="180" y="520" class="small">• Add correlation ID (from thread-local storage)</text>
  <text x="180" y="540" class="small">• Route to formatters</text>

  <!-- Configuration -->
  <rect x="700" y="430" width="220" height="120" class="box" rx="5"/>
  <text x="810" y="455" text-anchor="middle" class="title">Configuration</text>
  <text x="810" y="480" text-anchor="middle" class="small">logLevel</text>
  <text x="810" y="495" text-anchor="middle" class="small">enabledComponents</text>
  <text x="810" y="510" text-anchor="middle" class="small">logFormat</text>
  <text x="810" y="525" text-anchor="middle" class="small">asyncLogging</text>
  <text x="810" y="540" text-anchor="middle" class="small">printToStdout</text>

  <!-- Arrow down -->
  <path d="M 400 550 L 400 590" class="arrow"/>

  <!-- ===== PHASE 4: FORMATTERS ===== -->
  <text x="50" y="580" class="title" font-size="14">Phase 4: Log Formatting</text>

  <!-- Text Formatter -->
  <rect x="100" y="600" width="280" height="100" class="formatter-box" rx="5"/>
  <circle cx="115" cy="615" r="12" fill="#6600cc"/>
  <text x="115" y="620" text-anchor="middle" class="step-number">4a</text>
  <text x="240" y="625" text-anchor="middle" class="title">Text Format (Default)</text>
  <text x="240" y="650" text-anchor="middle" class="small">[timestamp] [level] [component]</text>
  <text x="240" y="670" text-anchor="middle" class="small">[file:line] message</text>
  <text x="240" y="690" text-anchor="middle" class="small">Human-readable for development</text>

  <!-- JSON Formatter -->
  <rect x="420" y="600" width="280" height="100" class="formatter-box" rx="5"/>
  <circle cx="435" cy="615" r="12" fill="#6600cc"/>
  <text x="435" y="620" text-anchor="middle" class="step-number">4b</text>
  <text x="560" y="625" text-anchor="middle" class="title">JSON Format</text>
  <text x="560" y="650" text-anchor="middle" class="small">{timestamp, level, component,</text>
  <text x="560" y="670" text-anchor="middle" class="small">message, file, line, thread_id,</text>
  <text x="560" y="690" text-anchor="middle" class="small">pid, correlation_id}</text>

  <!-- Async Buffer -->
  <rect x="740" y="600" width="200" height="100" class="box" rx="5"/>
  <text x="840" y="625" text-anchor="middle" class="title">Async Buffer</text>
  <text x="840" y="650" text-anchor="middle" class="small">(if asyncLogging=YES)</text>
  <text x="840" y="670" text-anchor="middle" class="small">Buffer 100 messages</text>
  <text x="840" y="690" text-anchor="middle" class="small">Flush on ERROR</text>

  <!-- Arrows down -->
  <path d="M 240 700 L 240 750" class="arrow"/>
  <path d="M 560 700 L 560 750" class="arrow"/>
  <path d="M 840 700 L 840 730 L 560 730 L 560 750" class="arrow"/>

  <!-- ===== PHASE 5: OUTPUT DESTINATIONS ===== -->
  <text x="50" y="740" class="title" font-size="14">Phase 5: Output Destinations</text>

  <!-- stdout -->
  <rect x="50" y="760" width="180" height="80" class="output-box" rx="5"/>
  <circle cx="65" cy="775" r="12" fill="#00aa00"/>
  <text x="65" y="780" text-anchor="middle" class="step-number">5a</text>
  <text x="140" y="790" text-anchor="middle" class="title">stdout</text>
  <text x="140" y="810" text-anchor="middle" class="small">(if printToStdout=YES)</text>
  <text x="140" y="825" text-anchor="middle" class="small">Console output</text>

  <!-- Log File -->
  <rect x="270" y="760" width="180" height="80" class="output-box" rx="5"/>
  <circle cx="285" cy="775" r="12" fill="#00aa00"/>
  <text x="285" y="780" text-anchor="middle" class="step-number">5b</text>
  <text x="360" y="790" text-anchor="middle" class="title">Log File</text>
  <text x="360" y="810" text-anchor="middle" class="small">(if logFilePath set)</text>
  <text x="360" y="825" text-anchor="middle" class="small">server.log</text>

  <!-- os_log (macOS) -->
  <rect x="490" y="760" width="180" height="80" class="output-box" rx="5"/>
  <circle cx="505" cy="775" r="12" fill="#00aa00"/>
  <text x="505" y="780" text-anchor="middle" class="step-number">5c</text>
  <text x="580" y="790" text-anchor="middle" class="title">os_log (macOS)</text>
  <text x="580" y="810" text-anchor="middle" class="small">Unified logging</text>
  <text x="580" y="825" text-anchor="middle" class="small">Console.app</text>

  <!-- NSLog (Linux) -->
  <rect x="710" y="760" width="180" height="80" class="output-box" rx="5"/>
  <circle cx="725" cy="775" r="12" fill="#00aa00"/>
  <text x="725" y="780" text-anchor="middle" class="step-number">5d</text>
  <text x="800" y="790" text-anchor="middle" class="title">NSLog (Linux)</text>
  <text x="800" y="810" text-anchor="middle" class="small">GNUstep fallback</text>
  <text x="800" y="825" text-anchor="middle" class="small">syslog</text>

  <!-- Arrow down from log file -->
  <path d="M 360 840 L 360 890" class="arrow"/>

  <!-- ===== PHASE 6: LOG ROTATION ===== -->
  <text x="50" y="880" class="title" font-size="14">Phase 6: Log Rotation</text>

  <!-- Rotation Logic -->
  <rect x="150" y="900" width="420" height="100" class="box" rx="5"/>
  <circle cx="165" cy="915" r="12" fill="#0066cc"/>
  <text x="165" y="920" text-anchor="middle" class="step-number">6</text>
  <text x="360" y="925" text-anchor="middle" class="title">Automatic Rotation</text>
  <text x="180" y="950" class="small">• Trigger: File size exceeds maxLogFileSize (default 10MB)</text>
  <text x="180" y="970" class="small">• Rename: server.log → server.log.1 → server.log.2 → ...</text>
  <text x="180" y="990" class="small">• Keep: maxLogFiles versions (default 5)</text>

  <!-- Manual Controls -->
  <rect x="610" y="900" width="220" height="100" class="box" rx="5"/>
  <text x="720" y="925" text-anchor="middle" class="title">Manual Controls</text>
  <text x="720" y="950" text-anchor="middle" class="small">forceRotate</text>
  <text x="720" y="970" text-anchor="middle" class="small">flush</text>
  <text x="720" y="990" text-anchor="middle" class="small">(call before shutdown)</text>

  <!-- Arrow down -->
  <path d="M 360 1000 L 360 1050" class="arrow"/>

  <!-- ===== PHASE 7: LOG AGGREGATION ===== -->
  <text x="50" y="1040" class="title" font-size="14">Phase 7: Log Aggregation (Production)</text>

  <!-- Log Shippers -->
  <rect x="50" y="1060" width="180" height="100" class="aggregator-box" rx="5"/>
  <circle cx="65" cy="1075" r="12" fill="#daa520"/>
  <text x="65" y="1080" text-anchor="middle" class="step-number">7a</text>
  <text x="140" y="1090" text-anchor="middle" class="title">Log Shippers</text>
  <text x="140" y="1110" text-anchor="middle" class="small">Filebeat</text>
  <text x="140" y="1125" text-anchor="middle" class="small">Fluentd</text>
  <text x="140" y="1140" text-anchor="middle" class="small">Vector</text>

  <!-- Aggregation Systems -->
  <rect x="270" y="1060" width="180" height="100" class="aggregator-box" rx="5"/>
  <circle cx="285" cy="1075" r="12" fill="#daa520"/>
  <text x="285" y="1080" text-anchor="middle" class="step-number">7b</text>
  <text x="360" y="1090" text-anchor="middle" class="title">Aggregators</text>
  <text x="360" y="1110" text-anchor="middle" class="small">Elasticsearch</text>
  <text x="360" y="1125" text-anchor="middle" class="small">Splunk</text>
  <text x="360" y="1140" text-anchor="middle" class="small">CloudWatch</text>

  <!-- Analysis Tools -->
  <rect x="490" y="1060" width="180" height="100" class="aggregator-box" rx="5"/>
  <circle cx="505" cy="1075" r="12" fill="#daa520"/>
  <text x="505" y="1080" text-anchor="middle" class="step-number">7c</text>
  <text x="580" y="1090" text-anchor="middle" class="title">Analysis</text>
  <text x="580" y="1110" text-anchor="middle" class="small">Kibana</text>
  <text x="580" y="1125" text-anchor="middle" class="small">Grafana</text>
  <text x="580" y="1140" text-anchor="middle" class="small">jq queries</text>

  <!-- Alerting -->
  <rect x="710" y="1060" width="180" height="100" class="aggregator-box" rx="5"/>
  <circle cx="725" cy="1075" r="12" fill="#daa520"/>
  <text x="725" y="1080" text-anchor="middle" class="step-number">7d</text>
  <text x="800" y="1090" text-anchor="middle" class="title">Alerting</text>
  <text x="800" y="1110" text-anchor="middle" class="small">Error rate spikes</text>
  <text x="800" y="1125" text-anchor="middle" class="small">Auth failures</text>
  <text x="800" y="1140" text-anchor="middle" class="small">Performance issues</text>

  <!-- Arrows between aggregation components -->
  <path d="M 230 1110 L 270 1110" class="arrow"/>
  <path d="M 450 1110 L 490 1110" class="arrow"/>
  <path d="M 670 1110 L 710 1110" class="arrow"/>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(50, 1200)">
    <text x="0" y="0" class="title">Legend:</text>
    
    <rect x="0" y="20" width="20" height="20" class="macro-box"/>
    <text x="30" y="35" class="label">Log Macros</text>
    
    <rect x="200" y="20" width="20" height="20" class="logger-box"/>
    <text x="230" y="35" class="label">Logger Core</text>
    
    <rect x="400" y="20" width="20" height="20" class="formatter-box"/>
    <text x="430" y="35" class="label">Formatters</text>
    
    <rect x="0" y="50" width="20" height="20" class="output-box"/>
    <text x="30" y="65" class="label">Output Destinations</text>
    
    <rect x="200" y="50" width="20" height="20" class="aggregator-box"/>
    <text x="230" y="65" class="label">Log Aggregation</text>
    
    <rect x="400" y="50" width="20" height="20" class="security-box"/>
    <text x="430" y="65" class="label">Security/Sanitization</text>
  </g>

  <!-- ===== KEY FEATURES ===== -->
  <g transform="translate(50, 1290)">
    <text x="0" y="0" class="title">Key Features:</text>
    <text x="0" y="25" class="small">• Multiple log levels (DEBUG, INFO, WARN, ERROR) with runtime filtering</text>
    <text x="0" y="45" class="small">• Component-based tagging for subsystem filtering (Auth, Database, HTTP, Sync, etc.)</text>
    <text x="0" y="65" class="small">• Correlation IDs for request tracking (thread-local storage)</text>
    <text x="0" y="85" class="small">• Dual output formats: Text (human-readable) and JSON (machine-parseable)</text>
    <text x="0" y="105" class="small">• Automatic log rotation based on file size with configurable retention</text>
  </g>

  <!-- ASCII Art Comment for Fallback -->
  <!-- 
  Logging Pipeline Flow:
  
  1. LOG MACROS
     PDS_LOG_*() → PDS_LOG_*_C() → Component shortcuts
     Auto-capture: __FILE__, __LINE__, thread ID, timestamp
  
  2. DATA SANITIZATION
     Sanitize errors, URLs, remove sensitive data
     Never log: passwords, tokens, keys, binary data
  
  3. PDSLOGGER SINGLETON
     Check log level → Check component filter → Add correlation ID
  
  4. FORMATTERS
     Text format (development) or JSON format (production)
     Optional async buffering for performance
  
  5. OUTPUT DESTINATIONS
     stdout, log files, os_log (macOS), NSLog (Linux)
  
  6. LOG ROTATION
     Automatic rotation at maxLogFileSize
     Keep maxLogFiles versions
  
  7. LOG AGGREGATION
     Filebeat/Fluentd → Elasticsearch/Splunk → Kibana/Grafana → Alerting
  -->
</svg>
