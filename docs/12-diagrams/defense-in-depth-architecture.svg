<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #333; }
      .layer-title { font: bold 16px sans-serif; fill: #fff; }
      .label { font: 14px sans-serif; fill: #333; }
      .small { font: 12px sans-serif; fill: #666; }
      .layer1 { fill: #e3f2fd; stroke: #1976d2; stroke-width: 3; }
      .layer2 { fill: #f3e5f5; stroke: #7b1fa2; stroke-width: 3; }
      .layer3 { fill: #e8f5e9; stroke: #388e3c; stroke-width: 3; }
      .layer4 { fill: #fff3e0; stroke: #f57c00; stroke-width: 3; }
      .layer5 { fill: #fce4ec; stroke: #c2185b; stroke-width: 3; }
      .header { fill: #333; }
      .arrow { fill: none; stroke: #666; stroke-width: 2; stroke-dasharray: 5,5; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Defense in Depth Architecture</text>
  <text x="500" y="55" text-anchor="middle" class="small">Multiple layers of security controls protect against attacks</text>

  <!-- Layer 1: Network Perimeter -->
  <rect x="50" y="90" width="900" height="140" class="layer1" rx="10"/>
  <rect x="50" y="90" width="900" height="35" class="header" rx="10"/>
  <text x="500" y="113" text-anchor="middle" class="layer-title">Layer 1: Network Perimeter</text>

  <rect x="70" y="145" width="200" height="70" fill="#fff" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="170" y="165" text-anchor="middle" class="label" font-weight="bold">TLS/HTTPS</text>
  <text x="170" y="185" text-anchor="middle" class="small">Encrypted transport</text>
  <text x="170" y="200" text-anchor="middle" class="small">Certificate validation</text>

  <rect x="290" y="145" width="200" height="70" fill="#fff" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="390" y="165" text-anchor="middle" class="label" font-weight="bold">Rate Limiting</text>
  <text x="390" y="185" text-anchor="middle" class="small">Per-IP throttling</text>
  <text x="390" y="200" text-anchor="middle" class="small">Request quotas</text>

  <rect x="510" y="145" width="200" height="70" fill="#fff" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="610" y="165" text-anchor="middle" class="label" font-weight="bold">Request Size Limits</text>
  <text x="610" y="185" text-anchor="middle" class="small">Max 10 MB per request</text>
  <text x="610" y="200" text-anchor="middle" class="small">Timeout enforcement</text>

  <rect x="730" y="145" width="200" height="70" fill="#fff" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="830" y="165" text-anchor="middle" class="label" font-weight="bold">Firewall Rules</text>
  <text x="830" y="185" text-anchor="middle" class="small">IP filtering (optional)</text>
  <text x="830" y="200" text-anchor="middle" class="small">Port restrictions</text>

  <!-- Layer 2: Authentication &amp; Authorization -->
  <rect x="50" y="250" width="900" height="140" class="layer2" rx="10"/>
  <rect x="50" y="250" width="900" height="35" class="header" rx="10"/>
  <text x="500" y="273" text-anchor="middle" class="layer-title">Layer 2: Authentication &amp; Authorization</text>

  <rect x="70" y="305" width="200" height="70" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="5"/>
  <text x="170" y="325" text-anchor="middle" class="label" font-weight="bold">JWT Verification</text>
  <text x="170" y="345" text-anchor="middle" class="small">Signature validation</text>
  <text x="170" y="360" text-anchor="middle" class="small">Expiration checks</text>

  <rect x="290" y="305" width="200" height="70" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="5"/>
  <text x="390" y="325" text-anchor="middle" class="label" font-weight="bold">DPoP Proof</text>
  <text x="390" y="345" text-anchor="middle" class="small">Token binding</text>
  <text x="390" y="360" text-anchor="middle" class="small">Replay protection</text>

  <rect x="510" y="305" width="200" height="70" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="5"/>
  <text x="610" y="325" text-anchor="middle" class="label" font-weight="bold">Scope Verification</text>
  <text x="610" y="345" text-anchor="middle" class="small">Permission checks</text>
  <text x="610" y="360" text-anchor="middle" class="small">Least privilege</text>

  <rect x="730" y="305" width="200" height="70" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="5"/>
  <text x="830" y="325" text-anchor="middle" class="label" font-weight="bold">Session Management</text>
  <text x="830" y="345" text-anchor="middle" class="small">Token refresh</text>
  <text x="830" y="360" text-anchor="middle" class="small">Revocation support</text>

  <!-- Layer 3: Input Validation -->
  <rect x="50" y="410" width="900" height="140" class="layer3" rx="10"/>
  <rect x="50" y="410" width="900" height="35" class="header" rx="10"/>
  <text x="500" y="433" text-anchor="middle" class="layer-title">Layer 3: Input Validation</text>

  <rect x="70" y="465" width="200" height="70" fill="#fff" stroke="#388e3c" stroke-width="2" rx="5"/>
  <text x="170" y="485" text-anchor="middle" class="label" font-weight="bold">Protocol Validation</text>
  <text x="170" y="505" text-anchor="middle" class="small">DID, CID, NSID format</text>
  <text x="170" y="520" text-anchor="middle" class="small">Regex validation</text>

  <rect x="290" y="465" width="200" height="70" fill="#fff" stroke="#388e3c" stroke-width="2" rx="5"/>
  <text x="390" y="485" text-anchor="middle" class="label" font-weight="bold">MIME Type Check</text>
  <text x="390" y="505" text-anchor="middle" class="small">Allowlist enforcement</text>
  <text x="390" y="520" text-anchor="middle" class="small">Magic number verify</text>

  <rect x="510" y="465" width="200" height="70" fill="#fff" stroke="#388e3c" stroke-width="2" rx="5"/>
  <text x="610" y="485" text-anchor="middle" class="label" font-weight="bold">Size Validation</text>
  <text x="610" y="505" text-anchor="middle" class="small">Type-specific limits</text>
  <text x="610" y="520" text-anchor="middle" class="small">Quota enforcement</text>

  <rect x="730" y="465" width="200" height="70" fill="#fff" stroke="#388e3c" stroke-width="2" rx="5"/>
  <text x="830" y="485" text-anchor="middle" class="label" font-weight="bold">Sanitization</text>
  <text x="830" y="505" text-anchor="middle" class="small">HTML/JS escaping</text>
  <text x="830" y="520" text-anchor="middle" class="small">SQL parameterization</text>

  <!-- Layer 4: Business Logic -->
  <rect x="50" y="570" width="900" height="140" class="layer4" rx="10"/>
  <rect x="50" y="570" width="900" height="35" class="header" rx="10"/>
  <text x="500" y="593" text-anchor="middle" class="layer-title">Layer 4: Business Logic</text>

  <rect x="70" y="625" width="200" height="70" fill="#fff" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="170" y="645" text-anchor="middle" class="label" font-weight="bold">Ownership Check</text>
  <text x="170" y="665" text-anchor="middle" class="small">Resource ownership</text>
  <text x="170" y="680" text-anchor="middle" class="small">DID verification</text>

  <rect x="290" y="625" width="200" height="70" fill="#fff" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="390" y="645" text-anchor="middle" class="label" font-weight="bold">State Validation</text>
  <text x="390" y="665" text-anchor="middle" class="small">Resource exists</text>
  <text x="390" y="680" text-anchor="middle" class="small">Valid state transitions</text>

  <rect x="510" y="625" width="200" height="70" fill="#fff" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="610" y="645" text-anchor="middle" class="label" font-weight="bold">Dependency Check</text>
  <text x="610" y="665" text-anchor="middle" class="small">No circular refs</text>
  <text x="610" y="680" text-anchor="middle" class="small">Integrity constraints</text>

  <rect x="730" y="625" width="200" height="70" fill="#fff" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="830" y="645" text-anchor="middle" class="label" font-weight="bold">Transaction Safety</text>
  <text x="830" y="665" text-anchor="middle" class="small">ACID guarantees</text>
  <text x="830" y="680" text-anchor="middle" class="small">Rollback on error</text>

  <!-- Layer 5: Data Protection -->
  <rect x="50" y="730" width="900" height="140" class="layer5" rx="10"/>
  <rect x="50" y="730" width="900" height="35" class="header" rx="10"/>
  <text x="500" y="753" text-anchor="middle" class="layer-title">Layer 5: Data Protection</text>

  <rect x="70" y="785" width="200" height="70" fill="#fff" stroke="#c2185b" stroke-width="2" rx="5"/>
  <text x="170" y="805" text-anchor="middle" class="label" font-weight="bold">Encryption at Rest</text>
  <text x="170" y="825" text-anchor="middle" class="small">Keychain storage</text>
  <text x="170" y="840" text-anchor="middle" class="small">Hardware-backed keys</text>

  <rect x="290" y="785" width="200" height="70" fill="#fff" stroke="#c2185b" stroke-width="2" rx="5"/>
  <text x="390" y="805" text-anchor="middle" class="label" font-weight="bold">Secure Deletion</text>
  <text x="390" y="825" text-anchor="middle" class="small">Overwrite sensitive data</text>
  <text x="390" y="840" text-anchor="middle" class="small">Audit logging</text>

  <rect x="510" y="785" width="200" height="70" fill="#fff" stroke="#c2185b" stroke-width="2" rx="5"/>
  <text x="610" y="805" text-anchor="middle" class="label" font-weight="bold">Log Redaction</text>
  <text x="610" y="825" text-anchor="middle" class="small">Mask sensitive fields</text>
  <text x="610" y="840" text-anchor="middle" class="small">No PII in logs</text>

  <rect x="730" y="785" width="200" height="70" fill="#fff" stroke="#c2185b" stroke-width="2" rx="5"/>
  <text x="830" y="805" text-anchor="middle" class="label" font-weight="bold">Backup Security</text>
  <text x="830" y="825" text-anchor="middle" class="small">Encrypted backups</text>
  <text x="830" y="840" text-anchor="middle" class="small">Access controls</text>

  <!-- Attack Flow Arrows -->
  <path d="M 500 80 L 500 90" class="arrow"/>
  <text x="520" y="85" class="small">Attack must bypass</text>
  
  <path d="M 500 230 L 500 250" class="arrow"/>
  <text x="520" y="245" class="small">all layers to</text>
  
  <path d="M 500 390 L 500 410" class="arrow"/>
  <text x="520" y="405" class="small">reach protected</text>
  
  <path d="M 500 550 L 500 570" class="arrow"/>
  <text x="520" y="565" class="small">data and</text>
  
  <path d="M 500 710 L 500 730" class="arrow"/>
  <text x="520" y="725" class="small">operations</text>
</svg>
