<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1100" viewBox="0 0 1000 1100">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .validation { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .code { font-family: monospace; font-size: 10px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .error-arrow { stroke: #cc0000; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" class="title">Blob Quota Enforcement Flow</text>

  <!-- Blob Upload Request -->
  <rect x="300" y="60" width="400" height="60" class="box" rx="5"/>
  <text x="500" y="85" class="text">Blob Upload Request</text>
  <text x="500" y="105" class="label">User uploads blob with MIME type</text>

  <!-- Arrow -->
  <path d="M 500 120 L 500 150" class="arrow"/>

  <!-- MimeTypeValidator -->
  <rect x="300" y="150" width="400" height="60" class="process" rx="5"/>
  <text x="500" y="175" class="text">MimeTypeValidator.sharedValidator</text>
  <text x="500" y="195" class="label">Determine MIME type category</text>

  <!-- Arrow -->
  <path d="M 500 210 L 500 240" class="arrow"/>

  <!-- Category Detection -->
  <rect x="300" y="240" width="400" height="80" class="validation" rx="5"/>
  <text x="500" y="265" class="text">Detect Category from MIME Type</text>
  <text x="500" y="285" class="label">image/* → Image (5MB)</text>
  <text x="500" y="300" class="label">video/* → Video (50MB)</text>
  <text x="500" y="315" class="label">audio/* → Audio (10MB)</text>

  <!-- Arrow -->
  <path d="M 500 320 L 500 350" class="arrow"/>

  <!-- Get Max Size -->
  <rect x="300" y="350" width="400" height="80" class="process" rx="5"/>
  <text x="500" y="375" class="text">Get Max Size for Category</text>
  <text x="500" y="395" class="label">maxSizesByCategory lookup</text>
  <text x="500" y="410" class="code">NSUInteger maxSize = [validator maxSizeForMimeType:mimeType]</text>

  <!-- Arrow -->
  <path d="M 500 430 L 500 460" class="arrow"/>

  <!-- Size Comparison -->
  <polygon points="500,460 600,510 500,560 400,510" class="validation"/>
  <text x="500" y="505" class="text">fileSize ></text>
  <text x="500" y="520" class="label">maxSize?</text>

  <!-- Yes - Reject -->
  <path d="M 600 510 L 750 510" class="error-arrow"/>
  <text x="670" y="505" class="label">Yes</text>
  <rect x="750" y="480" width="200" height="60" class="error" rx="5"/>
  <text x="850" y="505" class="text">Reject Upload</text>
  <text x="850" y="525" class="code">BlobStorageErrorFileTooLarge</text>

  <!-- No - Continue -->
  <path d="M 500 560 L 500 590" class="arrow"/>
  <text x="520" y="580" class="label">No</text>

  <!-- Validate MIME Type -->
  <rect x="300" y="590" width="400" height="60" class="validation" rx="5"/>
  <text x="500" y="615" class="text">Validate MIME Type Format</text>
  <text x="500" y="635" class="label">Check format, supported types</text>

  <!-- Error path -->
  <path d="M 700 620 L 850 620 L 850 540" class="error-arrow"/>
  <text x="770" y="615" class="label">Invalid</text>

  <!-- Arrow -->
  <path d="M 500 650 L 500 680" class="arrow"/>

  <!-- Check Supported -->
  <polygon points="500,680 600,730 500,780 400,730" class="validation"/>
  <text x="500" y="725" class="text">MIME type</text>
  <text x="500" y="740" class="label">supported?</text>

  <!-- No - Reject -->
  <path d="M 600 730 L 750 730 L 750 620" class="error-arrow"/>
  <text x="670" y="725" class="label">No</text>

  <!-- Yes - Continue -->
  <path d="M 500 780 L 500 810" class="arrow"/>
  <text x="520" y="800" class="label">Yes</text>

  <!-- Validate Magic Bytes -->
  <rect x="300" y="810" width="400" height="60" class="validation" rx="5"/>
  <text x="500" y="835" class="text">Validate Magic Bytes</text>
  <text x="500" y="855" class="label">Verify file signature matches MIME type</text>

  <!-- Error path -->
  <path d="M 700 840 L 850 840 L 850 730" class="error-arrow"/>
  <text x="770" y="835" class="label">Mismatch</text>

  <!-- Arrow -->
  <path d="M 500 870 L 500 900" class="arrow"/>

  <!-- All Checks Passed -->
  <rect x="300" y="900" width="400" height="60" class="success" rx="5"/>
  <text x="500" y="925" class="text">Quota Checks Passed</text>
  <text x="500" y="945" class="label">Proceed with blob storage</text>

  <!-- Arrow -->
  <path d="M 500 960 L 500 990" class="arrow"/>

  <!-- Store Blob -->
  <rect x="300" y="990" width="400" height="40" class="process" rx="5"/>
  <text x="500" y="1015" class="text">Store Blob Data and Metadata</text>

  <!-- Size Limits Table -->
  <g transform="translate(50, 350)">
    <text x="0" y="0" class="text" text-anchor="start" font-weight="bold">Size Limits by Category:</text>
    <rect x="0" y="10" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="28" class="label" text-anchor="start">Image (image/*)</text>
    <text x="190" y="28" class="label" text-anchor="end">5 MB</text>
    
    <rect x="0" y="35" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="53" class="label" text-anchor="start">Video (video/*)</text>
    <text x="190" y="53" class="label" text-anchor="end">50 MB</text>
    
    <rect x="0" y="60" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="78" class="label" text-anchor="start">Audio (audio/*)</text>
    <text x="190" y="78" class="label" text-anchor="end">10 MB</text>
    
    <rect x="0" y="85" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="103" class="label" text-anchor="start">Font (font/*)</text>
    <text x="190" y="103" class="label" text-anchor="end">10 MB</text>
    
    <rect x="0" y="110" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="128" class="label" text-anchor="start">Model (model/*)</text>
    <text x="190" y="128" class="label" text-anchor="end">100 MB</text>
    
    <rect x="0" y="135" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="153" class="label" text-anchor="start">Document (text/*, app/*)</text>
    <text x="190" y="153" class="label" text-anchor="end">10 MB</text>
    
    <rect x="0" y="160" width="200" height="25" class="box" rx="3"/>
    <text x="10" y="178" class="label" text-anchor="start">Other</text>
    <text x="190" y="178" class="label" text-anchor="end">5 MB</text>
  </g>

  <!-- Implementation Details -->
  <g transform="translate(50, 600)">
    <text x="0" y="0" class="text" text-anchor="start" font-weight="bold">Implementation:</text>
    <text x="0" y="20" class="code" text-anchor="start">// MimeTypeValidator.m constants</text>
    <text x="0" y="35" class="code" text-anchor="start">static const NSUInteger kMaxImageSize = 5 * 1024 * 1024;</text>
    <text x="0" y="50" class="code" text-anchor="start">static const NSUInteger kMaxVideoSize = 50 * 1024 * 1024;</text>
    <text x="0" y="65" class="code" text-anchor="start">static const NSUInteger kMaxAudioSize = 10 * 1024 * 1024;</text>
    <text x="0" y="80" class="code" text-anchor="start">static const NSUInteger kMaxFontSize = 10 * 1024 * 1024;</text>
    <text x="0" y="95" class="code" text-anchor="start">static const NSUInteger kMaxModelSize = 100 * 1024 * 1024;</text>
    <text x="0" y="110" class="code" text-anchor="start">static const NSUInteger kMaxDocumentSize = 10 * 1024 * 1024;</text>
    <text x="0" y="125" class="code" text-anchor="start">static const NSUInteger kMaxOtherSize = 5 * 1024 * 1024;</text>
  </g>

  <!-- Key Points -->
  <g transform="translate(50, 760)">
    <text x="0" y="0" class="text" text-anchor="start" font-weight="bold">Key Points:</text>
    <text x="0" y="20" class="label" text-anchor="start">• Quota enforcement happens before blob storage</text>
    <text x="0" y="35" class="label" text-anchor="start">• Size limits are per-blob, not per-user total</text>
    <text x="0" y="50" class="label" text-anchor="start">• Category determined by MIME type prefix</text>
    <text x="0" y="65" class="label" text-anchor="start">• Magic bytes validation prevents MIME type spoofing</text>
    <text x="0" y="80" class="label" text-anchor="start">• Validation is fail-fast (reject early)</text>
    <text x="0" y="95" class="label" text-anchor="start">• Error messages include actual and max sizes</text>
  </g>
</svg>
