<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .component { fill: #ecf0f1; stroke: #2c3e50; stroke-width: 2; }
      .service-db { fill: #e8f4f8; stroke: #3498db; stroke-width: 2; }
      .actor-db { fill: #f0e8f8; stroke: #9b59b6; stroke-width: 2; }
      .pool { fill: #f8f4e8; stroke: #e67e22; stroke-width: 2; }
      .title { fill: #2c3e50; font-weight: bold; font-size: 14px; }
      .label { fill: #34495e; font-size: 12px; }
      .arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; }
      .section-title { fill: #2c3e50; font-weight: bold; font-size: 16px; }
      .note { fill: #7f8c8d; font-size: 11px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="section-title">PDS Database Pool Architecture</text>

  <!-- PDSServiceDatabases (Top) -->
  <rect x="150" y="70" width="700" height="120" class="service-db"/>
  <text x="500" y="95" text-anchor="middle" class="title">PDSServiceDatabases (Singleton)</text>
  <line x1="150" y1="105" x2="850" y2="105" stroke="#3498db" stroke-width="1"/>
  
  <rect x="170" y="115" width="140" height="60" class="component"/>
  <text x="240" y="135" text-anchor="middle" class="label">Service DB</text>
  <text x="240" y="155" text-anchor="middle" class="label">accounts</text>
  <text x="240" y="170" text-anchor="middle" class="label">did_cache</text>

  <rect x="330" y="115" width="140" height="60" class="component"/>
  <text x="400" y="135" text-anchor="middle" class="label">DID Cache</text>
  <text x="400" y="155" text-anchor="middle" class="label">Resolution</text>
  <text x="400" y="170" text-anchor="middle" class="label">Caching</text>

  <rect x="490" y="115" width="140" height="60" class="component"/>
  <text x="560" y="135" text-anchor="middle" class="label">Sequencer</text>
  <text x="560" y="155" text-anchor="middle" class="label">Event Log</text>
  <text x="560" y="170" text-anchor="middle" class="label">Ordering</text>

  <rect x="650" y="115" width="140" height="60" class="component"/>
  <text x="720" y="135" text-anchor="middle" class="label">Migrations</text>
  <text x="720" y="155" text-anchor="middle" class="label">Schema</text>
  <text x="720" y="170" text-anchor="middle" class="label">Versioning</text>

  <!-- PDSDatabasePool (Middle) -->
  <rect x="150" y="240" width="700" height="100" class="pool"/>
  <text x="500" y="265" text-anchor="middle" class="title">PDSDatabasePool (Per-DID Connection Manager)</text>
  <line x1="150" y1="275" x2="850" y2="275" stroke="#e67e22" stroke-width="1"/>
  
  <text x="170" y="300" class="label">• Maintains connection cache by DID</text>
  <text x="170" y="320" class="label">• Lazy-loads actor databases on first access</text>
  <text x="170" y="340" class="label">• Manages prepared statements and transactions</text>

  <!-- Actor Databases (Bottom) -->
  <text x="500" y="400" text-anchor="middle" class="section-title">Actor Databases (Per-User)</text>

  <!-- Actor DB 1 -->
  <rect x="50" y="430" width="180" height="280" class="actor-db"/>
  <text x="140" y="455" text-anchor="middle" class="title">Actor DB 1</text>
  <text x="140" y="475" text-anchor="middle" class="label">did:plc:user1</text>
  <line x1="50" y1="485" x2="230" y2="485" stroke="#9b59b6" stroke-width="1"/>
  
  <rect x="60" y="495" width="160" height="50" class="component"/>
  <text x="140" y="515" text-anchor="middle" class="label">records</text>
  <text x="140" y="530" text-anchor="middle" class="label">CRUD operations</text>

  <rect x="60" y="555" width="160" height="50" class="component"/>
  <text x="140" y="575" text-anchor="middle" class="label">mst_nodes</text>
  <text x="140" y="590" text-anchor="middle" class="label">Tree structure</text>

  <rect x="60" y="615" width="160" height="50" class="component"/>
  <text x="140" y="635" text-anchor="middle" class="label">blobs</text>
  <text x="140" y="650" text-anchor="middle" class="label">Blob metadata</text>

  <rect x="60" y="675" width="160" height="25" class="component"/>
  <text x="140" y="692" text-anchor="middle" class="label">commits</text>

  <!-- Actor DB 2 -->
  <rect x="270" y="430" width="180" height="280" class="actor-db"/>
  <text x="360" y="455" text-anchor="middle" class="title">Actor DB 2</text>
  <text x="360" y="475" text-anchor="middle" class="label">did:plc:user2</text>
  <line x1="270" y1="485" x2="450" y2="485" stroke="#9b59b6" stroke-width="1"/>
  
  <rect x="280" y="495" width="160" height="50" class="component"/>
  <text x="360" y="515" text-anchor="middle" class="label">records</text>
  <text x="360" y="530" text-anchor="middle" class="label">CRUD operations</text>

  <rect x="280" y="555" width="160" height="50" class="component"/>
  <text x="360" y="575" text-anchor="middle" class="label">mst_nodes</text>
  <text x="360" y="590" text-anchor="middle" class="label">Tree structure</text>

  <rect x="280" y="615" width="160" height="50" class="component"/>
  <text x="360" y="635" text-anchor="middle" class="label">blobs</text>
  <text x="360" y="650" text-anchor="middle" class="label">Blob metadata</text>

  <rect x="280" y="675" width="160" height="25" class="component"/>
  <text x="360" y="692" text-anchor="middle" class="label">commits</text>

  <!-- Actor DB N -->
  <rect x="490" y="430" width="180" height="280" class="actor-db"/>
  <text x="580" y="455" text-anchor="middle" class="title">Actor DB N</text>
  <text x="580" y="475" text-anchor="middle" class="label">did:plc:userN</text>
  <line x1="490" y1="485" x2="670" y2="485" stroke="#9b59b6" stroke-width="1"/>
  
  <rect x="500" y="495" width="160" height="50" class="component"/>
  <text x="580" y="515" text-anchor="middle" class="label">records</text>
  <text x="580" y="530" text-anchor="middle" class="label">CRUD operations</text>

  <rect x="500" y="555" width="160" height="50" class="component"/>
  <text x="580" y="575" text-anchor="middle" class="label">mst_nodes</text>
  <text x="580" y="590" text-anchor="middle" class="label">Tree structure</text>

  <rect x="500" y="615" width="160" height="50" class="component"/>
  <text x="580" y="635" text-anchor="middle" class="label">blobs</text>
  <text x="580" y="650" text-anchor="middle" class="label">Blob metadata</text>

  <rect x="500" y="675" width="160" height="25" class="component"/>
  <text x="580" y="692" text-anchor="middle" class="label">commits</text>

  <!-- Connections from Pool to Actor DBs -->
  <path d="M 240 340 L 140 430" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 360 340 L 360 430" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 560 340 L 580 430" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Connection from Service DB to Pool -->
  <path d="M 500 190 L 500 240" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Notes -->
  <text x="50" y="760" class="note">• Each actor database is isolated and independent</text>
  <text x="50" y="780" class="note">• Databases are created on-demand when user first accesses PDS</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>
