<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #333; }
      .label { font: 14px sans-serif; fill: #333; }
      .small { font: 12px sans-serif; fill: #666; }
      .box { fill: #f0f8ff; stroke: #4682b4; stroke-width: 2; }
      .validate-box { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .reject-box { fill: #ffebee; stroke: #f44336; stroke-width: 2; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .reject-arrow { fill: none; stroke: #f44336; stroke-width: 2; marker-end: url(#arrowhead-reject); }
      .success-arrow { fill: none; stroke: #4caf50; stroke-width: 2; marker-end: url(#arrowhead-success); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-reject" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f44336" />
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4caf50" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Input Validation Pipeline</text>

  <!-- Client Request -->
  <rect x="350" y="60" width="200" height="60" class="box" rx="5"/>
  <text x="450" y="85" text-anchor="middle" class="label" font-weight="bold">Client Request</text>
  <text x="450" y="105" text-anchor="middle" class="small">HTTP POST with JSON body</text>

  <path d="M 450 120 L 450 150" class="arrow"/>

  <!-- Layer 1: Protocol Validation -->
  <text x="50" y="170" class="label" font-weight="bold">Layer 1: Protocol Validation</text>
  
  <rect x="300" y="180" width="300" height="100" class="validate-box" rx="5"/>
  <text x="450" y="205" text-anchor="middle" class="label" font-weight="bold">ATProtoValidator</text>
  <text x="450" y="225" text-anchor="middle" class="small">✓ DID format (did:plc:*, did:web:*)</text>
  <text x="450" y="240" text-anchor="middle" class="small">✓ Handle format (DNS hostname)</text>
  <text x="450" y="255" text-anchor="middle" class="small">✓ CID format (base32 CIDv1)</text>
  <text x="450" y="270" text-anchor="middle" class="small">✓ NSID format (reverse DNS)</text>

  <rect x="650" y="200" width="200" height="60" class="reject-box" rx="5"/>
  <text x="750" y="225" text-anchor="middle" class="label" font-weight="bold">Reject: 400</text>
  <text x="750" y="245" text-anchor="middle" class="small">Invalid identifier format</text>

  <path d="M 600 230 L 650 230" class="reject-arrow"/>
  <path d="M 450 280 L 450 310" class="success-arrow"/>

  <!-- Layer 2: Size & Type Validation -->
  <text x="50" y="330" class="label" font-weight="bold">Layer 2: Size & Type Validation</text>

  <rect x="300" y="340" width="300" height="100" class="validate-box" rx="5"/>
  <text x="450" y="365" text-anchor="middle" class="label" font-weight="bold">Request Size & Type Check</text>
  <text x="450" y="385" text-anchor="middle" class="small">✓ Content-Length ≤ max (10 MB)</text>
  <text x="450" y="400" text-anchor="middle" class="small">✓ Content-Type valid</text>
  <text x="450" y="415" text-anchor="middle" class="small">✓ MIME type allowed</text>
  <text x="450" y="430" text-anchor="middle" class="small">✓ Magic numbers match type</text>

  <rect x="650" y="360" width="200" height="60" class="reject-box" rx="5"/>
  <text x="750" y="385" text-anchor="middle" class="label" font-weight="bold">Reject: 413/415</text>
  <text x="750" y="405" text-anchor="middle" class="small">Request too large or invalid type</text>

  <path d="M 600 390 L 650 390" class="reject-arrow"/>
  <path d="M 450 440 L 450 470" class="success-arrow"/>

  <!-- Layer 3: Authentication -->
  <text x="50" y="490" class="label" font-weight="bold">Layer 3: Authentication</text>

  <rect x="300" y="500" width="300" height="100" class="validate-box" rx="5"/>
  <text x="450" y="525" text-anchor="middle" class="label" font-weight="bold">XrpcAuthHelper</text>
  <text x="450" y="545" text-anchor="middle" class="small">✓ JWT signature valid</text>
  <text x="450" y="560" text-anchor="middle" class="small">✓ Token not expired</text>
  <text x="450" y="575" text-anchor="middle" class="small">✓ DPoP proof valid</text>
  <text x="450" y="590" text-anchor="middle" class="small">✓ Token bound to DPoP key</text>

  <rect x="650" y="520" width="200" height="60" class="reject-box" rx="5"/>
  <text x="750" y="545" text-anchor="middle" class="label" font-weight="bold">Reject: 401</text>
  <text x="750" y="565" text-anchor="middle" class="small">Authentication failed</text>

  <path d="M 600 550 L 650 550" class="reject-arrow"/>
  <path d="M 450 600 L 450 630" class="success-arrow"/>

  <!-- Layer 4: Business Logic Validation -->
  <text x="50" y="650" class="label" font-weight="bold">Layer 4: Business Logic Validation</text>

  <rect x="300" y="660" width="300" height="120" class="validate-box" rx="5"/>
  <text x="450" y="685" text-anchor="middle" class="label" font-weight="bold">Service Layer Validation</text>
  <text x="450" y="705" text-anchor="middle" class="small">✓ Resource ownership (DID match)</text>
  <text x="450" y="720" text-anchor="middle" class="small">✓ Resource exists</text>
  <text x="450" y="735" text-anchor="middle" class="small">✓ State valid for operation</text>
  <text x="450" y="750" text-anchor="middle" class="small">✓ No circular dependencies</text>
  <text x="450" y="765" text-anchor="middle" class="small">✓ Quota not exceeded</text>

  <rect x="650" y="680" width="200" height="80" class="reject-box" rx="5"/>
  <text x="750" y="705" text-anchor="middle" class="label" font-weight="bold">Reject: 403/404/409</text>
  <text x="750" y="725" text-anchor="middle" class="small">Forbidden, not found,</text>
  <text x="750" y="740" text-anchor="middle" class="small">or conflict</text>

  <path d="M 600 720 L 650 720" class="reject-arrow"/>
  <path d="M 450 780 L 450 810" class="success-arrow"/>

  <!-- Layer 5: Sanitization -->
  <text x="50" y="830" class="label" font-weight="bold">Layer 5: Sanitization</text>

  <rect x="300" y="840" width="300" height="80" class="validate-box" rx="5"/>
  <text x="450" y="865" text-anchor="middle" class="label" font-weight="bold">Data Sanitization</text>
  <text x="450" y="885" text-anchor="middle" class="small">✓ Remove internal-only fields</text>
  <text x="450" y="900" text-anchor="middle" class="small">✓ Escape HTML/JavaScript</text>
  <text x="450" y="915" text-anchor="middle" class="small">✓ Normalize Unicode</text>

  <path d="M 450 920 L 450 950" class="success-arrow"/>

  <!-- Success: Process Request -->
  <rect x="350" y="950" width="200" height="60" class="validate-box" rx="5"/>
  <text x="450" y="975" text-anchor="middle" class="label" font-weight="bold">Process Request</text>
  <text x="450" y="995" text-anchor="middle" class="small">Execute business logic</text>

  <!-- Validation Examples (Left Side) -->
  <rect x="20" y="180" width="250" height="640" fill="#f9f9f9" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="145" y="205" text-anchor="middle" class="label" font-weight="bold">Validation Examples</text>

  <!-- DID Validation -->
  <text x="30" y="230" class="small" font-weight="bold">DID Validation:</text>
  <text x="30" y="250" class="small" fill="#4caf50">✓ did:plc:z72i7hdynmk6r22z27h6tvur</text>
  <text x="30" y="265" class="small" fill="#4caf50">✓ did:web:pds.garazyk.xyz</text>
  <text x="30" y="280" class="small" fill="#f44336">✗ did:plc:UPPERCASE</text>
  <text x="30" y="295" class="small" fill="#f44336">✗ did:unknown:test</text>

  <!-- Handle Validation -->
  <text x="30" y="320" class="small" font-weight="bold">Handle Validation:</text>
  <text x="30" y="340" class="small" fill="#4caf50">✓ alice.bsky.social</text>
  <text x="30" y="355" class="small" fill="#4caf50">✓ user-123.example.com</text>
  <text x="30" y="370" class="small" fill="#f44336">✗ alice (no TLD)</text>
  <text x="30" y="385" class="small" fill="#f44336">✗ alice@example.com (email)</text>

  <!-- CID Validation -->
  <text x="30" y="410" class="small" font-weight="bold">CID Validation:</text>
  <text x="30" y="430" class="small" fill="#4caf50">✓ bafyreib2rxk3rh...</text>
  <text x="30" y="445" class="small" fill="#f44336">✗ Qm... (CIDv0)</text>
  <text x="30" y="460" class="small" fill="#f44336">✗ invalid-base32</text>

  <!-- MIME Type Validation -->
  <text x="30" y="485" class="small" font-weight="bold">MIME Type:</text>
  <text x="30" y="505" class="small" fill="#4caf50">✓ image/jpeg (allowed)</text>
  <text x="30" y="520" class="small" fill="#4caf50">✓ video/mp4 (allowed)</text>
  <text x="30" y="535" class="small" fill="#f44336">✗ application/x-msdownload</text>
  <text x="30" y="550" class="small" fill="#f44336">✗ text/html (XSS risk)</text>

  <!-- Size Limits -->
  <text x="30" y="575" class="small" font-weight="bold">Size Limits:</text>
  <text x="30" y="595" class="small">• Images: 5 MB</text>
  <text x="30" y="610" class="small">• Videos: 50 MB</text>
  <text x="30" y="625" class="small">• Audio: 10 MB</text>
  <text x="30" y="640" class="small">• Documents: 10 MB</text>

  <!-- SQL Injection Prevention -->
  <text x="30" y="665" class="small" font-weight="bold">SQL Injection Prevention:</text>
  <text x="30" y="685" class="small" fill="#4caf50">✓ Parameterized queries</text>
  <text x="30" y="700" class="small" fill="#4caf50">✓ Whitelist table names</text>
  <text x="30" y="715" class="small" fill="#f44336">✗ String concatenation</text>
  <text x="30" y="730" class="small" fill="#f44336">✗ Dynamic SQL without validation</text>

  <!-- Path Traversal Prevention -->
  <text x="30" y="755" class="small" font-weight="bold">Path Traversal:</text>
  <text x="30" y="775" class="small" fill="#4caf50">✓ Validate resolved path</text>
  <text x="30" y="790" class="small" fill="#4caf50">✓ Check path prefix</text>
  <text x="30" y="805" class="small" fill="#f44336">✗ ../../../etc/passwd</text>
</svg>
