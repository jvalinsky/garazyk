<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .client { fill: #e3f2fd; }
      .server { fill: #fff3e0; }
      .storage { fill: #f3e5f5; }
      .text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .title { font-size: 16px; font-weight: bold; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 12px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="text title">PLC Directory Architecture</text>

  <!-- PDS Clients -->
  <rect x="50" y="80" width="150" height="80" class="box client" rx="5"/>
  <text x="125" y="110" text-anchor="middle" class="text title">PDS Instance #1</text>
  <text x="125" y="130" text-anchor="middle" class="text">DIDPLCResolver</text>
  <text x="125" y="145" text-anchor="middle" class="label">Cache: 1000 DIDs</text>

  <rect x="250" y="80" width="150" height="80" class="box client" rx="5"/>
  <text x="325" y="110" text-anchor="middle" class="text title">PDS Instance #2</text>
  <text x="325" y="130" text-anchor="middle" class="text">DIDPLCResolver</text>
  <text x="325" y="145" text-anchor="middle" class="label">Cache: 1000 DIDs</text>

  <rect x="450" y="80" width="150" height="80" class="box client" rx="5"/>
  <text x="525" y="110" text-anchor="middle" class="text title">PDS Instance #3</text>
  <text x="525" y="130" text-anchor="middle" class="text">DIDPLCResolver</text>
  <text x="525" y="145" text-anchor="middle" class="label">Cache: 1000 DIDs</text>

  <!-- Load Balancer -->
  <rect x="250" y="220" width="300" height="60" class="box server" rx="5"/>
  <text x="400" y="245" text-anchor="middle" class="text title">Load Balancer / DNS</text>
  <text x="400" y="265" text-anchor="middle" class="label">plc.directory</text>

  <!-- Arrows from clients to load balancer -->
  <path d="M 125 160 L 125 220" class="arrow"/>
  <text x="135" y="190" class="label">HTTPS</text>
  
  <path d="M 325 160 L 325 220" class="arrow"/>
  <text x="335" y="190" class="label">HTTPS</text>
  
  <path d="M 525 160 L 525 220" class="arrow"/>
  <text x="535" y="190" class="label">HTTPS</text>

  <!-- PLC Servers -->
  <rect x="100" y="340" width="150" height="100" class="box server" rx="5"/>
  <text x="175" y="365" text-anchor="middle" class="text title">PLC Server #1</text>
  <text x="175" y="385" text-anchor="middle" class="text">campagnola</text>
  <text x="175" y="405" text-anchor="middle" class="label">GET /{did}</text>
  <text x="175" y="420" text-anchor="middle" class="label">POST /{did}</text>
  <text x="175" y="435" text-anchor="middle" class="label">GET /{did}/log/audit</text>

  <rect x="325" y="340" width="150" height="100" class="box server" rx="5"/>
  <text x="400" y="365" text-anchor="middle" class="text title">PLC Server #2</text>
  <text x="400" y="385" text-anchor="middle" class="text">campagnola</text>
  <text x="400" y="405" text-anchor="middle" class="label">GET /{did}</text>
  <text x="400" y="420" text-anchor="middle" class="label">POST /{did}</text>
  <text x="400" y="435" text-anchor="middle" class="label">GET /{did}/log/audit</text>

  <rect x="550" y="340" width="150" height="100" class="box server" rx="5"/>
  <text x="625" y="365" text-anchor="middle" class="text title">PLC Server #3</text>
  <text x="625" y="385" text-anchor="middle" class="text">campagnola</text>
  <text x="625" y="405" text-anchor="middle" class="label">GET /{did}</text>
  <text x="625" y="420" text-anchor="middle" class="label">POST /{did}</text>
  <text x="625" y="435" text-anchor="middle" class="label">GET /{did}/log/audit</text>

  <!-- Arrows from load balancer to servers -->
  <path d="M 300 280 L 175 340" class="arrow"/>
  <text x="220" y="310" class="label">Health Check</text>
  
  <path d="M 400 280 L 400 340" class="arrow"/>
  <text x="410" y="310" class="label">Round Robin</text>
  
  <path d="M 500 280 L 625 340" class="arrow"/>
  <text x="540" y="310" class="label">Failover</text>

  <!-- Shared Database -->
  <rect x="275" y="500" width="250" height="80" class="box storage" rx="5"/>
  <text x="400" y="525" text-anchor="middle" class="text title">Shared Database</text>
  <text x="400" y="545" text-anchor="middle" class="text">PostgreSQL / SQLite</text>
  <text x="400" y="565" text-anchor="middle" class="label">Operation Log + DID Index</text>

  <!-- Arrows from servers to database -->
  <path d="M 175 440 L 300 500" class="arrow"/>
  <path d="M 400 440 L 400 500" class="arrow"/>
  <path d="M 625 440 L 500 500" class="arrow"/>

  <!-- Legend -->
  <rect x="620" y="500" width="160" height="90" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="700" y="520" text-anchor="middle" class="text" font-weight="bold">Legend</text>
  
  <rect x="630" y="530" width="30" height="15" class="box client" rx="2"/>
  <text x="665" y="542" class="label">PDS Client</text>
  
  <rect x="630" y="550" width="30" height="15" class="box server" rx="2"/>
  <text x="665" y="562" class="label">PLC Server</text>
  
  <rect x="630" y="570" width="30" height="15" class="box storage" rx="2"/>
  <text x="665" y="582" class="label">Storage</text>
</svg>
