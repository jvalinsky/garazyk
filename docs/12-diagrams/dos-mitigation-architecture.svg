<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1100" height="1000" viewBox="0 0 1100 1000">
  <defs>
    <style>
      .network-box { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .app-box { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .resource-box { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .protection-box { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .shield { fill: #00cc00; opacity: 0.2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" class="title" font-size="20">DoS Protection Architecture (Defense in Depth)</text>

  <!-- Attack Vector -->
  <rect x="50" y="60" width="200" height="80" class="network-box" rx="5" stroke-dasharray="5,5"/>
  <text x="150" y="85" text-anchor="middle" class="title">Attack Vectors</text>
  <text x="150" y="105" text-anchor="middle" class="label">• Connection Flooding</text>
  <text x="150" y="120" text-anchor="middle" class="label">• Request Flooding</text>
  <text x="150" y="135" text-anchor="middle" class="label">• Slowloris</text>

  <!-- Arrow to Layer 1 -->
  <path d="M 250 100 L 350 100" class="arrow"/>

  <!-- Layer 1: Network Layer -->
  <rect x="350" y="60" width="700" height="180" class="network-box" rx="5"/>
  <text x="700" y="85" text-anchor="middle" class="title">Layer 1: Network Protection</text>

  <!-- Connection Limits -->
  <rect x="380" y="100" width="300" height="120" class="protection-box" rx="5"/>
  <text x="530" y="120" text-anchor="middle" class="title">Connection Limits</text>
  <text x="530" y="140" text-anchor="middle" class="label">• Max 64 concurrent requests</text>
  <text x="530" y="155" text-anchor="middle" class="label">• Concurrency semaphore</text>
  <text x="530" y="170" text-anchor="middle" class="label">• Header timeout: 5 seconds</text>
  <text x="530" y="185" text-anchor="middle" class="label">• Max header size: 16 KB</text>
  <text x="530" y="200" text-anchor="middle" class="label">• Max body size: 50 MB</text>

  <!-- Proxy Protection -->
  <rect x="720" y="100" width="300" height="120" class="protection-box" rx="5"/>
  <text x="870" y="120" text-anchor="middle" class="title">Reverse Proxy (nginx)</text>
  <text x="870" y="140" text-anchor="middle" class="label">• TLS termination</text>
  <text x="870" y="155" text-anchor="middle" class="label">• Connection pooling</text>
  <text x="870" y="170" text-anchor="middle" class="label">• Rate limiting (100/min)</text>
  <text x="870" y="185" text-anchor="middle" class="label">• Request buffering</text>
  <text x="870" y="200" text-anchor="middle" class="label">• X-Forwarded-For headers</text>

  <!-- Arrow to Layer 2 -->
  <path d="M 700 240 L 700 280" class="arrow"/>

  <!-- Layer 2: Application Layer -->
  <rect x="350" y="280" width="700" height="220" class="app-box" rx="5"/>
  <text x="700" y="305" text-anchor="middle" class="title">Layer 2: Application Protection</text>

  <!-- Rate Limiting -->
  <rect x="380" y="320" width="200" height="160" class="protection-box" rx="5"/>
  <text x="480" y="340" text-anchor="middle" class="title">Rate Limiting</text>
  <text x="480" y="360" text-anchor="middle" class="label">DID-Based:</text>
  <text x="480" y="375" text-anchor="middle" class="label">• 5000 requests/hour</text>
  <text x="480" y="395" text-anchor="middle" class="label">IP-Based:</text>
  <text x="480" y="410" text-anchor="middle" class="label">• 100 requests/minute</text>
  <text x="480" y="430" text-anchor="middle" class="label">Blob Uploads:</text>
  <text x="480" y="445" text-anchor="middle" class="label">• 50 uploads/hour</text>
  <text x="480" y="465" text-anchor="middle" class="label">SQLite persistence</text>

  <!-- Input Validation -->
  <rect x="610" y="320" width="200" height="160" class="protection-box" rx="5"/>
  <text x="710" y="340" text-anchor="middle" class="title">Input Validation</text>
  <text x="710" y="360" text-anchor="middle" class="label">• Parameter validation</text>
  <text x="710" y="375" text-anchor="middle" class="label">• Query limit enforcement</text>
  <text x="710" y="390" text-anchor="middle" class="label">• DID format checks</text>
  <text x="710" y="405" text-anchor="middle" class="label">• Pagination required</text>
  <text x="710" y="420" text-anchor="middle" class="label">• Max results: 100-1000</text>
  <text x="710" y="435" text-anchor="middle" class="label">• Early auth verification</text>
  <text x="710" y="450" text-anchor="middle" class="label">• Fail fast on errors</text>

  <!-- Auth Protection -->
  <rect x="840" y="320" width="180" height="160" class="protection-box" rx="5"/>
  <text x="930" y="340" text-anchor="middle" class="title">Auth Protection</text>
  <text x="930" y="360" text-anchor="middle" class="label">• JWT verification</text>
  <text x="930" y="375" text-anchor="middle" class="label">• DPoP validation</text>
  <text x="930" y="390" text-anchor="middle" class="label">• Token expiration</text>
  <text x="930" y="405" text-anchor="middle" class="label">• Nonce tracking</text>
  <text x="930" y="420" text-anchor="middle" class="label">• Early rejection</text>

  <!-- Arrow to Layer 3 -->
  <path d="M 700 500 L 700 540" class="arrow"/>

  <!-- Layer 3: Resource Layer -->
  <rect x="350" y="540" width="700" height="220" class="resource-box" rx="5"/>
  <text x="700" y="565" text-anchor="middle" class="title">Layer 3: Resource Protection</text>

  <!-- Memory Limits -->
  <rect x="380" y="580" width="200" height="160" class="protection-box" rx="5"/>
  <text x="480" y="600" text-anchor="middle" class="title">Memory Limits</text>
  <text x="480" y="620" text-anchor="middle" class="label">Output Queue:</text>
  <text x="480" y="635" text-anchor="middle" class="label">• 10 MB per connection</text>
  <text x="480" y="655" text-anchor="middle" class="label">Chunk Sizes:</text>
  <text x="480" y="670" text-anchor="middle" class="label">• File chunks: 64 KB</text>
  <text x="480" y="685" text-anchor="middle" class="label">• Generated: 64 KB</text>
  <text x="480" y="705" text-anchor="middle" class="label">Backpressure:</text>
  <text x="480" y="720" text-anchor="middle" class="label">• Pause reading on full</text>

  <!-- Database Limits -->
  <rect x="610" y="580" width="200" height="160" class="protection-box" rx="5"/>
  <text x="710" y="600" text-anchor="middle" class="title">Database Limits</text>
  <text x="710" y="620" text-anchor="middle" class="label">• Connection pooling</text>
  <text x="710" y="635" text-anchor="middle" class="label">• Prepared statements</text>
  <text x="710" y="650" text-anchor="middle" class="label">• WAL mode</text>
  <text x="710" y="665" text-anchor="middle" class="label">• Query timeouts</text>
  <text x="710" y="680" text-anchor="middle" class="label">• Result set limits</text>
  <text x="710" y="695" text-anchor="middle" class="label">• Transaction batching</text>

  <!-- Firehose Limits -->
  <rect x="840" y="580" width="180" height="160" class="protection-box" rx="5"/>
  <text x="930" y="600" text-anchor="middle" class="title">Firehose Limits</text>
  <text x="930" y="620" text-anchor="middle" class="label">Subscriber Queue:</text>
  <text x="930" y="635" text-anchor="middle" class="label">• 512 messages</text>
  <text x="930" y="650" text-anchor="middle" class="label">• 16 MB bytes</text>
  <text x="930" y="670" text-anchor="middle" class="label">Replay:</text>
  <text x="930" y="685" text-anchor="middle" class="label">• 10K events max</text>
  <text x="930" y="700" text-anchor="middle" class="label">• Batch size: 100</text>
  <text x="930" y="715" text-anchor="middle" class="label">• Slow consumer</text>
  <text x="930" y="730" text-anchor="middle" class="label">  disconnect</text>

  <!-- Monitoring -->
  <rect x="350" y="790" width="700" height="100" class="protection-box" rx="5" fill="#ffffcc"/>
  <text x="700" y="815" text-anchor="middle" class="title">Monitoring &amp; Alerting</text>
  <text x="700" y="835" text-anchor="middle" class="label">• Rate limit violations logged • Queue size tracking • Connection metrics</text>
  <text x="700" y="855" text-anchor="middle" class="label">• Slow consumer detection • Response time percentiles • Error rate monitoring</text>
  <text x="700" y="875" text-anchor="middle" class="label">• Alert on sustained throttling • Track attack patterns • Performance dashboards</text>

  <!-- Legend -->
  <rect x="50" y="910" width="1000" height="80" class="network-box" rx="5" fill="#f9f9f9"/>
  <text x="550" y="930" text-anchor="middle" class="title">Defense Strategy: Multiple Independent Layers</text>
  <text x="550" y="950" text-anchor="middle" class="label">Each layer provides protection even if other layers fail</text>
  <text x="550" y="970" text-anchor="middle" class="label">Attackers must bypass ALL layers to cause damage</text>

  <!-- Shield Icons -->
  <circle cx="100" cy="100" r="30" class="shield"/>
  <text x="100" y="110" text-anchor="middle" class="title" font-size="24">🛡️</text>

  <circle cx="700" cy="170" r="40" class="shield"/>
  <text x="700" y="180" text-anchor="middle" class="title" font-size="32">🛡️</text>

  <circle cx="700" cy="390" r="40" class="shield"/>
  <text x="700" y="400" text-anchor="middle" class="title" font-size="32">🛡️</text>

  <circle cx="700" cy="650" r="40" class="shield"/>
  <text x="700" y="660" text-anchor="middle" class="title" font-size="32">🛡️</text>

</svg>
