<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #2c3e50; }
      .subtitle { font: 14px sans-serif; fill: #34495e; }
      .label { font: 12px sans-serif; fill: #2c3e50; }
      .small { font: 10px sans-serif; fill: #7f8c8d; }
      .code { font: 10px monospace; fill: #2c3e50; }
      .box { fill: #ecf0f1; stroke: #34495e; stroke-width: 2; }
      .test-box { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
      .server-box { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
      .db-box { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
      .client-box { fill: #27ae60; stroke: #229954; stroke-width: 2; }
      .plc-box { fill: #f39c12; stroke: #d68910; stroke-width: 2; }
      .arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .bi-arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead-start); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7f8c8d" />
    </marker>
    <marker id="arrowhead-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#7f8c8d" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">End-to-End Test Architecture</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Integration Test Environment</text>

  <!-- Test Layer -->
  <g>
    <rect x="50" y="80" width="800" height="120" class="box" rx="5"/>
    <text x="450" y="105" text-anchor="middle" class="label" font-weight="bold">Test Layer (XCTestCase)</text>
    
    <!-- OAuth Integration Test -->
    <rect x="70" y="120" width="230" height="70" class="test-box" rx="3"/>
    <text x="185" y="140" text-anchor="middle" class="label" fill="white">OAuthIntegrationTests</text>
    <text x="185" y="158" text-anchor="middle" class="small" fill="white">• setUp: Create server</text>
    <text x="185" y="173" text-anchor="middle" class="small" fill="white">• testFullOAuthFlow</text>
    <text x="185" y="188" text-anchor="middle" class="small" fill="white">• tearDown: Cleanup</text>

    <!-- Firehose Integration Test -->
    <rect x="320" y="120" width="230" height="70" class="test-box" rx="3"/>
    <text x="435" y="140" text-anchor="middle" class="label" fill="white">FirehoseIntegrationTests</text>
    <text x="435" y="158" text-anchor="middle" class="small" fill="white">• setUp: Init controller</text>
    <text x="435" y="173" text-anchor="middle" class="small" fill="white">• testBroadcastCommit</text>
    <text x="435" y="188" text-anchor="middle" class="small" fill="white">• tearDown: Stop server</text>

    <!-- PLC Integration Test -->
    <rect x="570" y="120" width="230" height="70" class="test-box" rx="3"/>
    <text x="685" y="140" text-anchor="middle" class="label" fill="white">PLCIntegrationTests</text>
    <text x="685" y="158" text-anchor="middle" class="small" fill="white">• setUp: Start PLC server</text>
    <text x="685" y="173" text-anchor="middle" class="small" fill="white">• testDIDResolution</text>
    <text x="685" y="188" text-anchor="middle" class="small" fill="white">• tearDown: Docker down</text>
  </g>

  <!-- Arrows to Server Layer -->
  <path d="M 185 190 L 185 240" class="arrow"/>
  <path d="M 435 190 L 435 240" class="arrow"/>
  <path d="M 685 190 L 685 240" class="arrow"/>

  <!-- Server Layer -->
  <g>
    <rect x="50" y="240" width="800" height="180" class="box" rx="5"/>
    <text x="450" y="265" text-anchor="middle" class="label" font-weight="bold">Server Layer (Real Components)</text>
    
    <!-- HTTP Server -->
    <rect x="70" y="280" width="180" height="120" class="server-box" rx="3"/>
    <text x="160" y="300" text-anchor="middle" class="label" fill="white">HttpServer</text>
    <text x="160" y="318" text-anchor="middle" class="small" fill="white">Port: 0 (random)</text>
    <text x="160" y="333" text-anchor="middle" class="small" fill="white">Host: 127.0.0.1</text>
    <rect x="80" y="345" width="160" height="45" class="box" rx="2"/>
    <text x="160" y="360" text-anchor="middle" class="code">OAuth2Handler</text>
    <text x="160" y="373" text-anchor="middle" class="code">XrpcDispatcher</text>
    <text x="160" y="386" text-anchor="middle" class="code">WebSocketServer</text>

    <!-- PDS Controller -->
    <rect x="270" y="280" width="180" height="120" class="server-box" rx="3"/>
    <text x="360" y="300" text-anchor="middle" class="label" fill="white">PDSController</text>
    <text x="360" y="318" text-anchor="middle" class="small" fill="white">Full PDS Instance</text>
    <rect x="280" y="330" width="160" height="60" class="box" rx="2"/>
    <text x="360" y="345" text-anchor="middle" class="code">AccountService</text>
    <text x="360" y="358" text-anchor="middle" class="code">RecordService</text>
    <text x="360" y="371" text-anchor="middle" class="code">BlobService</text>
    <text x="360" y="384" text-anchor="middle" class="code">RepositoryService</text>

    <!-- WebSocket Handler -->
    <rect x="470" y="280" width="180" height="120" class="server-box" rx="3"/>
    <text x="560" y="300" text-anchor="middle" class="label" fill="white">SubscribeReposHandler</text>
    <text x="560" y="318" text-anchor="middle" class="small" fill="white">Firehose Events</text>
    <rect x="480" y="330" width="160" height="60" class="box" rx="2"/>
    <text x="560" y="345" text-anchor="middle" class="code">attachedConnections</text>
    <text x="560" y="358" text-anchor="middle" class="code">broadcastCommit()</text>
    <text x="560" y="371" text-anchor="middle" class="code">EventFormatter</text>
    <text x="560" y="384" text-anchor="middle" class="code">CAR encoding</text>

    <!-- PLC Server (Docker) -->
    <rect x="670" y="280" width="160" height="120" class="plc-box" rx="3"/>
    <text x="750" y="300" text-anchor="middle" class="label" fill="white">PLC Server</text>
    <text x="750" y="318" text-anchor="middle" class="small" fill="white">Docker Container</text>
    <rect x="680" y="330" width="140" height="60" class="box" rx="2"/>
    <text x="750" y="345" text-anchor="middle" class="code">Port: 2582</text>
    <text x="750" y="358" text-anchor="middle" class="code">PostgreSQL DB</text>
    <text x="750" y="371" text-anchor="middle" class="code">DID operations</text>
    <text x="750" y="384" text-anchor="middle" class="code">Audit log</text>
  </g>

  <!-- Arrows to Database Layer -->
  <path d="M 160 400 L 160 450" class="arrow"/>
  <path d="M 360 400 L 360 450" class="arrow"/>
  <path d="M 560 400 L 560 450" class="arrow"/>
  <path d="M 750 400 L 750 450" class="arrow"/>

  <!-- Database Layer -->
  <g>
    <rect x="50" y="450" width="800" height="120" class="box" rx="5"/>
    <text x="450" y="475" text-anchor="middle" class="label" font-weight="bold">Database Layer (Temporary Storage)</text>
    
    <!-- OAuth DB -->
    <rect x="70" y="490" width="180" height="70" class="db-box" rx="3"/>
    <text x="160" y="510" text-anchor="middle" class="label" fill="white">PDSDatabase</text>
    <text x="160" y="528" text-anchor="middle" class="small" fill="white">SQLite (in-memory)</text>
    <text x="160" y="543" text-anchor="middle" class="small" fill="white">OAuth clients</text>
    <text x="160" y="558" text-anchor="middle" class="small" fill="white">Sessions</text>

    <!-- Service DB -->
    <rect x="270" y="490" width="180" height="70" class="db-box" rx="3"/>
    <text x="360" y="510" text-anchor="middle" class="label" fill="white">ServiceDatabases</text>
    <text x="360" y="528" text-anchor="middle" class="small" fill="white">Temp directory</text>
    <text x="360" y="543" text-anchor="middle" class="small" fill="white">Accounts, DIDs</text>
    <text x="360" y="558" text-anchor="middle" class="small" fill="white">Sequencer</text>

    <!-- Actor DB Pool -->
    <rect x="470" y="490" width="180" height="70" class="db-box" rx="3"/>
    <text x="560" y="510" text-anchor="middle" class="label" fill="white">DatabasePool</text>
    <text x="560" y="528" text-anchor="middle" class="small" fill="white">Per-user repos</text>
    <text x="560" y="543" text-anchor="middle" class="small" fill="white">MST data</text>
    <text x="560" y="558" text-anchor="middle" class="small" fill="white">Commits</text>

    <!-- PLC PostgreSQL -->
    <rect x="670" y="490" width="160" height="70" class="db-box" rx="3"/>
    <text x="750" y="510" text-anchor="middle" class="label" fill="white">PostgreSQL</text>
    <text x="750" y="528" text-anchor="middle" class="small" fill="white">Docker volume</text>
    <text x="750" y="543" text-anchor="middle" class="small" fill="white">PLC operations</text>
    <text x="750" y="558" text-anchor="middle" class="small" fill="white">DID documents</text>
  </g>

  <!-- Mock Client Layer -->
  <g>
    <rect x="50" y="600" width="800" height="100" class="box" rx="5"/>
    <text x="450" y="625" text-anchor="middle" class="label" font-weight="bold">Mock Client Layer</text>
    
    <!-- HTTP Client -->
    <rect x="100" y="640" width="200" height="50" class="client-box" rx="3"/>
    <text x="200" y="660" text-anchor="middle" class="label" fill="white">NSURLSession</text>
    <text x="200" y="678" text-anchor="middle" class="small" fill="white">HTTP requests to server</text>

    <!-- WebSocket Mock -->
    <rect x="350" y="640" width="200" height="50" class="client-box" rx="3"/>
    <text x="450" y="660" text-anchor="middle" class="label" fill="white">MockWebSocketConnection</text>
    <text x="450" y="678" text-anchor="middle" class="small" fill="white">Captures firehose messages</text>

    <!-- PLC Client -->
    <rect x="600" y="640" width="200" height="50" class="client-box" rx="3"/>
    <text x="700" y="660" text-anchor="middle" class="label" fill="white">DIDPLCResolver</text>
    <text x="700" y="678" text-anchor="middle" class="small" fill="white">Resolves DIDs via PLC</text>
  </g>

  <!-- Bidirectional arrows -->
  <path d="M 200 640 L 160 400" class="bi-arrow"/>
  <path d="M 450 640 L 560 400" class="bi-arrow"/>
  <path d="M 700 640 L 750 400" class="bi-arrow"/>

  <!-- Legend -->
  <g transform="translate(50, 720)">
    <text x="0" y="0" class="label" font-weight="bold">Test Flow:</text>
    <text x="0" y="18" class="small">1. Test setUp creates real server instances with temporary databases</text>
    <text x="0" y="33" class="small">2. Test makes HTTP/WebSocket requests to server</text>
    <text x="0" y="48" class="small">3. Server processes requests using real components</text>
    <text x="0" y="63" class="small">4. Test verifies end-to-end behavior and data persistence</text>
    <text x="0" y="78" class="small">5. Test tearDown cleans up all resources</text>
  </g>
</svg>
