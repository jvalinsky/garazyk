<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .decision { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .warning { fill: #ffffcc; stroke: #ff9900; stroke-width: 2; }
      .error { fill: #ffe6e6; stroke: #cc0000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .warning-arrow { stroke: #ff9900; stroke-width: 2; fill: none; marker-end: url(#warning-arrowhead); }
      .error-arrow { stroke: #cc0000; stroke-width: 2; fill: none; marker-end: url(#error-arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="warning-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9900" />
    </marker>
    <marker id="error-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#cc0000" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title">Backpressure Flow Control</text>

  <!-- Commit broadcast -->
  <rect x="300" y="60" width="300" height="60" class="box" rx="5"/>
  <text x="450" y="85" class="text">CommitBroadcaster</text>
  <text x="450" y="105" class="label">broadcastCommit called</text>

  <!-- Arrow -->
  <path d="M 450 120 L 450 150" class="arrow"/>

  <!-- Create event -->
  <rect x="300" y="150" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="175" class="text">Create firehose event</text>
  <text x="450" y="195" class="label">Format and encode as JSON</text>

  <!-- Arrow -->
  <path d="M 450 210 L 450 240" class="arrow"/>

  <!-- For each subscription -->
  <polygon points="450,240 550,290 450,340 350,290" class="decision"/>
  <text x="450" y="290" class="text">For each</text>
  <text x="450" y="305" class="label">subscription</text>

  <!-- Arrow -->
  <path d="M 450 340 L 450 370" class="arrow"/>

  <!-- Check buffer level -->
  <polygon points="450,370 550,420 450,470 350,420" class="decision"/>
  <text x="450" y="420" class="text">Check send</text>
  <text x="450" y="435" class="label">buffer level</text>

  <!-- Buffer OK path -->
  <path d="M 550 420 L 700 420" class="arrow"/>
  <text x="620" y="415" class="label">&lt; 70%</text>
  <rect x="700" y="395" width="150" height="50" class="success" rx="5"/>
  <text x="775" y="420" class="text">Send event</text>
  <text x="775" y="435" class="label">immediately</text>

  <!-- Buffer warning path -->
  <path d="M 450 470 L 450 500" class="warning-arrow"/>
  <text x="470" y="490" class="label">70-90%</text>

  <!-- Apply backpressure -->
  <rect x="300" y="500" width="300" height="60" class="warning" rx="5"/>
  <text x="450" y="525" class="text">Apply backpressure</text>
  <text x="450" y="545" class="label">Pause sending to client</text>

  <!-- Arrow -->
  <path d="M 450 560 L 450 590" class="arrow"/>

  <!-- Queue message -->
  <rect x="300" y="590" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="615" class="text">Queue message in buffer</text>
  <text x="450" y="635" class="label">Wait for buffer to drain</text>

  <!-- Arrow -->
  <path d="M 450 650 L 450 680" class="arrow"/>

  <!-- Start drain timer -->
  <rect x="300" y="680" width="300" height="60" class="process" rx="5"/>
  <text x="450" y="705" class="text">Start drain timer</text>
  <text x="450" y="725" class="label">Check every 100ms</text>

  <!-- Arrow -->
  <path d="M 450 740 L 450 770" class="arrow"/>

  <!-- Monitor buffer -->
  <polygon points="450,770 550,820 450,870 350,820" class="decision"/>
  <text x="450" y="820" class="text">Buffer</text>
  <text x="450" y="835" class="label">drained?</text>

  <!-- Not drained -->
  <path d="M 350 820 L 200 820 L 200 770 L 350 770" class="warning-arrow"/>
  <text x="250" y="800" class="label">No</text>

  <!-- Drained -->
  <path d="M 450 870 L 450 900" class="arrow"/>
  <text x="470" y="890" class="label">Yes</text>

  <!-- Release backpressure -->
  <rect x="300" y="900" width="300" height="60" class="success" rx="5"/>
  <text x="450" y="925" class="text">Release backpressure</text>
  <text x="450" y="945" class="label">Resume sending to client</text>

  <!-- Arrow -->
  <path d="M 450 960 L 450 990" class="arrow"/>

  <!-- Continue -->
  <rect x="300" y="990" width="300" height="60" class="success" rx="5"/>
  <text x="450" y="1015" class="text">Continue broadcasting</text>
  <text x="450" y="1035" class="label">to next subscription</text>

  <!-- Buffer overflow path -->
  <path d="M 350 420 L 150 420" class="error-arrow"/>
  <text x="240" y="415" class="label">> 90%</text>
  <rect x="30" y="395" width="120" height="50" class="error" rx="5"/>
  <text x="90" y="420" class="text">Close</text>
  <text x="90" y="435" class="label">connection</text>

  <!-- Legend -->
  <text x="50" y="1080" class="label" style="text-anchor: start; font-weight: bold;">Legend:</text>
  <rect x="50" y="1090" width="15" height="15" class="success" rx="2"/>
  <text x="75" y="1102" class="label" style="text-anchor: start;">Normal flow</text>
  
  <rect x="200" y="1090" width="15" height="15" class="warning" rx="2"/>
  <text x="225" y="1102" class="label" style="text-anchor: start;">Backpressure applied</text>
  
  <rect x="450" y="1090" width="15" height="15" class="error" rx="2"/>
  <text x="475" y="1102" class="label" style="text-anchor: start;">Connection closed</text>
</svg>
