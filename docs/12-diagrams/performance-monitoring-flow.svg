<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="1100" viewBox="0 0 1000 1100">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .source-box { fill: #e6f3ff; stroke: #0066cc; stroke-width: 2; }
      .tool-box { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .metrics-box { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .analysis-box { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .action-box { fill: #e6ffe6; stroke: #00cc00; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .feedback-arrow { stroke: #00cc00; stroke-width: 2; fill: none; marker-end: url(#arrowhead-feedback); stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-feedback" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00cc00" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title" font-size="20">Performance Monitoring Flow</text>

  <!-- ===== SECTION 1: DATA SOURCES ===== -->
  <text x="50" y="70" class="title" font-size="14">1. Performance Data Sources</text>

  <!-- Request Timing -->
  <rect x="50" y="90" width="180" height="80" class="source-box" rx="5"/>
  <text x="140" y="115" text-anchor="middle" class="text">Request Timing</text>
  <text x="140" y="135" text-anchor="middle" class="label">NSTimeInterval</text>
  <text x="140" y="150" text-anchor="middle" class="label">Start/End timestamps</text>
  <text x="140" y="165" text-anchor="middle" class="label">Duration tracking</text>

  <!-- Database Queries -->
  <rect x="260" y="90" width="180" height="80" class="source-box" rx="5"/>
  <text x="350" y="115" text-anchor="middle" class="text">Database Queries</text>
  <text x="350" y="135" text-anchor="middle" class="label">sqlite3_trace_v2</text>
  <text x="350" y="150" text-anchor="middle" class="label">Query duration</text>
  <text x="350" y="165" text-anchor="middle" class="label">Slow query logging</text>

  <!-- Memory Usage -->
  <rect x="470" y="90" width="180" height="80" class="source-box" rx="5"/>
  <text x="560" y="115" text-anchor="middle" class="text">Memory Usage</text>
  <text x="560" y="135" text-anchor="middle" class="label">task_info()</text>
  <text x="560" y="150" text-anchor="middle" class="label">phys_footprint</text>
  <text x="560" y="165" text-anchor="middle" class="label">Allocation tracking</text>

  <!-- System Resources -->
  <rect x="680" y="90" width="180" height="80" class="source-box" rx="5"/>
  <text x="770" y="115" text-anchor="middle" class="text">System Resources</text>
  <text x="770" y="135" text-anchor="middle" class="label">CPU usage</text>
  <text x="770" y="150" text-anchor="middle" class="label">I/O wait times</text>
  <text x="770" y="165" text-anchor="middle" class="label">Thread contention</text>

  <!-- Arrows down from sources -->
  <path d="M 140 170 L 140 220" class="arrow"/>
  <path d="M 350 170 L 350 220" class="arrow"/>
  <path d="M 560 170 L 560 220" class="arrow"/>
  <path d="M 770 170 L 770 220" class="arrow"/>

  <!-- ===== SECTION 2: PROFILING TOOLS ===== -->
  <text x="50" y="240" class="title" font-size="14">2. Profiling Tools</text>

  <!-- Instruments (macOS) -->
  <rect x="50" y="260" width="200" height="100" class="tool-box" rx="5"/>
  <text x="150" y="285" text-anchor="middle" class="text">Instruments (macOS)</text>
  <text x="150" y="305" text-anchor="middle" class="label">Time Profiler</text>
  <text x="150" y="320" text-anchor="middle" class="label">Allocations</text>
  <text x="150" y="335" text-anchor="middle" class="label">System Trace</text>
  <text x="150" y="350" text-anchor="middle" class="label">Leaks</text>

  <!-- perf (Linux) -->
  <rect x="280" y="260" width="200" height="100" class="tool-box" rx="5"/>
  <text x="380" y="285" text-anchor="middle" class="text">perf (Linux)</text>
  <text x="380" y="305" text-anchor="middle" class="label">perf record -g</text>
  <text x="380" y="320" text-anchor="middle" class="label">perf report</text>
  <text x="380" y="335" text-anchor="middle" class="label">Flame graphs</text>
  <text x="380" y="350" text-anchor="middle" class="label">Call stacks</text>

  <!-- Xcode Profiler -->
  <rect x="510" y="260" width="200" height="100" class="tool-box" rx="5"/>
  <text x="610" y="285" text-anchor="middle" class="text">Xcode Profiler</text>
  <text x="610" y="305" text-anchor="middle" class="label">Product → Profile</text>
  <text x="610" y="320" text-anchor="middle" class="label">Quick profiling</text>
  <text x="610" y="335" text-anchor="middle" class="label">Development mode</text>
  <text x="610" y="350" text-anchor="middle" class="label">Interactive analysis</text>

  <!-- Arrows down from tools -->
  <path d="M 150 360 L 150 400" class="arrow"/>
  <path d="M 380 360 L 380 400" class="arrow"/>
  <path d="M 610 360 L 610 400" class="arrow"/>

  <!-- ===== SECTION 3: METRICS COLLECTION ===== -->
  <text x="50" y="420" class="title" font-size="14">3. Metrics Collection</text>

  <!-- PDSMetrics Singleton -->
  <rect x="100" y="440" width="250" height="100" class="metrics-box" rx="5"/>
  <text x="225" y="465" text-anchor="middle" class="text">PDSMetrics Singleton</text>
  <text x="225" y="485" text-anchor="middle" class="label">os_unfair_lock</text>
  <text x="225" y="500" text-anchor="middle" class="label">Thread-safe counters</text>
  <text x="225" y="515" text-anchor="middle" class="label">HTTP requests by method</text>
  <text x="225" y="530" text-anchor="middle" class="label">Requests by endpoint</text>

  <!-- Arrow right -->
  <path d="M 350 490 L 400 490" class="arrow"/>

  <!-- Latency Tracking -->
  <rect x="400" y="440" width="250" height="100" class="metrics-box" rx="5"/>
  <text x="525" y="465" text-anchor="middle" class="text">Latency Tracking</text>
  <text x="525" y="485" text-anchor="middle" class="label">LatencyTracker</text>
  <text x="525" y="500" text-anchor="middle" class="label">P50, P95, P99</text>
  <text x="525" y="515" text-anchor="middle" class="label">Sliding window samples</text>
  <text x="525" y="530" text-anchor="middle" class="label">Percentile calculation</text>

  <!-- Arrow right -->
  <path d="M 650 490 L 700 490" class="arrow"/>

  <!-- Prometheus Export -->
  <rect x="700" y="440" width="250" height="100" class="metrics-box" rx="5"/>
  <text x="825" y="465" text-anchor="middle" class="text">Prometheus Export</text>
  <text x="825" y="485" text-anchor="middle" class="label">exportPrometheus</text>
  <text x="825" y="500" text-anchor="middle" class="label">Counter metrics</text>
  <text x="825" y="515" text-anchor="middle" class="label">Gauge metrics</text>
  <text x="825" y="530" text-anchor="middle" class="label">HTTP endpoint</text>

  <!-- Arrow down from metrics -->
  <path d="M 500 540 L 500 580" class="arrow"/>

  <!-- ===== SECTION 4: BOTTLENECK DETECTION ===== -->
  <text x="50" y="600" class="title" font-size="14">4. Bottleneck Detection</text>

  <!-- Slow Request Detection -->
  <rect x="50" y="620" width="180" height="90" class="analysis-box" rx="5"/>
  <text x="140" y="645" text-anchor="middle" class="text">Slow Requests</text>
  <text x="140" y="665" text-anchor="middle" class="label">duration &gt; 1.0s</text>
  <text x="140" y="680" text-anchor="middle" class="label">PDS_LOG_HTTP_WARN</text>
  <text x="140" y="695" text-anchor="middle" class="label">Identify hot paths</text>

  <!-- Database Bottlenecks -->
  <rect x="260" y="620" width="180" height="90" class="analysis-box" rx="5"/>
  <text x="350" y="645" text-anchor="middle" class="text">Database Issues</text>
  <text x="350" y="665" text-anchor="middle" class="label">Query &gt; 100ms</text>
  <text x="350" y="680" text-anchor="middle" class="label">Missing indexes</text>
  <text x="350" y="695" text-anchor="middle" class="label">Lock contention</text>

  <!-- Memory Leaks -->
  <rect x="470" y="620" width="180" height="90" class="analysis-box" rx="5"/>
  <text x="560" y="645" text-anchor="middle" class="text">Memory Issues</text>
  <text x="560" y="665" text-anchor="middle" class="label">Growth over time</text>
  <text x="560" y="680" text-anchor="middle" class="label">Retain cycles</text>
  <text x="560" y="695" text-anchor="middle" class="label">Large allocations</text>

  <!-- Slow Consumers -->
  <rect x="680" y="620" width="180" height="90" class="analysis-box" rx="5"/>
  <text x="770" y="645" text-anchor="middle" class="text">Slow Consumers</text>
  <text x="770" y="665" text-anchor="middle" class="label">Firehose backlog</text>
  <text x="770" y="680" text-anchor="middle" class="label">pendingSendCount</text>
  <text x="770" y="695" text-anchor="middle" class="label">Connection throttling</text>

  <!-- Arrows down from detection -->
  <path d="M 140 710 L 140 750" class="arrow"/>
  <path d="M 350 710 L 350 750" class="arrow"/>
  <path d="M 560 710 L 560 750" class="arrow"/>
  <path d="M 770 710 L 770 750" class="arrow"/>

  <!-- ===== SECTION 5: OPTIMIZATION STRATEGIES ===== -->
  <text x="50" y="770" class="title" font-size="14">5. Optimization Strategies</text>

  <!-- Database Optimization -->
  <rect x="50" y="790" width="180" height="100" class="action-box" rx="5"/>
  <text x="140" y="815" text-anchor="middle" class="text">Database</text>
  <text x="140" y="835" text-anchor="middle" class="label">Add indexes</text>
  <text x="140" y="850" text-anchor="middle" class="label">WAL mode</text>
  <text x="140" y="865" text-anchor="middle" class="label">Cache size tuning</text>
  <text x="140" y="880" text-anchor="middle" class="label">Query optimization</text>

  <!-- Caching -->
  <rect x="260" y="790" width="180" height="100" class="action-box" rx="5"/>
  <text x="350" y="815" text-anchor="middle" class="text">Caching</text>
  <text x="350" y="835" text-anchor="middle" class="label">NSCache (L1)</text>
  <text x="350" y="850" text-anchor="middle" class="label">Disk cache (L2)</text>
  <text x="350" y="865" text-anchor="middle" class="label">Lazy loading</text>
  <text x="350" y="880" text-anchor="middle" class="label">Object pooling</text>

  <!-- Concurrency -->
  <rect x="470" y="790" width="180" height="100" class="action-box" rx="5"/>
  <text x="560" y="815" text-anchor="middle" class="text">Concurrency</text>
  <text x="560" y="835" text-anchor="middle" class="label">Reduce lock time</text>
  <text x="560" y="850" text-anchor="middle" class="label">GCD queues</text>
  <text x="560" y="865" text-anchor="middle" class="label">Thread pool sizing</text>
  <text x="560" y="880" text-anchor="middle" class="label">@autoreleasepool</text>

  <!-- Network -->
  <rect x="680" y="790" width="180" height="100" class="action-box" rx="5"/>
  <text x="770" y="815" text-anchor="middle" class="text">Network</text>
  <text x="770" y="835" text-anchor="middle" class="label">Connection reuse</text>
  <text x="770" y="850" text-anchor="middle" class="label">Request batching</text>
  <text x="770" y="865" text-anchor="middle" class="label">Compression</text>
  <text x="770" y="880" text-anchor="middle" class="label">Rate limiting</text>

  <!-- Arrows down from optimization -->
  <path d="M 140 890 L 140 930" class="arrow"/>
  <path d="M 350 890 L 350 930" class="arrow"/>
  <path d="M 560 890 L 560 930" class="arrow"/>
  <path d="M 770 890 L 770 930" class="arrow"/>

  <!-- ===== SECTION 6: VALIDATION ===== -->
  <text x="50" y="950" class="title" font-size="14">6. Validation &amp; Feedback</text>

  <!-- Load Testing -->
  <rect x="150" y="970" width="200" height="80" class="box" rx="5"/>
  <text x="250" y="995" text-anchor="middle" class="text">Load Testing</text>
  <text x="250" y="1015" text-anchor="middle" class="label">Apache Bench (ab)</text>
  <text x="250" y="1030" text-anchor="middle" class="label">wrk with Lua scripts</text>
  <text x="250" y="1045" text-anchor="middle" class="label">Stress testing</text>

  <!-- Arrow right -->
  <path d="M 350 1010 L 400 1010" class="arrow"/>

  <!-- Performance Benchmarks -->
  <rect x="400" y="970" width="200" height="80" class="box" rx="5"/>
  <text x="500" y="995" text-anchor="middle" class="text">Benchmarks</text>
  <text x="500" y="1015" text-anchor="middle" class="label">XCTest measureBlock</text>
  <text x="500" y="1030" text-anchor="middle" class="label">Baseline comparison</text>
  <text x="500" y="1045" text-anchor="middle" class="label">Regression testing</text>

  <!-- Arrow right -->
  <path d="M 600 1010 L 650 1010" class="arrow"/>

  <!-- Metrics Review -->
  <rect x="650" y="970" width="200" height="80" class="box" rx="5"/>
  <text x="750" y="995" text-anchor="middle" class="text">Metrics Review</text>
  <text x="750" y="1015" text-anchor="middle" class="label">Compare before/after</text>
  <text x="750" y="1030" text-anchor="middle" class="label">Verify improvement</text>
  <text x="750" y="1045" text-anchor="middle" class="label">Monitor production</text>

  <!-- Feedback loop arrow -->
  <path d="M 750 1050 L 750 1080 L 50 1080 L 50 130 L 90 130" class="feedback-arrow"/>
  <text x="400" y="1095" text-anchor="middle" class="label" fill="#00cc00">Continuous Optimization Feedback Loop</text>

  <!-- Legend -->
  <g transform="translate(50, 1000)">
    <rect x="0" y="80" width="15" height="15" class="source-box"/>
    <text x="20" y="92" class="label">Data Source</text>

    <rect x="120" y="80" width="15" height="15" class="tool-box"/>
    <text x="140" y="92" class="label">Profiling Tool</text>

    <rect x="240" y="80" width="15" height="15" class="metrics-box"/>
    <text x="260" y="92" class="label">Metrics</text>

    <rect x="340" y="80" width="15" height="15" class="analysis-box"/>
    <text x="360" y="92" class="label">Analysis</text>

    <rect x="450" y="80" width="15" height="15" class="action-box"/>
    <text x="470" y="92" class="label">Optimization</text>
  </g>
</svg>
