<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="1400" viewBox="0 0 1200 1400">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #0066cc; stroke-width: 2; }
      .process-box { fill: #fff4e6; stroke: #ff9900; stroke-width: 2; }
      .storage-box { fill: #f0e6ff; stroke: #6600cc; stroke-width: 2; }
      .success-box { fill: #e6f7e6; stroke: #00aa00; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,5; }
      .step-number { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: white; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title" font-size="20">JWT Token Flow</text>

  <!-- ===== TOKEN GENERATION SECTION ===== -->
  <text x="50" y="70" class="title" font-size="14">1. Token Generation</text>

  <!-- Client Request -->
  <rect x="100" y="90" width="200" height="60" class="box" rx="5"/>
  <text x="200" y="115" text-anchor="middle" class="text">Client Request</text>
  <text x="200" y="135" text-anchor="middle" class="label">(Login/Auth)</text>

  <!-- Arrow -->
  <path d="M 300 120 L 380 120" class="arrow"/>

  <!-- JWTMinter -->
  <rect x="380" y="90" width="200" height="60" class="process-box" rx="5"/>
  <text x="480" y="115" text-anchor="middle" class="text">JWTMinter</text>
  <text x="480" y="135" text-anchor="middle" class="label">Generate Token</text>

  <!-- Arrow -->
  <path d="M 580 120 L 660 120" class="arrow"/>

  <!-- Token Components -->
  <g>
    <rect x="660" y="90" width="180" height="60" class="storage-box" rx="5"/>
    <text x="750" y="110" text-anchor="middle" class="label">Header</text>
    <text x="750" y="125" text-anchor="middle" class="label">Payload</text>
    <text x="750" y="140" text-anchor="middle" class="label">Signature</text>
  </g>

  <!-- Arrow -->
  <path d="M 840 120 L 920 120" class="arrow"/>

  <!-- Token Storage -->
  <rect x="920" y="90" width="200" height="60" class="storage-box" rx="5"/>
  <text x="1020" y="115" text-anchor="middle" class="text">Token Storage</text>
  <text x="1020" y="135" text-anchor="middle" class="label">(Client/Secure)</text>

  <!-- ===== TOKEN STRUCTURE SECTION ===== -->
  <text x="50" y="210" class="title" font-size="14">2. Token Structure</text>

  <!-- Header -->
  <rect x="100" y="230" width="280" height="100" class="box" rx="5"/>
  <text x="240" y="255" text-anchor="middle" class="text" font-weight="bold">Header</text>
  <text x="240" y="280" text-anchor="middle" class="label">{"alg": "ES256K"}</text>
  <text x="240" y="300" text-anchor="middle" class="label">{"typ": "at+jwt"}</text>
  <text x="240" y="320" text-anchor="middle" class="label">{"kid": "key-id"}</text>

  <!-- Payload -->
  <rect x="420" y="230" width="280" height="100" class="box" rx="5"/>
  <text x="560" y="255" text-anchor="middle" class="text" font-weight="bold">Payload</text>
  <text x="560" y="280" text-anchor="middle" class="label">{"iss": "did:web:pds"}</text>
  <text x="560" y="300" text-anchor="middle" class="label">{"sub": "did:plc:user"}</text>
  <text x="560" y="320" text-anchor="middle" class="label">{"exp": 1234571490}</text>

  <!-- Signature -->
  <rect x="740" y="230" width="280" height="100" class="box" rx="5"/>
  <text x="880" y="255" text-anchor="middle" class="text" font-weight="bold">Signature</text>
  <text x="880" y="280" text-anchor="middle" class="label">HMAC-SHA256(</text>
  <text x="880" y="300" text-anchor="middle" class="label">header.payload,</text>
  <text x="880" y="320" text-anchor="middle" class="label">secret_key)</text>

  <!-- ===== API REQUEST SECTION ===== -->
  <text x="50" y="400" class="title" font-size="14">3. API Request with Token</text>

  <!-- Client -->
  <rect x="100" y="420" width="200" height="60" class="box" rx="5"/>
  <text x="200" y="445" text-anchor="middle" class="text">Client</text>
  <text x="200" y="465" text-anchor="middle" class="label">Has Access Token</text>

  <!-- Arrow -->
  <path d="M 300 450 L 380 450" class="arrow"/>
  <text x="340" y="440" class="label">API Request</text>

  <!-- HTTP Request -->
  <rect x="380" y="420" width="200" height="60" class="box" rx="5"/>
  <text x="480" y="445" text-anchor="middle" class="text">HTTP Request</text>
  <text x="480" y="465" text-anchor="middle" class="label">Authorization Header</text>

  <!-- Arrow -->
  <path d="M 580 450 L 660 450" class="arrow"/>

  <!-- Server -->
  <rect x="660" y="420" width="200" height="60" class="process-box" rx="5"/>
  <text x="760" y="445" text-anchor="middle" class="text">PDS Server</text>
  <text x="760" y="465" text-anchor="middle" class="label">Receives Request</text>

  <!-- ===== VERIFICATION SECTION ===== -->
  <text x="50" y="550" class="title" font-size="14">4. Token Verification</text>

  <!-- Parse Token -->
  <rect x="100" y="570" width="180" height="70" class="process-box" rx="5"/>
  <circle cx="115" cy="585" r="12" fill="#ff9900"/>
  <text x="115" y="590" text-anchor="middle" class="step-number">1</text>
  <text x="190" y="595" class="text">Parse Token</text>
  <text x="190" y="615" class="label">(Header/Payload)</text>

  <!-- Arrow -->
  <path d="M 280 605 L 340 605" class="arrow"/>

  <!-- Verify Signature -->
  <rect x="340" y="570" width="180" height="70" class="process-box" rx="5"/>
  <circle cx="355" cy="585" r="12" fill="#ff9900"/>
  <text x="355" y="590" text-anchor="middle" class="step-number">2</text>
  <text x="430" y="595" class="text">Verify Signature</text>
  <text x="430" y="615" class="label">(Check Key)</text>

  <!-- Arrow -->
  <path d="M 520 605 L 580 605" class="arrow"/>

  <!-- Validate Claims -->
  <rect x="580" y="570" width="180" height="70" class="process-box" rx="5"/>
  <circle cx="595" cy="585" r="12" fill="#ff9900"/>
  <text x="595" y="590" text-anchor="middle" class="step-number">3</text>
  <text x="670" y="595" class="text">Validate Claims</text>
  <text x="670" y="615" class="label">(Exp, Iss, Aud)</text>

  <!-- Arrow -->
  <path d="M 760 605 L 820 605" class="arrow"/>

  <!-- Check Revocation -->
  <rect x="820" y="570" width="180" height="70" class="process-box" rx="5"/>
  <circle cx="835" cy="585" r="12" fill="#ff9900"/>
  <text x="835" y="590" text-anchor="middle" class="step-number">4</text>
  <text x="910" y="595" class="text">Check Revocation</text>
  <text x="910" y="615" class="label">(JTI List)</text>

  <!-- ===== VERIFICATION RESULT SECTION ===== -->
  <text x="50" y="710" class="title" font-size="14">5. Verification Result</text>

  <!-- Valid Path -->
  <rect x="100" y="730" width="200" height="70" class="success-box" rx="5"/>
  <text x="200" y="755" text-anchor="middle" class="text" font-weight="bold">✓ Valid Token</text>
  <text x="200" y="775" text-anchor="middle" class="label">Grant Access</text>
  <text x="200" y="790" text-anchor="middle" class="label">Process Request</text>

  <!-- Arrow -->
  <path d="M 300 765 L 380 765" class="arrow"/>

  <!-- Invalid Path -->
  <rect x="380" y="730" width="200" height="70" class="box" rx="5" style="fill: #ffe6e6; stroke: #cc0000;"/>
  <text x="480" y="755" text-anchor="middle" class="text" font-weight="bold">✗ Invalid Token</text>
  <text x="480" y="775" text-anchor="middle" class="label">Return 401</text>
  <text x="480" y="790" text-anchor="middle" class="label">Unauthorized</text>

  <!-- ===== TOKEN REFRESH SECTION ===== -->
  <text x="50" y="870" class="title" font-size="14">6. Token Refresh Flow</text>

  <!-- Access Token Expired -->
  <rect x="100" y="890" width="200" height="70" class="box" rx="5"/>
  <text x="200" y="915" text-anchor="middle" class="text">Access Token</text>
  <text x="200" y="935" text-anchor="middle" class="label">Expired</text>
  <text x="200" y="950" text-anchor="middle" class="label">(exp &lt; now)</text>

  <!-- Arrow -->
  <path d="M 300 925 L 380 925" class="arrow"/>
  <text x="340" y="915" class="label">Refresh</text>

  <!-- Send Refresh Token -->
  <rect x="380" y="890" width="200" height="70" class="box" rx="5"/>
  <text x="480" y="915" text-anchor="middle" class="text">Send Refresh</text>
  <text x="480" y="935" text-anchor="middle" class="label">Token to Server</text>
  <text x="480" y="950" text-anchor="middle" class="label">(grant_type)</text>

  <!-- Arrow -->
  <path d="M 580 925 L 660 925" class="arrow"/>

  <!-- Verify Refresh Token -->
  <rect x="660" y="890" width="200" height="70" class="process-box" rx="5"/>
  <text x="760" y="915" text-anchor="middle" class="text">Verify Refresh</text>
  <text x="760" y="935" text-anchor="middle" class="label">Token</text>
  <text x="760" y="950" text-anchor="middle" class="label">(Not Revoked)</text>

  <!-- Arrow -->
  <path d="M 860 925 L 940 925" class="arrow"/>

  <!-- Mint New Access Token -->
  <rect x="940" y="890" width="200" height="70" class="success-box" rx="5"/>
  <text x="1040" y="915" text-anchor="middle" class="text">Mint New</text>
  <text x="1040" y="935" text-anchor="middle" class="label">Access Token</text>
  <text x="1040" y="950" text-anchor="middle" class="label">(Short-lived)</text>

  <!-- ===== LEGEND SECTION ===== -->
  <g transform="translate(50, 1050)">
    <text x="0" y="0" class="title">Legend:</text>
    
    <rect x="0" y="20" width="20" height="20" class="box"/>
    <text x="30" y="35" class="label">Request/Response</text>
    
    <rect x="0" y="50" width="20" height="20" class="process-box"/>
    <text x="30" y="65" class="label">Processing Step</text>
    
    <rect x="0" y="80" width="20" height="20" class="storage-box"/>
    <text x="30" y="95" class="label">Token Component</text>
    
    <rect x="0" y="110" width="20" height="20" class="success-box"/>
    <text x="30" y="125" class="label">Success State</text>
    
    <rect x="0" y="140" width="20" height="20" style="fill: #ffe6e6; stroke: #cc0000; stroke-width: 2;"/>
    <text x="30" y="155" class="label">Error State</text>
  </g>

  <!-- ===== FLOW DESCRIPTION ===== -->
  <g transform="translate(50, 1220)">
    <text x="0" y="0" class="title">Token Lifecycle:</text>
    <text x="0" y="25" class="label">1. Client authenticates and receives access token (1 hour) + refresh token (30 days)</text>
    <text x="0" y="45" class="label">2. Client includes access token in Authorization header for API requests</text>
    <text x="0" y="65" class="label">3. Server verifies signature, validates claims, checks revocation list</text>
    <text x="0" y="85" class="label">4. When access token expires, client uses refresh token to get new access token</text>
    <text x="0" y="105" class="label">5. Refresh token must not be revoked and must be valid</text>
  </g>

  <!-- ASCII Art Comment for Fallback -->
  <!-- 
  JWT Token Flow:
  
  1. TOKEN GENERATION
     Client Request → JWTMinter → [Header|Payload|Signature] → Token Storage
  
  2. TOKEN STRUCTURE
     Header: {alg, typ, kid}
     Payload: {iss, sub, exp, scope, ...}
     Signature: HMAC-SHA256(header.payload, secret)
  
  3. API REQUEST
     Client → HTTP Request (Authorization: Bearer token) → PDS Server
  
  4. VERIFICATION
     Parse Token → Verify Signature → Validate Claims → Check Revocation
  
  5. RESULT
     ✓ Valid: Grant Access
     ✗ Invalid: Return 401 Unauthorized
  
  6. REFRESH
     Access Token Expired → Send Refresh Token → Verify → Mint New Access Token
  -->
</svg>
