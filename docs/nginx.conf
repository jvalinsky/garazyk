server {
    listen 80;
    server_name pds.garazyk.xyz;
    
    # Documentation location
    location /docs {
        alias /var/www/docs;
        index index.html;
        
        # Try files, fallback to index.html for SPA routing
        # This enables client-side routing for VitePress
        try_files $uri $uri/ /docs/index.html;
        
        # Cache static assets aggressively (1 year for immutable assets)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # No cache for HTML files (ensures users get latest content)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
        }
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        
        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    }
    
    # Custom 404 page
    error_page 404 /docs/404.html;
    
    # Redirect old Jekyll URLs to VitePress URLs (if needed)
    # Add specific redirects here as identified during migration
    # Example:
    # rewrite ^/docs/old-path$ /docs/new-path permanent;
}

# HTTPS configuration (for production with TLS)
server {
    listen 443 ssl http2;
    server_name pds.garazyk.xyz;
    
    # SSL certificate configuration (adjust paths as needed)
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Documentation location
    location /docs {
        alias /var/www/docs;
        index index.html;
        
        # Try files, fallback to index.html for SPA routing
        try_files $uri $uri/ /docs/index.html;
        
        # Cache static assets aggressively (1 year for immutable assets)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # No cache for HTML files
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
        }
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    }
    
    # Custom 404 page
    error_page 404 /docs/404.html;
}
