# ATProto PDS nginx Configuration
# Place in /etc/nginx/sites-available/pds
# Enable with: sudo ln -s /etc/nginx/sites-available/pds /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=pds_general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=pds_auth:10m rate=10r/s;

# Upstream PDS
upstream pds_backend {
    server 127.0.0.1:2583 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name pds.example.com;
    
    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pds.example.com;

    # TLS configuration
    ssl_certificate /etc/letsencrypt/live/pds.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pds.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/pds_access.log;
    error_log /var/log/nginx/pds_error.log;

    # Client limits
    client_max_body_size 50M;  # For blob uploads
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Rate limiting (stricter for auth endpoints)
    location ~ ^/xrpc/(com\.atproto\.server\.createSession|com\.atproto\.server\.createAccount) {
        limit_req zone=pds_auth burst=5 nodelay;
        proxy_pass http://pds_backend;
        include /etc/nginx/proxy_params_pds;
    }

    # WebSocket upgrade for firehose
    location /xrpc/com.atproto.sync.subscribeRepos {
        proxy_pass http://pds_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # 1 hour for long-lived connections
        proxy_send_timeout 3600s;
    }

    # Documentation UI served by the docs container on localhost:8080.
    # Keep /docs separate from the PDS backend so public docs requests do not
    # fall through to the API server and return JSON 404s.
    location = /docs {
        return 301 /docs/;
    }

    location /docs/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # General endpoints
    location / {
        limit_req zone=pds_general burst=50 nodelay;
        proxy_pass http://pds_backend;
        include /etc/nginx/proxy_params_pds;
    }
}
