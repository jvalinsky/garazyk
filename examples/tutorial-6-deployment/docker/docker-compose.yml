services:
  pds:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.gnustep
    image: nspds:local
    container_name: nspds
    ports:
      - "127.0.0.1:2583:2583"  # Bind to localhost only (nginx handles external)
    volumes:
      - pds_data:/var/lib/atprotopds
      - ./config.json:/var/lib/atprotopds/config.json:ro
    environment:
      - TZ=UTC
      - PDS_PORT=2583
      - PDS_HOST=0.0.0.0
      - PDS_ISSUER=${PDS_ISSUER}
      - PDS_LEXICON_PATH=/usr/share/atprotopds/lexicons
      - HOME=/var/lib/atprotopds
      - PDS_DATA_DIR=/var/lib/atprotopds
      - PDS_TRUST_PROXY_HEADERS=1  # CRITICAL: Trust X-Forwarded-For from nginx
    command: ["serve", "--config", "/var/lib/atprotopds/config.json", "--foreground"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2583/xrpc/com.atproto.server.describeServer"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pds_data:
    name: pds_pds_data
